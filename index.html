<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>백준 Class 1~3 알고리즘</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#c9d1d9;font-family:'Segoe UI',sans-serif;min-height:100vh}
header{background:#161b22;border-bottom:1px solid #30363d;padding:20px 32px;display:flex;align-items:center;gap:16px}
header h1{font-size:1.6rem;color:#f0f6fc}
header p{color:#8b949e;font-size:.95rem}
.filters{padding:20px 32px;display:flex;flex-wrap:wrap;gap:8px;background:#0d1117;position:sticky;top:0;z-index:10;border-bottom:1px solid #21262d}
.filter-btn{padding:6px 16px;border-radius:20px;border:1px solid #30363d;background:#161b22;color:#8b949e;cursor:pointer;font-size:.85rem;transition:all .2s}
.filter-btn:hover{border-color:#58a6ff;color:#58a6ff}
.filter-btn.active{background:#1f6feb;border-color:#1f6feb;color:#fff}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;padding:24px 32px}
.card{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:16px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.4);border-color:#58a6ff}
.card-type{font-size:.7rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px}
.card-id{font-size:.8rem;color:#8b949e;margin-bottom:4px}
.card-title{font-size:1rem;font-weight:600;color:#f0f6fc;margin-bottom:8px}
.card-summary{font-size:.78rem;color:#8b949e;line-height:1.5}
.diff-badge{position:absolute;top:12px;right:12px;font-size:.7rem;font-weight:700;padding:2px 7px;border-radius:4px;color:#fff}
.card-bar{position:absolute;bottom:0;left:0;right:0;height:3px}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:none;align-items:center;justify-content:center;padding:16px}
.overlay.show{display:flex}
.modal{background:#161b22;border:1px solid #30363d;border-radius:14px;width:min(800px,100%);max-height:90vh;display:flex;flex-direction:column;overflow:hidden}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;border-bottom:1px solid #21262d}
.modal-title{font-size:1.15rem;font-weight:700;color:#f0f6fc}
.modal-badge{font-size:.75rem;font-weight:700;padding:3px 10px;border-radius:6px;color:#fff;margin-left:10px}
.close-btn{background:none;border:none;color:#8b949e;font-size:1.5rem;cursor:pointer;padding:0 6px;line-height:1}
.close-btn:hover{color:#f0f6fc}
.tabs{display:flex;gap:0;border-bottom:1px solid #21262d}
.tab{padding:12px 24px;background:none;border:none;color:#8b949e;cursor:pointer;font-size:.9rem;border-bottom:2px solid transparent;transition:all .2s}
.tab.active{color:#58a6ff;border-bottom-color:#58a6ff}
.tab-content{padding:24px;overflow-y:auto;flex:1}
.tab-content.hidden{display:none}
.explain-text{font-size:.9rem;line-height:1.8;color:#c9d1d9;margin-bottom:24px;background:#0d1117;padding:16px;border-radius:8px;border-left:3px solid #58a6ff}
.problem-box{background:#0d1117;padding:16px;border-radius:8px;border-left:3px solid #2ea043;margin-bottom:18px}
.problem-label{font-size:.8rem;font-weight:700;color:#2ea043;margin-bottom:8px;letter-spacing:.03em}
.problem-text{font-size:.9rem;line-height:1.8;color:#c9d1d9;white-space:pre-line}
/* 구조화된 문제 표시 */
.problem-desc{margin-bottom:16px}
.pd-lead{font-size:.96rem;line-height:1.7;color:#f0f6fc;font-weight:600;margin-bottom:11px}
.pd-list{list-style:none;display:flex;flex-direction:column;gap:8px;margin:0}
.pd-list li{position:relative;padding-left:19px;font-size:.9rem;line-height:1.65;color:#c9d1d9}
.pd-list li::before{content:"";position:absolute;left:3px;top:8px;width:6px;height:6px;border-radius:50%;background:#3fb950}
.pd-eg{font-size:.85rem;line-height:1.6;color:#9da7b3;background:#161b22;border-left:2px solid #6e7681;padding:8px 13px;border-radius:0 6px 6px 0;margin:9px 0}
.pd-eg b{color:#adbac7}
.problem-desc strong{color:#79c0ff;font-weight:700}
.io-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.io-box{background:#161b22;border:1px solid #21262d;border-radius:8px;padding:11px 14px}
.io-label{font-size:.72rem;font-weight:700;letter-spacing:.04em;margin-bottom:7px;display:inline-block;padding:2px 9px;border-radius:5px}
.io-label.in{color:#58a6ff;background:rgba(88,166,255,.13)}
.io-label.out{color:#3fb950;background:rgba(63,185,80,.13)}
.io-text{font-size:.85rem;line-height:1.7;color:#c9d1d9;white-space:pre-line}
.io-text .vsep{color:#6e7681}
@media(max-width:600px){ .io-grid{grid-template-columns:1fr} }
#mermaidChart{margin-top:8px;text-align:center;overflow-x:auto}
#mermaidChart svg{max-width:100%}
.code-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.copy-btn{padding:6px 14px;background:#21262d;border:1px solid #30363d;color:#8b949e;border-radius:6px;cursor:pointer;font-size:.8rem;transition:all .2s}
.copy-btn:hover{background:#30363d;color:#f0f6fc}
.copy-btn.copied{background:#238636;border-color:#238636;color:#fff}
pre{margin:0;border-radius:8px;overflow-x:auto}
pre code{font-size:.85rem;font-family:'Consolas',monospace;line-height:1.55}
/* 주석 종류별 색 구분 (가독성) */
pre code .hljs-comment{font-style:normal;color:#7d8590}
.hljs-comment.cm-role{color:#79c0ff;font-weight:600}        /* [메서드 역할] */
.hljs-comment.cm-eg{color:#e3b341}                          /* ▼ 예시 입력 */
.hljs-comment.cm-out{color:#3fb950;font-weight:600}         /* ✅ 출력 */
.hljs-comment.cm-note{color:#6e7781}                        /* 일반 트레이스 주석 */
/* 비개발자용 코드 설명 박스 */
.beginner-box{background:#0d1117;border:1px solid rgba(31,111,235,.4);border-left:3px solid #1f6feb;border-radius:8px;padding:14px 17px;margin-bottom:16px}
.beginner-title{font-size:.83rem;font-weight:700;color:#58a6ff;margin-bottom:10px;letter-spacing:.02em}
.bg-lead{font-size:.91rem;line-height:1.6;color:#f0f6fc;font-weight:600;margin-bottom:11px}
.bg-steps{list-style:none;counter-reset:bg;display:flex;flex-direction:column;gap:8px;margin:0}
.bg-steps li{counter-increment:bg;position:relative;padding-left:29px;font-size:.88rem;line-height:1.6;color:#c9d1d9}
.bg-steps li::before{content:counter(bg);position:absolute;left:0;top:1px;width:20px;height:20px;background:#1f6feb;color:#fff;border-radius:50%;font-size:.7rem;font-weight:700;display:flex;align-items:center;justify-content:center}
.bg-note{font-size:.82rem;color:#8b949e;margin-top:9px;line-height:1.55;padding-left:2px}
/* 동작 미리보기 (그림 트레이스) */
.trace-box{background:linear-gradient(180deg,#fbfcfe,#f3f5fb);border:1px solid #e1e6f0;border-left:3px solid #a371f7;border-radius:11px;padding:14px 16px;margin-bottom:16px;box-shadow:0 2px 8px rgba(16,24,40,.06)}
.trace-title{font-size:.85rem;font-weight:800;color:#7c3aed;margin-bottom:3px}
.trace-in{font-weight:600;color:#64748b;font-size:.76rem;margin-left:7px}
.trace-legend{font-size:.76rem;color:#64748b;margin-bottom:11px}
.trace-strip{display:flex;gap:9px;overflow-x:auto;padding:4px 2px 8px}
.tr-step{flex:0 0 auto;min-width:108px;background:#161b22;border:1px solid #21262d;border-radius:9px;padding:10px 11px}
.tr-op{font-size:.76rem;font-weight:700;color:#adbac7;margin-bottom:9px;white-space:nowrap}
.tr-boxes{display:flex;gap:4px;align-items:center;min-height:32px;flex-wrap:wrap}
.tr-cell{position:relative;min-width:34px;height:34px;padding:0 9px;display:flex;align-items:center;justify-content:center;border:1px solid #cfd9e8;border-radius:8px;font-size:.84rem;font-weight:800;color:#1f2937;box-shadow:0 1px 2px rgba(16,24,40,.1),inset 0 1px 0 rgba(255,255,255,.55)}
.tr-cell.hi{outline:2px solid #10b981;outline-offset:1px}
.tr-cell.nx{box-shadow:0 0 0 2px #f59e0b,0 1px 2px rgba(16,24,40,.12)}
.nx-crown{position:absolute;top:-13px;left:50%;transform:translateX(-50%);font-size:.74rem;line-height:1}
/* 자료구조 컨테이너 */
.ds{display:inline-flex;flex-direction:column;gap:5px;border:1.5px solid #d6deea;border-radius:10px;padding:8px 11px 9px;background:#fbfcfe}
.ds-head{font-size:.72rem;font-weight:800;color:#475569;display:flex;align-items:center;gap:5px}
.ds-head b{color:#1f2937}
.ds-body{display:flex;gap:8px;align-items:center;flex-wrap:wrap;min-height:34px;padding-top:6px}
.ds-next{font-size:.71rem;color:#92400e}
.ds-next b{color:#b45309}
.ds-stack{border-color:#f5c2e0;background:#fdf5fb}
.ds-queue{border-color:#bcd9fb;background:#f1f7ff}
.ds-deque{border-color:#c9d2fb;background:#f3f5ff}
.ds-heap{border-color:#fbe093;background:#fffcf0}
/* 반복 프레임 */
.loop-frame{position:relative;border:1.5px dashed #f0b8d6;border-radius:12px;padding:10px 10px 4px;background:rgba(244,180,214,.07);margin:3px 0}
.loop-head{font-size:.74rem;font-weight:800;color:#be3d8f;margin-bottom:11px;display:flex;align-items:center;gap:5px}
.loop-back{font-size:.72rem;font-weight:700;color:#be3d8f;text-align:center;margin-top:11px}
/* 비교 그림 */
.cmp-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:9px;background:#fff7ed;border:1px solid #fed7aa;border-radius:8px;padding:7px 10px}
.cmp-chip{font-family:'Consolas',monospace;font-weight:800;font-size:.82rem;color:#1f2937;border:1px solid #e3c9a3;border-radius:6px;padding:3px 10px}
.cmp-vs{font-size:.74rem;font-weight:800;color:#c2410c}
.cmp-note{font-size:.74rem;color:#9a3412}
.tr-empty{display:inline-flex;align-items:center;gap:5px;min-width:72px;height:34px;padding:0 12px;border:1.5px dashed #c3cdda;border-radius:8px;color:#94a3b8;font-size:.75rem;font-style:normal;background:repeating-linear-gradient(45deg,#ffffff,#ffffff 6px,#f1f5f9 6px,#f1f5f9 12px)}
.tr-out{margin-top:10px;font-size:.76rem;font-weight:800;color:#067647;background:#e3f8ee;border:1px solid #b6ecca;border-radius:6px;padding:3px 10px;display:inline-block}
.tr-note{margin-top:7px;font-size:.73rem;color:#64748b;line-height:1.45}
/* 코드+그림 세로 순서도 */
.flow-steps{display:flex;flex-direction:column;margin-top:4px}
.fstep{position:relative;background:#ffffff;border:1px solid #e5e9f0;border-radius:11px;padding:11px 13px;box-shadow:0 1px 3px rgba(16,24,40,.06)}
.fstep + .fstep{margin-top:16px}
.fstep + .fstep::before{content:"▼";position:absolute;top:-14px;left:18px;color:#c0c8d4;font-size:.74rem;line-height:1}
.fs-op{font-size:.79rem;font-weight:800;color:#7c3aed;margin-bottom:7px}
.fs-code{font-family:'Consolas',monospace;font-size:.79rem;line-height:1.5;background:#f4f6fb;border:1px solid #e3e8f0;border-left:3px solid #3b82f6;border-radius:6px;padding:6px 10px;color:#1f2937;margin-bottom:9px;white-space:pre-wrap;word-break:break-word}
.fs-code .cm{color:#94a3b2}
.fs-boxes{display:flex;gap:8px;align-items:flex-start;flex-wrap:wrap;min-height:34px}
.fs-dir{font-size:.69rem;font-weight:800;padding:3px 8px;border-radius:20px;margin-right:3px;white-space:nowrap}
.fs-dir.in{color:#047857;background:#d1fae5}
.fs-dir.out{color:#b45309;background:#fef3c7}
/* 격자 그림 트레이스 (BFS/DFS) */
.gt-step{flex:0 0 auto;background:#161b22;border:1px solid #21262d;border-radius:9px;padding:10px 11px}
.gt-grid{display:grid;gap:3px;margin-top:2px}
.gt-cell{width:24px;height:24px;border-radius:6px;background:#e9eef5;box-shadow:inset 0 1px 0 rgba(255,255,255,.6)}
.gc-empty{background:#e9eef5}
.gc-house{background:#94a3b8}
.gc-ripe{background:linear-gradient(180deg,#fbbf24,#f59e0b)}
.gc-new{background:linear-gradient(180deg,#fdba74,#fb923c);box-shadow:inset 0 0 0 2px rgba(255,255,255,.7)}
.gc-wall{background:#cbd5e1}
.gc-rA{background:linear-gradient(180deg,#60a5fa,#3b82f6)}
.gc-rB{background:linear-gradient(180deg,#a78bfa,#8b5cf6)}
.gc-rC{background:linear-gradient(180deg,#f472b6,#ec4899)}
.gc-R{background:linear-gradient(180deg,#f87171,#ef4444)}
.gc-G{background:linear-gradient(180deg,#4ade80,#22c55e)}
.gc-L{background:linear-gradient(180deg,#60a5fa,#3b82f6)}
.trace-strip{-webkit-overflow-scrolling:touch}
/* 역량 패널 */
.cap-box{background:#0d1117;border:1px solid rgba(46,160,67,.3);border-left:3px solid #2ea043;border-radius:8px;padding:13px 16px;margin-bottom:18px}
.cap-title{font-size:.83rem;font-weight:700;color:#3fb950;margin-bottom:9px}
.cap-row{display:grid;grid-template-columns:78px 1fr;gap:10px;padding:6px 0}
.cap-row + .cap-row{border-top:1px solid #1b2129}
.cap-k{color:#8b949e;font-weight:700;font-size:.79rem;padding-top:1px}
.cap-v{color:#c9d1d9;font-size:.85rem;line-height:1.55}
.cap-v b{color:#f0f6fc}
/* 퀴즈 */
.quiz-intro{font-size:.85rem;color:#8b949e;margin-bottom:16px;padding:10px 14px;background:#0d1117;border-radius:8px;border-left:3px solid #a371f7}
.quiz-q{background:#0d1117;border:1px solid #21262d;border-radius:10px;padding:15px 16px;margin-bottom:14px}
.quiz-qnum{font-size:.72rem;font-weight:800;color:#a371f7;margin-bottom:7px;letter-spacing:.03em}
.quiz-text{font-size:.93rem;font-weight:600;color:#f0f6fc;margin-bottom:13px;line-height:1.6}
.quiz-opts{display:flex;flex-direction:column;gap:8px}
.quiz-opt{position:relative;text-align:left;background:#161b22;border:1px solid #30363d;color:#c9d1d9;border-radius:8px;padding:11px 14px;cursor:pointer;font-size:.88rem;line-height:1.5;transition:border-color .15s,background .15s;font-family:inherit}
.quiz-opt:hover{border-color:#58a6ff}
.quiz-opt.correct{background:rgba(46,160,67,.16);border-color:#2ea043;color:#56d364}
.quiz-opt.wrong{background:rgba(248,81,73,.14);border-color:#f85149;color:#ff7b72}
.quiz-opt.disabled{cursor:default;pointer-events:none}
.quiz-opt .mk{position:absolute;right:13px;top:50%;transform:translateY(-50%);font-weight:800}
/* 코드 블록 객관식 보기 */
.bq-opts{gap:9px}
.code-opt{padding:9px 12px 9px 14px;text-align:left;cursor:pointer}
.code-opt pre{margin:0;border-radius:0;background:transparent;overflow-x:auto}
.code-opt pre code{font-size:.78rem;background:transparent;padding:0;white-space:pre}
.code-opt.correct{background:rgba(46,160,67,.13);border-color:#2ea043}
.code-opt.wrong{background:rgba(248,81,73,.12);border-color:#f85149}
.quiz-explain{margin-top:12px;font-size:.85rem;line-height:1.65;color:#adbac7;background:#161b22;border-left:3px solid #2ea043;border-radius:0 6px 6px 0;padding:10px 13px;display:none}
.quiz-explain.show{display:block}
.quiz-explain b{color:#f0f6fc}
.quiz-empty{color:#8b949e;text-align:center;padding:36px 16px;font-size:.92rem;line-height:1.7}
/* 구현(서술형) 퀴즈 */
.quiz-q.impl{border-color:#2c2540}
.qa-btn{background:#21262d;border:1px solid #30363d;color:#adbac7;border-radius:7px;padding:7px 13px;font-size:.82rem;cursor:pointer;margin:2px 8px 2px 0;font-family:inherit;font-weight:600}
.qa-btn:hover{border-color:#a371f7;color:#d2a8ff}
.quiz-hint{display:none;margin-top:11px;font-size:.84rem;line-height:1.6;color:#d2a8ff;background:#161b22;border-left:3px solid #a371f7;border-radius:0 6px 6px 0;padding:9px 13px}
.quiz-hint.show{display:block}
.quiz-answer{display:none;margin-top:12px}
.quiz-answer.show{display:block}
.quiz-answer pre{margin:0;border-radius:8px}
.quiz-answer pre code{font-size:.82rem}

@media(max-width:600px){
  .grid{padding:16px;grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
  header{padding:16px}
  .filters{padding:12px 16px}
}
/* 아이폰14 등 모바일 최적화 */
@media(max-width:480px){
  header h1{font-size:1.35rem}
  header p{font-size:.85rem}
  .grid{padding:13px;gap:11px;grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
  .overlay{padding:7px}
  .modal{max-height:94vh;border-radius:13px}
  .modal-header{padding:13px 15px}
  .modal-title{font-size:1rem}
  .tab{padding:11px 15px;font-size:.86rem}
  .tab-content{padding:16px;-webkit-overflow-scrolling:touch}
  .explain-text{font-size:.86rem;padding:14px}
  pre code{font-size:.76rem}
  .beginner-box,.trace-box,.cap-box{padding:12px 13px}
  .cap-row{grid-template-columns:70px 1fr;gap:8px}
  .bg-steps li{padding-left:26px;font-size:.85rem}
  .tr-step{min-width:96px}
  .gt-cell{width:19px;height:19px}
  #mermaidChart svg{height:auto}
}
/* 큰 화면 — 카드가 너무 커지지 않게 */
@media(min-width:1100px){ .grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))} }
</style>
</head>
<body>

<header>
  <div>
    <h1>📚 백준 Class 1~3</h1>
    <p>알고리즘 스터디 — 문제를 클릭하면 순서도와 Java 코드를 볼 수 있어요</p>
  </div>
</header>

<div class="filters" id="filters"></div>
<div class="grid" id="grid"></div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-header">
      <div style="display:flex;align-items:center;flex-wrap:wrap;gap:8px">
        <span class="modal-title" id="modalTitle"></span>
        <span class="modal-badge" id="modalBadge"></span>
        <span class="modal-badge" id="modalType" style="background:#21262d"></span>
      </div>
      <button class="close-btn" id="closeBtn">×</button>
    </div>
    <div class="tabs">
      <button class="tab active" data-tab="explain">설명 &amp; 순서도</button>
      <button class="tab" data-tab="code">Java 코드</button>
      <button class="tab" data-tab="quiz">🧩 퀴즈</button>
    </div>
    <div class="tab-content" id="explainTab">
      <div class="problem-box">
        <div class="problem-label">📋 문제</div>
        <div id="modalProblem"></div>
      </div>
      <div class="cap-box" id="skillBox"></div>
      <p class="explain-text" id="modalExplain"></p>
      <div id="mermaidChart"><p style="color:#8b949e;text-align:center">순서도 로딩중...</p></div>
    </div>
    <div class="tab-content hidden" id="codeTab">
      <div class="beginner-box" id="beginnerBox"></div>
      <div class="trace-box" id="traceBox"></div>
      <div class="code-header">
        <span style="color:#8b949e;font-size:.85rem">Java 풀이</span>
        <button class="copy-btn" id="copyBtn">📋 코드 복사</button>
      </div>
      <pre><code class="language-java" id="modalCode"></code></pre>
    </div>
    <div class="tab-content hidden" id="quizTab"></div>
  </div>
</div>

<script>
if (window.mermaid) mermaid.initialize({ startOnLoad: false, theme: 'dark', securityLevel: 'loose' });

code:`import java.util.Scanner;

public class Main {

        // ▼ 예시 입력: 24 18
        Scanner sc = new Scanner(System.in);
        int a = sc.nextInt(), b = sc.nextInt();   // a=24, b=18
        int g = gcd(a, b);          // g=6 (최대공약수)
        System.out.println(g);      // ✅ 출력(1행): 6

code:`import java.util.Scanner;

public class Main {
    // [메서드 역할] 입력된 N개의 수 중 '소수'가 몇 개인지 세어 출력
    public static void main(String[] args) {
        // ▼ 예시 입력:  첫 줄 N=4 ,  둘째 줄  1 3 5 7
        Scanner sc = new Scanner(System.in);
        int n = sc.nextInt(), count = 0;       // n=4, count=0
        for (int i = 0; i < n; i++) {
            if (isPrime(sc.nextInt())) count++;
            // i=0: 입력 1 → isPrime(1)=false → count=0
            // i=1: 입력 3 → isPrime(3)=true  → count=1
            // i=2: 입력 5 → isPrime(5)=true  → count=2
            // i=3: 입력 7 → isPrime(7)=true  → count=3
        }
        System.out.println(count);             // ✅ 출력: 3
    }
    // [메서드 역할] n이 소수면 true, 아니면 false (2~√n 까지 나눠 약수가 있는지 검사)
    static boolean isPrime(int n) {
        if (n < 2) return false;               // 예) isPrime(1) → 1<2 이므로 바로 false
        for (int i = 2; i * i <= n; i++)       // 예) n=7 → i=2 일 때 2*2=4 <= 7 (검사)

{id:11050,title:'이항 계수 1',type:'수학',diff:'B1',
problem:'서로 다른 N개 중에서 순서 없이 K개를 고르는 경우의 수, 즉 이항계수 C(N,K)를 구하는 문제입니다. C(N,K) = N! / (K! × (N−K)!) 로 계산됩니다.\n\n입력: 첫 줄에 N과 K가 공백으로 구분되어 주어진다. (1 ≤ N ≤ 10, 0 ≤ K ≤ N)\n출력: 이항계수 C(N,K)의 값',
summary:'이항 계수 C(N, K) = N! / (K! × (N-K)!) 계산',
explain:'팩토리얼을 직접 계산하여 C(N,K)를 구합니다. N≤10이므로 오버플로우 걱정 없이 long으로 계산합니다.',
flow:`flowchart TD
A([시작]) --> B["N, K 입력"]
B --> C["num = N×(N-1)×...×(N-K+1)"]
C --> D["den = K!"]
D --> E["결과 = num / den"]
E --> F["결과 출력"]
F --> G([종료])`,
code:`import java.util.Scanner;

public class Main {
    // [메서드 역할] 이항계수 C(N,K)를 계산해 출력
    public static void main(String[] args) {
        // ▼ 예시 입력: 5 2
        Scanner sc = new Scanner(System.in);
        int n = sc.nextInt(), k = sc.nextInt();   // n=5, k=2
        System.out.println(comb(n, k));   // C(5,2) → ✅ 출력: 10
    }
    // [메서드 역할] C(n,k)=n!/(k!(n-k)!) 를 분자 k항·분모 k!로 계산
    static long comb(int n, int k) {
        if (k == 0 || k == n) return 1;
        long num = 1, den = 1;
        for (int i = 0; i < k; i++) {
            num *= (n - i);                // i=0: num=5 / i=1: num=20  (5×4)
            den *= (i + 1);                // i=0: den=1 / i=1: den=2   (1×2)
        }
        return num / den;                  // 20 / 2 = 10
    }
}`},

explain:'x에서 시작해 M씩 더하면서 (k-1)%N == y-1인 k를 찾습니다. LCM(M,N)을 초과하면 -1입니다. 유클리드 호제법으로 LCM을 구합니다.',
flow:`flowchart TD

C --> D["k = x"]
D --> E{k > lcm?}
E -->|Yes| F["-1 출력"]
E -->|No| G{"(k-1) % N == y-1?"}

H --> J`,
code:`import java.util.*;
import java.io.*;

public class Main {
    // [메서드 역할] <x:y>가 몇 번째 해인지 출력 (없으면 -1)
    public static void main(String[] args) throws Exception {
        // ▼ 예시 입력:  첫 줄 T=1 ,  둘째 줄  10 12 3 9
        BufferedReader br = new BufferedReader(new InputStreamReader(System.in));
        int T = Integer.parseInt(br.readLine().trim());   // T=1
        StringBuilder sb = new StringBuilder();
        while (T-- > 0) {
            StringTokenizer st = new StringTokenizer(br.readLine());
            long M = Long.parseLong(st.nextToken());      // M=10
            long N = Long.parseLong(st.nextToken());      // N=12
            long x = Long.parseLong(st.nextToken());      // x=3
            long y = Long.parseLong(st.nextToken());      // y=9
            long lcm = M / gcd(M, N) * N;     // 10/2*12 = 60
            long ans = -1;
            for (long k = x; k <= lcm; k += M) {
                if ((k - y) % N == 0) { ans = k; break; }
                // k=3:(3-9)%12≠0 / 13,23 ≠0 / k=33:(33-9)=24 → 24%12=0 → ans=33
            }
            sb.append(ans).append('\\n');
        }
        System.out.print(sb);   // ✅ 출력: 33
    }
    // [메서드 역할] LCM 계산용 최대공약수 (유클리드 호제법)
    static long gcd(long a, long b) { return b == 0 ? a : gcd(b, a % b); }

        BufferedReader br = new BufferedReader(new InputStreamReader(System.in));

            // front  → 출력 1 (맨 앞)

public class Main {
    // [메서드 역할] 덱 명령(push/pop_front·back, front/back, size/empty) 처리
    public static void main(String[] args) throws Exception {
        // ▼ 예시 입력: 6 / push_front 1 / push_back 2 / front / back / pop_front / size
        BufferedReader br = new BufferedReader(new InputStreamReader(System.in));
        StringBuilder sb = new StringBuilder();
        Deque<Integer> dq = new ArrayDeque<>();   // dq=[]
        int n = Integer.parseInt(br.readLine().trim());   // n=6
        while (n-- > 0) {
            StringTokenizer st = new StringTokenizer(br.readLine());
            String cmd = st.nextToken();
            switch (cmd) {
                case "push_front": dq.addFirst(Integer.parseInt(st.nextToken())); break;
                case "push_back":  dq.addLast(Integer.parseInt(st.nextToken())); break;
                case "pop_front":  sb.append(dq.isEmpty() ? -1 : dq.pollFirst()).append('\\n'); break;
                case "pop_back":   sb.append(dq.isEmpty() ? -1 : dq.pollLast()).append('\\n'); break;
                case "front":      sb.append(dq.isEmpty() ? -1 : dq.peekFirst()).append('\\n'); break;
                case "back":       sb.append(dq.isEmpty() ? -1 : dq.peekLast()).append('\\n'); break;
                case "size":       sb.append(dq.size()).append('\\n'); break;
                case "empty":      sb.append(dq.isEmpty() ? 1 : 0).append('\\n'); break;
            }
            // push_front 1 → dq=[1]
            // push_back 2  → dq=[1,2]
            // front        → 출력 1
            // back         → 출력 2
            // pop_front    → 출력 1, dq=[2]
            // size         → 출력 1
        }
        System.out.print(sb);   // ✅ 출력: 1 / 2 / 1 / 1
    }
}`},

code:`import java.util.*;
import java.io.*;

public class Main {
    // [메서드 역할] 1~N push/pop으로 목표 수열을 만들면 +/- 기록, 불가하면 NO
    public static void main(String[] args) throws Exception {
        // ▼ 예시 입력:  8 / 4 3 6 8 7 5 2 1
        BufferedReader br = new BufferedReader(new InputStreamReader(System.in));
        int n = Integer.parseInt(br.readLine().trim());   // n=8
        Deque<Integer> stack = new ArrayDeque<>();
        StringBuilder sb = new StringBuilder();
        int cur = 1;          // 다음에 push할 자연수
        boolean ok = true;
        for (int i = 0; i < n; i++) {
            int target = Integer.parseInt(br.readLine().trim());
            while (cur <= target) {
                stack.push(cur++);
                sb.append('+').append('\\n');
            }
            if (stack.peek() == target) {
                stack.pop();
                sb.append('-').append('\\n');
            } else {
                ok = false;
                break;
            }
            // target=4: 1,2,3,4 push(++++) → 4 pop(-)
            // target=3: 3 pop(-)
            // target=6: 5,6 push(++) → 6 pop(-)
            // target=8: 7,8 push(++) → 8 pop(-)
            // target=7,5,2,1: 차례로 pop(- - - -)
        }

    // [메서드 역할] 목표 문서(M번째)가 몇 번째로 인쇄되는지 출력
    public static void main(String[] args) throws Exception {
        // ▼ 예시 입력:  T=1 / N=4 M=2 / 중요도 1 2 3 4
        BufferedReader br = new BufferedReader(new InputStreamReader(System.in));
        int T = Integer.parseInt(br.readLine().trim());   // T=1
        StringBuilder sb = new StringBuilder();
        while (T-- > 0) {
            StringTokenizer st = new StringTokenizer(br.readLine());
            int n = Integer.parseInt(st.nextToken());   // n=4
            int m = Integer.parseInt(st.nextToken());   // m=2 (목표 문서 위치)
            int[] pri = new int[n];
            st = new StringTokenizer(br.readLine());
            for (int i = 0; i < n; i++) pri[i] = Integer.parseInt(st.nextToken());  // pri=[1,2,3,4]
            Queue<int[]> q = new LinkedList<>();
            for (int i = 0; i < n; i++) q.add(new int[]{pri[i], i});   // {중요도, 위치}
            PriorityQueue<Integer> maxPQ = new PriorityQueue<>(Collections.reverseOrder());
            for (int p : pri) maxPQ.add(p);   // 최상단=4
            int cnt = 0;
            while (!q.isEmpty()) {
                int[] cur = q.poll();
                if (cur[0] == maxPQ.peek()) {
                    maxPQ.poll();
                    cnt++;
                    if (cur[1] == m) { sb.append(cnt).append('\\n'); break; }
                } else {
                    q.add(cur);
                }
                // 1,2,3 은 최고(4) 아님 → 뒤로 / 4 인쇄(cnt=1)
                // 1,2 뒤로 → 3 인쇄(cnt=2), 위치2==m → 출력 2
            }
        }
        System.out.print(sb);   // ✅ 출력: 2

H -->|Yes| I["ans = sum"]

code:`import java.util.Scanner;

public class Main {
    // [메서드 역할] 카드 3장 합이 M 이하인 최댓값을 출력
    public static void main(String[] args) {
        // ▼ 예시 입력:  5 21 / 5 6 7 8 9
        Scanner sc = new Scanner(System.in);
        int n = sc.nextInt(), m = sc.nextInt();   // n=5, m=21
        int[] c = new int[n];
        for (int i = 0; i < n; i++) c[i] = sc.nextInt();   // c=[5,6,7,8,9]
        int ans = 0;
        for (int i = 0; i < n; i++)
            for (int j = i+1; j < n; j++)
                for (int k = j+1; k < n; k++) {
                    int s = c[i]+c[j]+c[k];
                    if (s <= m) ans = Math.max(ans, s);
                    // 5+6+7=18<=21 → ans=18
                    // 6+7+8=21<=21 → ans=21
                    // 7+8+9=24>21  → 무시
                }

{id:1018,title:'체스판 다시 칠하기',type:'완전탐색',diff:'S4',

summary:'N×M 보드에서 8×8 체스판 만들 때 최소로 다시 칠해야 하는 칸 수',
explain:'8×8 부분 보드의 왼쪽 위 시작점 (i,j)을 완전탐색합니다. 각 위치가 B시작 또는 W시작 체스판과 얼마나 다른지 세고, min을 구합니다.',
flow:`flowchart TD
A([시작]) --> B["N, M, 보드 입력"]
B --> C["모든 8x8 시작점(i,j) 탐색"]

D --> E["B시작 = 64 - cntW"]
E --> F["ans = min(ans, min(cntW, 64-cntW))"]
F --> C
C -->|완료| G["ans 출력"]
G --> H([종료])`,
code:`import java.util.Scanner;

public class Main {
    // [메서드 역할] 8×8로 잘라 체스판으로 만들 때 다시 칠할 최소 칸 수 출력
    public static void main(String[] args) {
        // ▼ 예시 입력: N=8, M=8 보드  (8×8 이라 잘라낼 영역은 (0,0) 한 곳뿐)
        Scanner sc = new Scanner(System.in);
        int n = sc.nextInt(), m = sc.nextInt();   // n=8, m=8
        char[][] b = new char[n][m];
        for (int i = 0; i < n; i++) b[i] = sc.next().toCharArray();
        int ans = Integer.MAX_VALUE;
        for (int r = 0; r <= n-8; r++) {        // n=m=8 → (r,c)=(0,0)만 검사
            for (int c = 0; c <= m-8; c++) {
                int cnt = 0;   // 이 영역이 'W로 시작하는 체스판'과 다른 칸 수
                for (int i = 0; i < 8; i++)
                    for (int j = 0; j < 8; j++) {
                        char expected = ((i+j) % 2 == 0) ? 'W' : 'B';
                        if (b[r+i][c+j] != expected) cnt++;   // 기대색과 다르면 +1
                    }
                ans = Math.min(ans, Math.min(cnt, 64-cnt));
                // 예) cnt=32 → B시작 비용=64-32=32 → min=32, 전체 최솟값 갱신
            }
        }
        System.out.println(ans);   // ✅ 출력: 다시 칠할 최소 칸 수
    }
}`},

{id:1260,title:'DFS와 BFS',type:'BFS/DFS',diff:'S2',
problem:'정점과 간선으로 이루어진 그래프를, 시작 정점 V에서 출발해 DFS(깊이 우선)와 BFS(너비 우선)로 각각 탐색하는 문제입니다. 다음에 갈 수 있는 정점이 여러 개라면 번호가 작은 정점부터 방문합니다.\n\n입력: 1행에 정점 수 N, 간선 수 M, 시작 정점 V. 이후 M개 줄에 간선으로 연결된 두 정점이 주어진다.\n출력: 1행에 DFS 방문 순서, 2행에 BFS 방문 순서',
summary:'그래프를 DFS와 BFS로 탐색한 순서 출력',
explain:'인접 리스트로 그래프를 저장합니다. 같은 깊이의 노드는 번호가 작은 것부터 방문하므로 정렬이 필요합니다. DFS는 재귀, BFS는 큐를 사용합니다.',
flow:`flowchart TD
A([시작]) --> B["N,M,V 입력 + 그래프 구성"]
B --> C["각 인접 리스트 정렬"]
C --> D["DFS(V) 실행"]
D --> E["방문 순서 출력"]
E --> F["방문 배열 초기화"]
F --> G["BFS(V) 실행 - 큐 사용"]
G --> H["방문 순서 출력"]
H --> I([종료])`,
code:`import java.util.*;
import java.io.*;

public class Main {
    // 인접 리스트: 각 정점에 연결된 정점들을 리스트로 저장 (간선이 적을 때 메모리 효율적)
    static List<Integer>[] graph;
    static boolean[] visited;   // 같은 정점을 두 번 방문하지 않도록 체크
    static StringBuilder sb = new StringBuilder();

    // [메서드 역할] 그래프를 DFS·BFS로 탐색한 방문 순서를 각각 출력
    public static void main(String[] args) throws Exception {
        // ▼ 예시 입력:  4 5 1 / 간선 1-2, 1-3, 1-4, 2-4, 3-4
        BufferedReader br = new BufferedReader(new InputStreamReader(System.in));
        StringTokenizer st = new StringTokenizer(br.readLine());
        int n = Integer.parseInt(st.nextToken());   // n=4 (정점 수)
        int m = Integer.parseInt(st.nextToken());   // m=5 (간선 수)
        int v = Integer.parseInt(st.nextToken());   // v=1 (시작 정점)
        graph = new ArrayList[n+1];
        for (int i = 1; i <= n; i++) graph[i] = new ArrayList<>();
        for (int i = 0; i < m; i++) {
            st = new StringTokenizer(br.readLine());
            int a = Integer.parseInt(st.nextToken());
            int b = Integer.parseInt(st.nextToken());
            graph[a].add(b); graph[b].add(a);
        }
        for (int i = 1; i <= n; i++) Collections.sort(graph[i]);
        // graph: 1→[2,3,4], 2→[1,4], 3→[1,4], 4→[1,2,3]
        visited = new boolean[n+1];
        dfs(v); sb.append('\\n');     // DFS 결과 한 줄
        visited = new boolean[n+1];
        bfs(v); sb.append('\\n');     // BFS 결과 한 줄
        System.out.print(sb);   // ✅ 출력:  1 2 4 3  (DFS) /  1 2 3 4  (BFS)
    }
    // [메서드 역할] DFS: 한 방향으로 끝까지 파고든 뒤 되돌아옴(재귀)
    static void dfs(int node) {
        visited[node] = true;
        sb.append(node).append(' ');
        for (int next : graph[node])
            if (!visited[next]) dfs(next);
        // 1 → 2 → 4 → 3  (작은 번호 + 깊이 우선) = "1 2 4 3"
    }
    // [메서드 역할] BFS: 가까운 정점부터 큐(FIFO)로 차례 방문
    static void bfs(int start) {
        Queue<Integer> q = new LinkedList<>();
        q.add(start); visited[start] = true;
        while (!q.isEmpty()) {
            int cur = q.poll();
            sb.append(cur).append(' ');
            for (int next : graph[cur])
                if (!visited[next]) { visited[next]=true; q.add(next); }
        }
        // 1 → (2,3,4 동시 적재) → "1 2 3 4"
    }
}`},

summary:'배추밭에서 배추흰지렁이가 몇 마리 필요한지 (연결 요소 수)',
explain:'배추가 있는 칸을 BFS로 탐색하며 연결 영역 수를 셉니다. 상하좌우로 인접한 배추는 하나의 영역입니다.',
flow:`flowchart TD

code:`import java.util.*;
import java.io.*;

public class Main {
    // 상하좌우 4방향 이동용 좌표 변화량 (dx[d], dy[d]를 짝지어 사용)
    static int[] dx={0,0,1,-1}, dy={1,-1,0,0};
    // [메서드 역할] 인접 배추 묶음(연결 요소) 수 = 필요한 지렁이 수 출력
    public static void main(String[] args) throws Exception {
        // ▼ 예시: T=1 / M=3 N=3 K=3 / 배추 좌표 (0,0) (1,0) (2,2)
        BufferedReader br = new BufferedReader(new InputStreamReader(System.in));
        int T = Integer.parseInt(br.readLine().trim());   // T=1
        StringBuilder sb = new StringBuilder();
        while (T-- > 0) {
            StringTokenizer st = new StringTokenizer(br.readLine());
            int M=Integer.parseInt(st.nextToken()), N=Integer.parseInt(st.nextToken()), K=Integer.parseInt(st.nextToken());  // M=3,N=3,K=3
            int[][] field = new int[N][M];
            boolean[][] visited = new boolean[N][M];
            for (int i = 0; i < K; i++) {
                st = new StringTokenizer(br.readLine());
                int x=Integer.parseInt(st.nextToken()), y=Integer.parseInt(st.nextToken());
                field[y][x] = 1;   // (0,0),(1,0),(2,2) → field[0][0],field[0][1],field[2][2]=1
            }
            int cnt = 0;
            for (int i = 0; i < N; i++) for (int j = 0; j < M; j++) {
                if (field[i][j] == 1 && !visited[i][j]) {
                    cnt++;   // 새 덩어리 발견
                    Queue<int[]> q = new LinkedList<>();
                    q.add(new int[]{i,j}); visited[i][j]=true;
                    while (!q.isEmpty()) {
                        int[] cur = q.poll();
                        for (int d = 0; d < 4; d++) {
                            int ni=cur[0]+dx[d], nj=cur[1]+dy[d];
                            if (ni>=0&&ni<N&&nj>=0&&nj<M&&field[ni][nj]==1&&!visited[ni][nj]) {
                                visited[ni][nj]=true; q.add(new int[]{ni,nj});
                            }
                        }
                    }
                }
                // 덩어리1: (0,0)+(1,0) 인접 → cnt=1 / 덩어리2: (2,2) 단독 → cnt=2
            }
            sb.append(cnt).append('\\n');
        }
        System.out.print(sb);   // ✅ 출력: 2
    }
}`},

code:`import java.util.*;
import java.io.*;

public class Main {
    static int[] dx={0,0,1,-1}, dy={1,-1,0,0};   // 상하좌우 4방향
    static int[][] map;            // 1이면 집이 있는 칸
    static boolean[][] visited;
    static int N;
    // [메서드 역할] 단지 수와 각 단지 가구 수(오름차순)를 출력
    public static void main(String[] args) throws Exception {
        // ▼ 예시: N=7, 7×7 지도(0/1) → 단지 3개, 크기 7·8·9
        BufferedReader br = new BufferedReader(new InputStreamReader(System.in));
        N = Integer.parseInt(br.readLine().trim());   // N=7
        map = new int[N][N]; visited = new boolean[N][N];
        for (int i = 0; i < N; i++) {
            String line = br.readLine().trim();
            for (int j = 0; j < N; j++) map[i][j] = line.charAt(j)-'0';  // "0110100"→[0,1,1,0,1,0,0]
        }
        List<Integer> sizes = new ArrayList<>();
        for (int i = 0; i < N; i++) for (int j = 0; j < N; j++) {
            if (map[i][j]==1 && !visited[i][j]) sizes.add(bfs(i,j));
            // 미방문 집을 만날 때마다 그 단지 가구 수를 sizes에 추가 → sizes=[8,9,7]
        }
        Collections.sort(sizes);   // 오름차순 정렬 → [7, 8, 9]
        StringBuilder sb = new StringBuilder();
        sb.append(sizes.size()).append('\\n');   // 단지 수 = 3
        for (int s : sizes) sb.append(s).append('\\n');
        System.out.print(sb);   // ✅ 출력: 3 / 7 / 8 / 9
    }
    // [메서드 역할] (r,c)에서 연결된 집을 모두 방문하며 가구 수 반환
    static int bfs(int r, int c) {
        Queue<int[]> q = new LinkedList<>();
        q.add(new int[]{r,c}); visited[r][c]=true;
        int cnt = 1;   // 시작 칸 자신 1채
        while (!q.isEmpty()) {
            int[] cur = q.poll();
            for (int d = 0; d < 4; d++) {
                int ni=cur[0]+dx[d], nj=cur[1]+dy[d];
                if (ni>=0&&ni<N&&nj>=0&&nj<N&&map[ni][nj]==1&&!visited[ni][nj]) {
                    visited[ni][nj]=true; q.add(new int[]{ni,nj}); cnt++;   // 인접 집마다 +1
                }
            }
        }
        return cnt;   // 이 단지의 총 가구 수
    }
}`},

public class Main {
    // [메서드 역할] N에서 K까지 가는 최소 시간(초) 출력 (BFS 최단경로)
    public static void main(String[] args) {
        // ▼ 예시 입력: 5 17
        Scanner sc = new Scanner(System.in);
        int n = sc.nextInt(), k = sc.nextInt();   // n=5, k=17
        int MAX = 100001;
        int[] dist = new int[MAX];                 // dist[x] = n→x 최소 시간
        Arrays.fill(dist, -1);                     // -1 = 미방문
        Queue<Integer> q = new LinkedList<>();
        q.add(n); dist[n] = 0;
        while (!q.isEmpty()) {
            int x = q.poll();
            if (x == k) { System.out.println(dist[x]); return; }
            for (int nx : new int[]{x-1, x+1, x*2}) {
                if (nx >= 0 && nx < MAX && dist[nx] == -1) {
                    dist[nx] = dist[x]+1; q.add(nx);
                }
            }
            // 5 → 4,6,10 (1초) → 3,7,8,9,11,12,20 …(2초) → … → 17 도달(4초)

code:`import java.util.*;
import java.io.*;

public class Main {
    // [메서드 역할] 모든 토마토가 익는 최소 일수 출력 (멀티소스 BFS, 불가 -1)
    public static void main(String[] args) throws Exception {
        // ▼ 예시: M=6 N=4, 우하단 한 칸만 익음(1) 나머지 0 → 모두 익는 데 8일
        BufferedReader br = new BufferedReader(new InputStreamReader(System.in));
        StringTokenizer st = new StringTokenizer(br.readLine());
        int M=Integer.parseInt(st.nextToken()), N=Integer.parseInt(st.nextToken());  // M=6, N=4
        int[][] box = new int[N][M];     // 1=익음, 0=안 익음, -1=토마토 없음
        int[][] dist = new int[N][M];    // dist[i][j] = 그 칸이 익기까지 걸린 날짜
        // 멀티소스 BFS: 처음부터 익은 토마토(1)들을 모두 큐에 넣고 동시에 퍼뜨린다
        Queue<int[]> q = new LinkedList<>();
        for (int i = 0; i < N; i++) {
            st = new StringTokenizer(br.readLine());
            for (int j = 0; j < M; j++) {
                box[i][j] = Integer.parseInt(st.nextToken());
                if (box[i][j] == 1) q.add(new int[]{i,j});   // 익은 토마토는 BFS 시작점
                else dist[i][j] = -1;   // 안 익었거나(0) 빈 칸(-1)은 아직 날짜 미정 표시
            }
        }
        int[] dx={0,0,1,-1}, dy={1,-1,0,0};   // 상하좌우
        int ans = 0;   // 모든 토마토가 익는 데 걸린 최대 날짜
        while (!q.isEmpty()) {
            int[] cur = q.poll();
            for (int d = 0; d < 4; d++) {
                int ni=cur[0]+dx[d], nj=cur[1]+dy[d];
                if (ni>=0&&ni<N&&nj>=0&&nj<M&&box[ni][nj]==0) {   // 인접한 '안 익은' 토마토만
                    box[ni][nj]=1;                          // 익힘
                    dist[ni][nj]=dist[cur[0]][cur[1]]+1;    // 현재 칸보다 하루 뒤에 익음
                    ans=Math.max(ans, dist[ni][nj]);        // 가장 늦게 익는 날짜 갱신
                    q.add(new int[]{ni,nj});
                }
            }
        }
        // BFS 종료 후에도 0이 남으면 고립된 토마토 → -1
        for (int[] row : box) for (int v : row) if (v==0) { System.out.println(-1); return; }
        System.out.println(ans);
        // 익은 토마토에서 한 칸씩 퍼져 가장 먼 칸까지 거리(=날짜) 누적 → ✅ 출력: 8
    }
}`},

code:`import java.util.*;
import java.io.*;

public class Main {
    // [메서드 역할] 3차원 상자에서 모두 익는 최소 일수 출력 (6방향 멀티소스 BFS)
    public static void main(String[] args) throws Exception {
        // ▼ 예시: M=4 N=3 H=2, 익은 토마토 1개 → 6방향으로 퍼져 모두 익는 일수
        BufferedReader br = new BufferedReader(new InputStreamReader(System.in));
        StringTokenizer st = new StringTokenizer(br.readLine());
        int M=Integer.parseInt(st.nextToken()), N=Integer.parseInt(st.nextToken()), H=Integer.parseInt(st.nextToken());  // M=4, N=3, H=2
        int[][][] box = new int[H][N][M];     // 2D 토마토에 층(H) 차원만 추가된 3차원 배열
        int[][][] dist = new int[H][N][M];
        // 2D 풀이와 동일한 멀티소스 BFS — 익은 토마토를 모두 큐에 넣고 시작
        Queue<int[]> q = new LinkedList<>();
        for (int h=0;h<H;h++) for (int i=0;i<N;i++) {
            st = new StringTokenizer(br.readLine());
            for (int j=0;j<M;j++) {
                box[h][i][j]=Integer.parseInt(st.nextToken());
                if(box[h][i][j]==1) q.add(new int[]{h,i,j});   // 익은 토마토 = 시작점
                else dist[h][i][j]=-1;
            }
        }
        // 2D의 상하좌우 4방향에 위층/아래층(±h)이 더해져 6방향
        int[] dh={0,0,0,0,1,-1}, di={0,0,1,-1,0,0}, dj={1,-1,0,0,0,0};
        int ans=0;   // 모두 익는 데 걸린 최대 날짜
        while (!q.isEmpty()) {
            int[] cur=q.poll();
            for(int d=0;d<6;d++){
                int nh=cur[0]+dh[d],ni=cur[1]+di[d],nj=cur[2]+dj[d];
                if(nh>=0&&nh<H&&ni>=0&&ni<N&&nj>=0&&nj<M&&box[nh][ni][nj]==0){   // 6방향 중 안 익은 칸
                    box[nh][ni][nj]=1;
                    dist[nh][ni][nj]=dist[cur[0]][cur[1]][cur[2]]+1;   // 하루 뒤에 익음
                    ans=Math.max(ans,dist[nh][ni][nj]);
                    q.add(new int[]{nh,ni,nj});
                }
            }
        }
        // 끝나도 안 익은(0) 칸이 있으면 모두 익힐 수 없음 → -1
        for(int[][]layer:box)for(int[]row:layer)for(int v:row)if(v==0){System.out.println(-1);return;}
        System.out.println(ans);
        // 2D와 동일하되 위/아래 층까지 6방향으로 퍼짐 → ✅ 출력: 모두 익는 최대 날짜
    }
}`},

{id:10026,title:'적록색약',type:'BFS/DFS',diff:'G5',
problem:'R(빨강)·G(초록)·B(파랑)으로 칠해진 N×N 그림이 있습니다. 같은 색끼리 상하좌우로 연결된 칸들을 하나의 구역이라 합니다. 일반인이 봤을 때의 구역 수와, 빨강·초록을 구분하지 못하는 적록색약(R과 G를 같은 색으로 봄)이 봤을 때의 구역 수를 각각 구하는 문제입니다.\n\n입력: 1행에 그림 크기 N, 이후 N개 줄에 각 칸의 색(R/G/B)이 주어진다.\n출력: 일반인이 보는 구역 수와 적록색약이 보는 구역 수를 공백으로 구분해 출력',
summary:'일반인과 적록색약자가 보는 구역 수 각각 구하기',
explain:'정상 시각: R,G,B를 각각 다른 색으로 BFS. 색약 시각: R과 G를 같은 색으로 취급하여 BFS. 두 경우 모두 연결 요소 수를 셉니다.',
flow:`flowchart TD
A([시작]) --> B["색상 그리드 입력"]
B --> C["일반 BFS: R/G/B 구분"]
C --> D["연결 요소 수 = normal"]
D --> E["색약 BFS: G를 R로 변환"]
E --> F["연결 요소 수 = weak"]
F --> G["normal weak 출력"]
G --> H([종료])`,
code:`import java.util.*;
import java.io.*;

public class Main {
    static int N;
    static int[] dx={0,0,1,-1}, dy={1,-1,0,0};   // 상하좌우
    // [메서드 역할] 일반인·적록색약이 보는 구역 수를 각각 출력
    public static void main(String[] args) throws Exception {
        // ▼ 예시: N=5, RRRBB/GGBBB/BBBRR/BBRRR/RRRRR → 일반 4구역, 색약 3구역
        BufferedReader br = new BufferedReader(new InputStreamReader(System.in));
        N = Integer.parseInt(br.readLine().trim());   // N=5
        char[][] grid = new char[N][N];
        for (int i = 0; i < N; i++) grid[i] = br.readLine().toCharArray();
        System.out.println(count(grid, false) + " " + count(grid, true));
        // 일반(R/G/B 구분)=4, 색약(R=G 취급)=3 → ✅ 출력: 4 3
    }
    // 인접한 같은 색끼리 묶은 구역(연결 요소) 수를 BFS로 센다
    static int count(char[][] grid, boolean weak) {
        char[][] g = new char[N][N];
        for (int i=0;i<N;i++) for (int j=0;j<N;j++)
            // 색약 모드면 G를 R로 바꿔 둘을 같은 색으로 취급 → 코드 한 벌로 두 경우 처리
            g[i][j] = (weak && grid[i][j]=='G') ? 'R' : grid[i][j];
        boolean[][] visited = new boolean[N][N];
        int cnt = 0;
        for (int i=0;i<N;i++) for (int j=0;j<N;j++) {
            if (!visited[i][j]) {   // 아직 안 묶인 칸 = 새로운 구역 시작
                cnt++;
                Queue<int[]> q = new LinkedList<>();
                q.add(new int[]{i,j}); visited[i][j]=true;
                while (!q.isEmpty()) {
                    int[] cur=q.poll();
                    for (int d=0;d<4;d++) {
                        int ni=cur[0]+dx[d], nj=cur[1]+dy[d];
                        // 범위 안 + 미방문 + '같은 색'일 때만 같은 구역으로 묶음
                        if(ni>=0&&ni<N&&nj>=0&&nj<N&&!visited[ni][nj]&&g[ni][nj]==g[cur[0]][cur[1]]){
                            visited[ni][nj]=true; q.add(new int[]{ni,nj});
                        }
                    }
                }
            }
        }
        return cnt;
    }
}`},

{id:11724,title:'연결 요소의 개수',type:'BFS/DFS',diff:'S2',
problem:'방향이 없는 그래프가 주어질 때, 서로 연결된 정점들의 묶음(연결 요소)이 몇 개인지 구하는 문제입니다. 어떤 정점에서 간선을 따라 도달할 수 있는 정점들끼리 하나의 연결 요소를 이룹니다.\n\n입력: 1행에 정점 수 N과 간선 수 M, 이후 M개 줄에 간선으로 연결된 두 정점이 주어진다.\n출력: 그래프의 연결 요소 개수',
summary:'방향 없는 그래프의 연결 요소 개수 구하기',
explain:'모든 노드를 순회하면서 방문하지 않은 노드에서 BFS를 시작합니다. BFS 시작 횟수가 연결 요소 수입니다.',
flow:`flowchart TD
A([시작]) --> B["그래프 입력"]
B --> C["모든 노드 순회"]
C --> D{미방문 노드?}
D -->|Yes| E["BFS 시작 + cnt++"]
E --> F["연결된 모든 노드 방문"]
F --> C
D -->|No| C
C -->|완료| G["cnt 출력"]
G --> H([종료])`,
code:`import java.util.*;
import java.io.*;

public class Main {
    // [메서드 역할] 방향 없는 그래프의 연결 요소 개수 출력
    public static void main(String[] args) throws Exception {
        // ▼ 예시: N=6 M=5 / 간선 1-2, 2-5, 5-1, 3-4, 4-6
        BufferedReader br = new BufferedReader(new InputStreamReader(System.in));
        StringTokenizer st = new StringTokenizer(br.readLine());
        int n=Integer.parseInt(st.nextToken()), m=Integer.parseInt(st.nextToken());  // n=6, m=5
        List<Integer>[] graph = new ArrayList[n+1];
        for (int i=1;i<=n;i++) graph[i]=new ArrayList<>();
        for (int i=0;i<m;i++) {
            st = new StringTokenizer(br.readLine());
            int a=Integer.parseInt(st.nextToken()), b=Integer.parseInt(st.nextToken());
            graph[a].add(b); graph[b].add(a);
        }
        // graph: 1↔2, 2↔5, 5↔1, 3↔4, 4↔6  →  덩어리 {1,2,5} 와 {3,4,6}
        boolean[] visited = new boolean[n+1];
        int cnt = 0;
        for (int i=1;i<=n;i++) {
            if (!visited[i]) {
                cnt++;   // 미방문 정점에서 새 덩어리 시작
                Queue<Integer> q = new LinkedList<>();
                q.add(i); visited[i]=true;
                while (!q.isEmpty()) {
                    int cur=q.poll();
                    for (int next:graph[cur]) if (!visited[next]) { visited[next]=true; q.add(next); }
                }
            }
            // i=1: {1,2,5} 방문 → cnt=1 / i=3: {3,4,6} 방문 → cnt=2
        }
        System.out.println(cnt);   // ✅ 출력: 2
    }
}`},

flow:`flowchart TD

G -->|No| I["최댓값 제거"]

H -->|Yes| D

D -->|완료| K{비어있음?}

code:`import java.util.*;
import java.io.*;

public class Main {
    // [메서드 역할] D 1=최댓값/D -1=최솟값 삭제 후, 비면 EMPTY 아니면 "최댓값 최솟값"
    public static void main(String[] args) throws Exception {
        // ▼ 예시: T=1 / k=7 / I 16, I -5643, D -1, D 1, D 1, I 123, D -1
        BufferedReader br = new BufferedReader(new InputStreamReader(System.in));
        int T = Integer.parseInt(br.readLine().trim());   // T=1
        StringBuilder sb = new StringBuilder();
        while (T-- > 0) {
            int k = Integer.parseInt(br.readLine().trim());   // k=7
            TreeMap<Integer,Integer> map = new TreeMap<>();   // <값, 개수>
            while (k-- > 0) {
                StringTokenizer st = new StringTokenizer(br.readLine());
                char op = st.nextToken().charAt(0);
                int n = Integer.parseInt(st.nextToken());
                if (op == 'I') {
                    map.merge(n, 1, Integer::sum);
                } else {
                    if (map.isEmpty()) continue;
                    int key = (n == 1) ? map.lastKey() : map.firstKey();
                    if (map.get(key) == 1) map.remove(key);
                    else map.put(key, map.get(key)-1);
                }
                // I 16,-5643 → {-5643,16} / D -1 → 최솟값 -5643 삭제 → {16}
                // D 1 → 최댓값 16 삭제 → {} / D 1 → 무시 / I 123 → {123} / D -1 → {}
            }
            if (map.isEmpty()) sb.append("EMPTY\\n");
            else sb.append(map.lastKey()).append(' ').append(map.firstKey()).append('\\n');
        }
        System.out.print(sb);   // ✅ 출력: EMPTY
    }
}`},

code:`import java.util.*;
import java.io.*;

public class Main {
    // [메서드 역할] 평균·중앙값·최빈값·범위를 구해 4줄 출력
    public static void main(String[] args) throws Exception {
        // ▼ 예시 입력:  5 / 1 / 3 / 8 / -2 / 2
        BufferedReader br = new BufferedReader(new InputStreamReader(System.in));
        int n = Integer.parseInt(br.readLine().trim());   // n=5
        int[] arr = new int[n];
        int[] freq = new int[8001];   // -4000~4000 → +4000 시프트해 빈도 카운트
        long sum = 0;
        for (int i = 0; i < n; i++) {
            arr[i] = Integer.parseInt(br.readLine().trim());
            freq[arr[i]+4000]++;
            sum += arr[i];
        }
        Arrays.sort(arr);   // arr=[-2,1,2,3,8], sum=12
        int mean = (int) Math.round((double)sum/n);   // 12/5=2.4 → 2
        int median = arr[n/2];   // arr[2]=2
        int maxFreq = 0;
        for (int f : freq) maxFreq = Math.max(maxFreq, f);   // 모두 1번 등장 → maxFreq=1
        int mode = 0; boolean found = false;
        for (int i = 0; i <= 8000; i++) {
            if (freq[i] == maxFreq) {
                if (!found) { mode = i-4000; found = true; }   // 첫 후보 -2 기억
                else { mode = i-4000; break; }                 // 두 번째 후보 1 → 최빈값
            }
        }
        int range = arr[n-1] - arr[0];   // 8 - (-2) = 10
        System.out.println(mean+"\\n"+median+"\\n"+mode+"\\n"+range);   // ✅ 출력: 2 / 2 / 1 / 10
    }
}`},

I -->|No| M["4사분면: offset += 절반²×3"]

code:`import java.util.Scanner;

public class Main {
    // [메서드 역할] Z 순서로 방문할 때 (r,c)가 몇 번째인지 출력
    public static void main(String[] args) {
        // ▼ 예시 입력: 2 3 1   (2^2 × 2^2 = 4×4 판)
        Scanner sc = new Scanner(System.in);
        int n = sc.nextInt(), r = sc.nextInt(), c = sc.nextInt();   // n=2, r=3, c=1
        System.out.println(solve(1 << n, r, c));   // 1<<2=4 → solve(4,3,1)
    }
    // [메서드 역할] size×size를 4사분면으로 나눠 (r,c)가 든 곳만 재귀로 추적
    static long solve(int size, int r, int c) {
        if (size == 1) return 0;
        int half = size / 2;
        long area = (long) half * half;   // 한 사분면의 칸 수
        if (r < half && c < half) return solve(half, r, c);                    // 1사분면(좌상)
        if (r < half && c >= half) return area + solve(half, r, c-half);       // 2사분면(우상)
        if (r >= half && c < half) return area*2 + solve(half, r-half, c);     // 3사분면(좌하)
        return area*3 + solve(half, r-half, c-half);                           // 4사분면(우하)
        // solve(4,3,1): 좌하 → 4*2 + solve(2,1,1)
        //   solve(2,1,1): 우하 → 1*3 + solve(1,0,0)=3
        //   → 8 + 3 = 11
    }
}`},

{id:14500,title:'테트로미노',type:'구현/시뮬',diff:'G4',
problem:'각 칸에 숫자가 적힌 N×M 보드가 있습니다. 정사각형 4개를 이어 붙인 도형인 테트로미노 한 개를(회전·대칭 모두 허용) 보드 위에 겹치지 않게 딱 한 번 놓을 때, 도형이 덮은 4칸의 숫자 합이 최대가 되도록 하는 문제입니다.\n\n입력: 1행에 N과 M, 이후 N개 줄에 각 칸의 숫자가 주어진다.\n출력: 테트로미노가 덮은 칸들의 합 중 최댓값',

flow:`flowchart TD
A([시작]) --> B["N×M 보드 입력"]
B --> C["모든 칸에서 DFS 시작"]
C --> D["현재 칸 방문 표시"]
D --> E{depth == 4?}
E -->|Yes| F["합 최댓값 갱신"]
E -->|No| G["4방향으로 DFS 재귀"]
G --> H["백트래킹 (방문 해제)"]
H --> C
F --> C
C -->|완료| I["최댓값 출력"]

code:`import java.util.*;
import java.io.*;

public class Main {
    static int[] dx={0,0,1,-1}, dy={1,-1,0,0};   // 상하좌우
    static int[][] board;
    static boolean[][] visited;
    static int N, M, ans = 0;   // ans: 어떤 테트로미노로 얻을 수 있는 칸 합의 최댓값
    // [메서드 역할] 테트로미노 하나를 놓아 덮은 칸 숫자 합의 최댓값 출력
    public static void main(String[] args) throws Exception {
        // ▼ 예시: N=4 M=5 보드 (각 칸 숫자 주어짐)
        BufferedReader br = new BufferedReader(new InputStreamReader(System.in));
        StringTokenizer st = new StringTokenizer(br.readLine());
        N=Integer.parseInt(st.nextToken()); M=Integer.parseInt(st.nextToken());   // N=4, M=5
        board=new int[N][M]; visited=new boolean[N][M];
        for(int i=0;i<N;i++){
            st=new StringTokenizer(br.readLine());
            for(int j=0;j<M;j++) board[i][j]=Integer.parseInt(st.nextToken());
        }
        for(int i=0;i<N;i++) for(int j=0;j<M;j++){
            visited[i][j]=true;
            dfs(i,j,1,board[i][j]);   // (i,j)에서 시작해 연결된 4칸 조합 탐색
            visited[i][j]=false;      // 다음 시작점 위해 방문 해제(백트래킹)
        }
        System.out.println(ans);   // ✅ 출력: 가능한 테트로미노 중 칸 합 최댓값
    }
    // [메서드 역할] depth칸까지 골랐을 때 4칸이면 합 갱신, 아니면 인접칸으로 확장(DFS)
    static void dfs(int r, int c, int depth, int sum){
        if(depth==4){ ans=Math.max(ans,sum); return; }   // 4칸 완성 → 합 비교
        for(int d=0;d<4;d++){
            int nr=r+dx[d], nc=c+dy[d];
            if(nr>=0&&nr<N&&nc>=0&&nc<M&&!visited[nr][nc]){
                visited[nr][nc]=true;
                dfs(nr,nc,depth+1,sum+board[nr][nc]);   // depth=1→2→3→4 로 한 칸씩 확장
                visited[nr][nc]=false;                  // 백트래킹: 다른 모양 시도
            }
        }
        // 주의: 이 경로형 DFS는 'ㅗ(T)' 모양은 못 만들어 → 실제 제출 시 별도 처리 필요
    }
}`},

{id:5430,title:'AC',type:'구현/시뮬',diff:'G5',
problem:'정수 배열에 두 가지 함수를 적용하는 문제입니다. R은 배열의 순서를 뒤집고, D는 맨 앞 원소 하나를 버립니다. 단, 비어 있는 배열에 D를 수행하면 에러가 발생합니다. 함수들이 이어진 명령 문자열 p를 앞에서부터 차례로 적용한 최종 배열을 구합니다(R이 연속되면 실제로 뒤집지 않고 방향만 바꿔 효율적으로 처리).\n\n입력: 1행에 테스트케이스 수 T. 각 케이스는 명령 문자열 p, 배열 크기 n, [x1,x2,...] 형태의 배열이 차례로 주어진다.\n출력: 케이스마다 최종 배열을 [...] 형태로 출력. 도중에 에러가 나면 error',

E -->|No D| G{덱 비어있음?}
G -->|Yes| H["error 출력 종료"]
G -->|No| I{reversed?}
I -->|Yes| J["덱 뒤에서 삭제"]
I -->|No| K["덱 앞에서 삭제"]
F --> D
J --> D

code:`import java.util.*;
import java.io.*;

public class Main {
    // [메서드 역할] R(뒤집기)·D(앞 삭제) 명령 수행 후 배열 출력 (불가하면 error)
    public static void main(String[] args) throws Exception {
        // ▼ 예시: T=1 / p="RDD" / n=4 / 배열 [1,2,3,4]
        BufferedReader br = new BufferedReader(new InputStreamReader(System.in));
        int T = Integer.parseInt(br.readLine().trim());   // T=1
        StringBuilder sb = new StringBuilder();
        while (T-- > 0) {
            String cmds = br.readLine().trim();          // cmds="RDD"
            int n = Integer.parseInt(br.readLine().trim());  // n=4
            String line = br.readLine().trim();          // line="[1,2,3,4]"
            Deque<Integer> dq = new ArrayDeque<>();       // dq=[1,2,3,4]
            if (n > 0) {
                String[] parts = line.substring(1, line.length()-1).split(",");
                for (String p : parts) dq.addLast(Integer.parseInt(p));
            }
            boolean reversed = false, error = false;
            for (char c : cmds.toCharArray()) {
                if (c == 'R') { reversed = !reversed; }   // 방향만 반전 (O(1))
                else {
                    if (dq.isEmpty()) { error = true; break; }
                    if (reversed) dq.pollLast(); else dq.pollFirst();
                }
                // 'R' → reversed=true (뒤집힌 상태)
                // 'D' → 뒤에서 삭제: 4 제거 → dq=[1,2,3]
                // 'D' → 뒤에서 삭제: 3 제거 → dq=[1,2]
            }
            if (error) { sb.append("error\\n"); continue; }
            StringJoiner sj = new StringJoiner(",","[","]");
            if (reversed) { Integer[] arr=dq.toArray(new Integer[0]); for(int i=arr.length-1;i>=0;i--) sj.add(String.valueOf(arr[i])); }
            else for (int v : dq) sj.add(String.valueOf(v));
            sb.append(sj).append('\\n');
            // reversed=true → 남은 [1,2]를 역순으로 → ✅ 출력: [2,1]
        }
        System.out.print(sb);
    }
}`},

G -->|Yes| E

H -->|No| I

J -->|Yes| K["이동 수 출력"]
J -->|No| L{미방문?}
L -->|Yes| M["큐에 추가"]
L -->|No| E

code:`import java.util.*;
import java.io.*;

public class Main {
    // [메서드 역할] 1번 칸에서 100번 칸까지 최소 주사위 횟수 출력 (BFS)
    public static void main(String[] args) throws Exception {
        // ▼ 예시: 사다리 3개, 뱀 7개 → 1번에서 100번까지 최소 3번
        BufferedReader br = new BufferedReader(new InputStreamReader(System.in));
        StringTokenizer st = new StringTokenizer(br.readLine());
        int N=Integer.parseInt(st.nextToken()), M=Integer.parseInt(st.nextToken());  // N=3(사다리), M=7(뱀)
        // move[x] = x칸에 사다리/뱀이 있으면 도착 칸, 없으면 0
        int[] move = new int[101];
        for (int i = 0; i < N+M; i++) {   // 사다리·뱀 모두 "from→to 이동"이라 똑같이 처리
            st = new StringTokenizer(br.readLine());
            int from=Integer.parseInt(st.nextToken()), to=Integer.parseInt(st.nextToken());
            move[from] = to;
        }
        int[] dist = new int[101];   // dist[x] = 1번 칸에서 x까지의 최소 주사위 횟수
        Arrays.fill(dist, -1);       // -1 = 미방문
        // BFS 최단경로: 한 번에 한 칸씩(주사위 한 번씩) 퍼지므로 처음 도달 = 최소 횟수
        Queue<Integer> q = new LinkedList<>();
        q.add(1); dist[1] = 0;
        while (!q.isEmpty()) {
            int cur = q.poll();
            for (int dice = 1; dice <= 6; dice++) {   // 주사위 눈 1~6 모두 시도
                int next = cur + dice;
                if (next > 100) continue;             // 100을 넘는 이동은 불가
                if (move[next] != 0) next = move[next];   // 사다리는 위로/뱀은 아래로 즉시 이동
                if (dist[next] == -1) {               // 아직 안 가본 칸만
                    dist[next] = dist[cur]+1;
                    if (next == 100) { System.out.println(dist[next]); return; }   // ✅ 출력: 3
                    q.add(next);
                }
            }
            // 1 → 주사위로 2~7 도달(1번) → 사다리 점프 … → 최소 3번 만에 100 도달
        }
    }
}`},

code:`import java.util.*;

{id:8002,title:'주가 유지 시간 · 단조 스택',type:'주식/금융',diff:'S3',
problem:'매 시점의 주가가 주어진다. 각 시점에서 가격이 "떨어지지 않고 유지된" 시간(초)을 구하시오. 끝까지 안 떨어지면 남은 시간이다.\n\n입력: 1행 N, 2행 N개의 가격\n출력: 각 시점의 유지 시간(공백 구분)',
summary:'단조 스택으로 "떨어지는 순간"을 O(N)에 찾기',
explain:'스택에 인덱스를 쌓고, 현재 가격이 스택 맨 위 가격보다 낮으면 pop하며 "현재 시점 - 그 시점" 을 유지 시간으로 기록합니다. 끝까지 남은 인덱스는 마지막까지 유지된 것.',
flow:`flowchart TD
A([시작]) --> B["빈 스택(인덱스)"]
B --> C["시점 i 순회"]
C --> D{"스택top 가격 > 현재가?"}
D -->|Yes| E["pop, ans=i-그때"]
E --> D
D -->|No| F["i push"]
F --> C
C -->|끝| G["남은 인덱스 마무리 후 출력"]
G --> H([종료])`,
code:`import java.util.*;
import java.io.*;

public class Main {
    // [메서드 역할] 각 시점 가격이 유지된 시간(초) 출력
    public static void main(String[] args) throws Exception {
        // ▼ 예시 입력:  5 / 1 2 3 2 3
        BufferedReader br = new BufferedReader(new InputStreamReader(System.in));
        int n = Integer.parseInt(br.readLine().trim());
        int[] p = new int[n];
        StringTokenizer st = new StringTokenizer(br.readLine());
        for (int i = 0; i < n; i++) p[i] = Integer.parseInt(st.nextToken());
        int[] ans = new int[n];
        Deque<Integer> stack = new ArrayDeque<>();   // 인덱스 보관
        for (int i = 0; i < n; i++) {
            while (!stack.isEmpty() && p[stack.peek()] > p[i]) {
                int j = stack.pop();
                ans[j] = i - j;          // j 시점은 i에서 가격이 떨어짐
            }
            stack.push(i);
        }
        while (!stack.isEmpty()) {        // 끝까지 안 떨어진 시점
            int j = stack.pop();
            ans[j] = n - 1 - j;
        }
        StringBuilder sb = new StringBuilder();
        for (int a : ans) sb.append(a).append(' ');
        System.out.println(sb.toString().trim());   // ✅ 출력: 4 3 1 1 0
    }
}`},

summary:'최대 힙(아래 절반) + 최소 힙(위 절반)으로 중앙값 유지',
explain:'아래 절반은 최대 힙, 위 절반은 최소 힙에 담고 두 힙의 크기를 ±1로 균형 맞추면, 중앙값은 항상 아래 절반의 최댓값입니다. 매 삽입 O(log N).',
flow:`flowchart TD
A([시작]) --> B["x를 적절한 힙에 add"]
B --> C["두 힙 크기 균형 맞추기"]
C --> D["중앙값 = 아래힙.peek 출력"]
D --> B
B -->|끝| E([종료])`,
code:`import java.util.*;
import java.io.*;

public class Main {
    // [메서드 역할] 주가가 들어올 때마다 중앙값 출력
    public static void main(String[] args) throws Exception {
        // ▼ 예시 입력:  5 / 5 15 1 3 8
        BufferedReader br = new BufferedReader(new InputStreamReader(System.in));
        int n = Integer.parseInt(br.readLine().trim());
        StringTokenizer st = new StringTokenizer(br.readLine());
        PriorityQueue<Integer> lo = new PriorityQueue<>(Collections.reverseOrder()); // 아래 절반(최대 힙)
        PriorityQueue<Integer> hi = new PriorityQueue<>();                            // 위 절반(최소 힙)
        StringBuilder sb = new StringBuilder();
        for (int i = 0; i < n; i++) {
            int x = Integer.parseInt(st.nextToken());
            if (lo.isEmpty() || x <= lo.peek()) lo.add(x); else hi.add(x);
            if (lo.size() > hi.size() + 1) hi.add(lo.poll());   // 균형
            else if (hi.size() > lo.size()) lo.add(hi.poll());
            sb.append(lo.peek()).append('\\n');                 // 중앙값
        }
        System.out.print(sb);   // ✅ 출력: 5 / 5 / 5 / 3 / 5
    }
}`},

code:`import java.util.*;

public class Main {
    // [메서드 역할] 예산 내 기대수익 합의 최댓값 (완전탐색)
    public static void main(String[] args) throws Exception {
        // ▼ 예시 입력:  3 10 / 가격 4 6 5 / 수익 5 6 4
        BufferedReader br = new BufferedReader(new InputStreamReader(System.in));
        StringTokenizer st = new StringTokenizer(br.readLine());
        int n = Integer.parseInt(st.nextToken());
        int budget = Integer.parseInt(st.nextToken());
        int[] cost = new int[n], gain = new int[n];
        st = new StringTokenizer(br.readLine());
        for (int i = 0; i < n; i++) cost[i] = Integer.parseInt(st.nextToken());
        st = new StringTokenizer(br.readLine());
        for (int i = 0; i < n; i++) gain[i] = Integer.parseInt(st.nextToken());
        int best = 0;
        for (int mask = 0; mask < (1 << n); mask++) {   // 모든 부분집합
            int c = 0, g = 0;
            for (int i = 0; i < n; i++)
                if ((mask & (1 << i)) != 0) { c += cost[i]; g += gain[i]; }
            if (c <= budget) best = Math.max(best, g);
        }
        System.out.println(best);   // ✅ 출력: 11  (가격 4+6=10 이내, 수익 5+6)
    }
}`},

problem:'종목 번호 1~N 중에서 정확히 K개를 골라 만들 수 있는 모든 포트폴리오(조합)를 사전순으로 출력하시오.\n\n입력: N K\n출력: 가능한 조합들(한 줄에 하나)',
summary:'백트래킹으로 K개 조합 생성',
explain:'시작 번호부터 하나씩 고르며 다음은 그 다음 번호부터 선택해(중복·순서 방지) K개를 채우면 출력합니다. 조합 생성의 기본 패턴.',
flow:`flowchart TD
A([시작]) --> B["comb(start, cnt)"]
B --> C{"cnt == K?"}
C -->|Yes| D["조합 출력"]
C -->|No| E["i=start..N 고르고 comb(i+1, cnt+1)"]
E --> B
D --> F([종료])`,
code:`import java.util.*;
import java.io.*;

public class Main {
    static int n, k;
    static int[] pick;
    static StringBuilder sb = new StringBuilder();
    // [메서드 역할] 1..N 중 K개를 고르는 모든 조합을 사전순 출력
    public static void main(String[] args) throws Exception {
        // ▼ 예시 입력:  4 2
        BufferedReader br = new BufferedReader(new InputStreamReader(System.in));
        StringTokenizer st = new StringTokenizer(br.readLine());
        n = Integer.parseInt(st.nextToken());
        k = Integer.parseInt(st.nextToken());
        pick = new int[k];
        comb(1, 0);
        System.out.print(sb);   // ✅ 출력: 1 2 / 1 3 / 1 4 / 2 3 / 2 4 / 3 4
    }
    // [메서드 역할] start부터 골라 cnt개 채우면 출력
    static void comb(int start, int cnt) {
        if (cnt == k) {
            for (int x : pick) sb.append(x).append(' ');
            sb.append('\\n');
            return;
        }
        for (int i = start; i <= n; i++) {
            pick[cnt] = i;
            comb(i + 1, cnt + 1);   // 다음은 i+1부터
        }
    }
}`},

problem:'금액 단위 배열과 목표 금액 T가 주어진다. 단위들을 (중복 사용 허용) 더해 정확히 T를 만드는 경우의 수를 구하시오. (순서가 다른 건 같은 것으로 봄)\n\n입력: 1행 N T, 2행 N개의 단위\n출력: 경우의 수',
summary:'DFS/백트래킹으로 조합 합이 T가 되는 경우 세기',
explain:'각 단위를 "더 쓰거나" / "다음 단위로 넘어가거나" 두 갈래로 재귀합니다. 합이 T면 +1, 초과하거나 단위가 끝나면 멈춤. 같은 단위를 연속해 쓸 수 있어 중복 조합을 셉니다.',
flow:`flowchart TD
A([시작]) --> B["dfs(idx, sum)"]
B --> C{"sum == T?"}
C -->|Yes| D["count++"]
C -->|No| E{"sum>T or 끝?"}
E -->|Yes| F["중단"]
E -->|No| G["dfs(idx,sum+coin) / dfs(idx+1,sum)"]
G --> B
D --> H([종료])`,
code:`import java.util.*;
import java.io.*;

public class Main {
    static int[] coin;
    static int target, count = 0;
    // [메서드 역할] 단위들을 더해 목표 금액을 만드는 경우의 수
    public static void main(String[] args) throws Exception {
        // ▼ 예시 입력:  3 5 / 1 2 5
        BufferedReader br = new BufferedReader(new InputStreamReader(System.in));
        StringTokenizer st = new StringTokenizer(br.readLine());
        int n = Integer.parseInt(st.nextToken());
        target = Integer.parseInt(st.nextToken());
        coin = new int[n];
        st = new StringTokenizer(br.readLine());
        for (int i = 0; i < n; i++) coin[i] = Integer.parseInt(st.nextToken());
        dfs(0, 0);
        System.out.println(count);   // ✅ 출력: 4
    }
    // [메서드 역할] idx 이후 단위로 sum을 만들며 T 도달 경우 수 세기
    static void dfs(int idx, int sum) {
        if (sum == target) { count++; return; }
        if (sum > target || idx == coin.length) return;
        dfs(idx, sum + coin[idx]);   // 현재 단위 더 쓰기
        dfs(idx + 1, sum);           // 다음 단위로
    }
}`},

flow:`flowchart TD

        int k = Integer.parseInt(st.nextToken());

{id:8010,title:'매매 일지 시뮬 · 구현',type:'주식/금융',diff:'S2',
problem:'매수(BUY 단가 수량)·매도(SELL 단가 수량) 명령이 순서대로 주어진다. 매수 시 평단가를 갱신하고, 매도 시 (매도가-평단가)×수량을 실현 손익에 더한다. 최종 실현 손익을 출력하시오.\n\n입력: 1행 명령 수 Q, 이후 Q행 명령\n출력: 최종 실현 손익',
summary:'평단가(가중평균) 갱신 + 매도 시 실현손익 누적',
explain:'매수하면 보유수량과 매입원가 합을 늘립니다(평단가=원가합/수량). 매도하면 (매도가-평단가)×수량을 실현손익에 더하고, 원가도 평단가만큼 줄입니다.',
flow:`flowchart TD
A([시작]) --> B["명령 반복"]
B --> C{"BUY?"}
C -->|Yes| D["수량·원가합 증가"]
C -->|No| E["실현손익 += (매도가-평단)×수량"]
D --> B
E --> B
B -->|끝| F["실현손익 출력"]
F --> G([종료])`,
code:`import java.util.*;
import java.io.*;

public class Main {
    // [메서드 역할] 매수/매도 명령 처리 후 실현 손익 출력
    public static void main(String[] args) throws Exception {
        // ▼ 예시:  3 / BUY 100 10 / BUY 120 10 / SELL 130 15
        BufferedReader br = new BufferedReader(new InputStreamReader(System.in));
        int q = Integer.parseInt(br.readLine().trim());
        long shares = 0, costSum = 0, realized = 0;   // 보유수량, 매입원가합, 실현손익
        while (q-- > 0) {
            StringTokenizer st = new StringTokenizer(br.readLine());
            String cmd = st.nextToken();
            long price = Long.parseLong(st.nextToken());
            long qty = Long.parseLong(st.nextToken());
            if (cmd.equals("BUY")) {
                shares += qty; costSum += price * qty;        // 평단가용 누적
            } else { // SELL
                long avg = costSum / shares;                  // 평단가
                realized += (price - avg) * qty;              // 실현 손익
                shares -= qty; costSum -= avg * qty;
            }
        }
        System.out.println(realized);   // ✅ 출력: 300  (평단 110, 130에 15주)
    }
}`},

code:`import java.util.*;
import java.io.*;
import java.util.stream.*;

public class Main {
    // [메서드 역할] 상승(양수) 수익률만 출력
    public static void main(String[] args) throws Exception {

{id:9018,title:'종목별 거래대금 합 (groupingBy)',type:'스트림',diff:'B2',
problem:'각 거래의 "종목코드 거래대금"이 N줄 주어진다. 종목별 거래대금 합계를 종목코드 사전순으로 출력하시오.\n\n입력: 1행 N, 이후 N행 "코드 금액"\n출력: 종목별 합계',
summary:'groupingBy(코드) + summingInt(금액)',
explain:'각 줄을 "코드, 금액"으로 만든 뒤 Collectors.groupingBy(코드, summingInt(금액))으로 종목별 합을 구합니다. TreeMap으로 모으면 사전순 정렬됩니다.',
flow:`flowchart TD
A([시작]) --> B["거래 줄들을 스트림으로"]
B --> C["groupingBy(코드, summingInt(금액))"]
C --> D["Map 코드→합계"]
D --> E["사전순 출력"]
E --> F([종료])`,
code:`import java.util.*;
import java.io.*;
import java.util.stream.*;

public class Main {
    // [메서드 역할] 종목별 거래대금 합을 사전순 출력
    public static void main(String[] args) throws Exception {
        // ▼ 예시:  4 / A 100 / B 200 / A 50 / B 30
        BufferedReader br = new BufferedReader(new InputStreamReader(System.in));
        int n = Integer.parseInt(br.readLine().trim());
        List<String> lines = new ArrayList<>();
        for (int i = 0; i < n; i++) lines.add(br.readLine());
        Map<String, Integer> sum = lines.stream()
            .map(s -> s.split(" "))
            .collect(Collectors.groupingBy(
                a -> a[0], TreeMap::new,
                Collectors.summingInt(a -> Integer.parseInt(a[1]))));
        StringBuilder sb = new StringBuilder();
        sum.forEach((code, amt) -> sb.append(code).append(' ').append(amt).append('\\n'));
        System.out.print(sb);   // ✅ 출력: A 150 / B 230
    }
}`},

// HTML 특수문자 이스케이프 (문제에 <x:y> 같은 표기가 있어 필수)
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
// 입력 스펙 안의 "N행 …, M행 …" 을 줄바꿈으로 분리해 가독성 향상
function formatIO(s) {
  let t = escHtml(s.trim());
  t = t.replace(/,\s*(?=\d+행)/g, '\n');                 // ", 2행" → 줄바꿈
  t = t.replace(/\s*(?:또는|혹은)\s*/g, ' <span class="vsep">|</span> ');
  return t;
}

// 비개발자 설명을 [요약 + 단계 + 참고]로 렌더
function renderBeginner(text) {
  if (!text) return '';
  let html = '<div class="beginner-title">🔰 비개발자도 이해하는 코드 설명</div>';
  text.split('\n').map(s => s.trim()).filter(Boolean).forEach(part => {
    if (/^\(/.test(part)) { html += `<div class="bg-note">${escHtml(part)}</div>`; return; }
    if (/[①②③④⑤]/.test(part)) {
      const steps = part.split(/(?=[①②③④⑤])/).map(s => s.replace(/^[①②③④⑤]\s*/, '').replace(/\s*→\s*$/, '').trim()).filter(Boolean);
      html += '<ol class="bg-steps">' + steps.map(s => `<li>${escHtml(s)}</li>`).join('') + '</ol>';
    } else {
      html += `<div class="bg-lead">${escHtml(part)}</div>`;
    }
  });
  return html;
}

  return escHtml(c).replace(/(\/\/.*)$/gm, '<span class="cm">$1</span>');
}
// 동작 트레이스를 [코드 줄 + 그림]의 세로 순서도로 렌더 (박스/격자 자동 판별)
// 값마다 고유 색 (같은 값 = 같은 색)
function valHue(v) { let n = 0, s = String(v); for (const c of s) n = (n * 31 + c.charCodeAt(0)) >>> 0; return n % 360; }
function cellHtml(v, hi, nx) {
  const hue = valHue(v);
  const style = `background:hsl(${hue} 78% 93%);border-color:hsl(${hue} 55% 70%);color:hsl(${hue} 50% 28%)`;
  return `<span class="tr-cell${hi ? ' hi' : ''}${nx ? ' nx' : ''}" style="${style}">${nx ? '<span class="nx-crown">👑</span>' : ''}${escHtml(String(v))}</span>`;
}
// 비교 그림 (compare)
function renderCmp(c) {
  return `<div class="cmp-row"><span class="cmp-chip" style="background:hsl(${valHue(c.a)} 78% 93%)">${escHtml(String(c.a))}</span>`
    + `<span class="cmp-vs">⚖️ 비교</span>`
    + `<span class="cmp-chip" style="background:hsl(${valHue(c.b)} 78% 93%)">${escHtml(String(c.b))}</span>`
    + (c.note ? `<span class="cmp-note">${escHtml(c.note)}</span>` : '') + '</div>';
}
// 한 단계 카드
function renderStep(s, t) {
  let h = `<div class="fstep"><div class="fs-op">${escHtml(s.op)}</div>`;
  if (s.code) h += `<div class="fs-code">${fmtCode(s.code)}</div>`;
  if (s.cmp)  h += renderCmp(s.cmp);
  h += '<div class="fs-boxes">';
  if (s.rows) {
    h += `<div class="gt-grid" style="grid-template-columns:repeat(${s.rows[0].length},1fr)">`;
    s.rows.forEach(row => { for (const ch of row) h += `<span class="gt-cell ${GC[ch] || 'gc-empty'}"></span>`; });
    h += '</div>';
  } else if (s.box) {
    const op = s.op || '';
    if (/(?:push|넣기|add|쌓기)|^I\s/.test(op))      h += '<span class="fs-dir in">⬇ 넣기</span>';
    else if (/(?:pop|빼기|제거|삭제)|^D\s/.test(op)) h += '<span class="fs-dir out">⬆ 꺼내기</span>';
    const st = DS[t.struct];
    const noIdx = st ? st.no(s.box) : -1;
    const inner = s.box.length === 0 ? '<span class="tr-empty">🗑 비어 있음</span>'
      : s.box.map((v, i) => cellHtml(v, s.hi === i, noIdx === i)).join('');
    if (st) {
      h += `<div class="ds ${st.cls}"><div class="ds-head">${st.icon} <b>${escHtml(st.name)}</b></div><div class="ds-body">${inner}</div>`;
      if (noIdx >= 0) h += `<div class="ds-next">👑 다음에 나갈 값: <b>${escHtml(String(s.box[noIdx]))}</b></div>`;
      h += '</div>';
    } else h += inner;
  }
  h += '</div>';
  if (s.out != null) h += `<div class="tr-out">출력 ${escHtml(String(s.out))}</div>`;
  if (s.note)        h += `<div class="tr-note">${escHtml(s.note)}</div>`;
  return h + '</div>';
}
function renderTraceBox(t) {
  if (!t) return '';
  let h = `<div class="trace-title">🎬 코드 동작 따라가기<span class="trace-in">입력: ${escHtml(t.input || '')}</span></div>`;
  if (t.legend) h += `<div class="trace-legend">📌 ${escHtml(t.legend)}</div>`;
  h += '<div class="flow-steps">';
  let lf = -1, lt = -1;
  if (LOOP_IDS.has(t.id)) t.steps.forEach((s, i) => { if (!/^(입력|출력|결과)/.test(s.op || '')) { if (lf < 0) lf = i; lt = i; } });
  t.steps.forEach((s, i) => {
    if (i === lf) h += `<div class="loop-frame"><div class="loop-head">🔁 ${escHtml(t.loopLabel || '반복')}</div>`;
    h += renderStep(s, t);
    if (i === lt) h += '<div class="loop-back">↺ 다음 차례로 다시 반복</div></div>';
  });
  return h + '</div>';
}
