<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>백준 Class 1~3 알고리즘</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#c9d1d9;font-family:'Segoe UI',sans-serif;min-height:100vh}
header{background:#161b22;border-bottom:1px solid #30363d;padding:20px 32px;display:flex;align-items:center;gap:16px}
header h1{font-size:1.6rem;color:#f0f6fc}
header p{color:#8b949e;font-size:.95rem}
.filters{padding:20px 32px;display:flex;flex-wrap:wrap;gap:8px;background:#0d1117;position:sticky;top:0;z-index:10;border-bottom:1px solid #21262d}
.filter-btn{padding:6px 16px;border-radius:20px;border:1px solid #30363d;background:#161b22;color:#8b949e;cursor:pointer;font-size:.85rem;transition:all .2s}
.filter-btn:hover{border-color:#58a6ff;color:#58a6ff}
.filter-btn.active{background:#1f6feb;border-color:#1f6feb;color:#fff}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;padding:24px 32px}
.card{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:16px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.4);border-color:#58a6ff}
.card-type{font-size:.7rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px}
.card-id{font-size:.8rem;color:#8b949e;margin-bottom:4px}
.card-title{font-size:1rem;font-weight:600;color:#f0f6fc;margin-bottom:8px}
.card-summary{font-size:.78rem;color:#8b949e;line-height:1.5}
.diff-badge{position:absolute;top:12px;right:12px;font-size:.7rem;font-weight:700;padding:2px 7px;border-radius:4px;color:#fff}
.card-bar{position:absolute;bottom:0;left:0;right:0;height:3px}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:none;align-items:center;justify-content:center;padding:16px}
.overlay.show{display:flex}
.modal{background:#161b22;border:1px solid #30363d;border-radius:14px;width:min(800px,100%);max-height:90vh;display:flex;flex-direction:column;overflow:hidden}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;border-bottom:1px solid #21262d}
.modal-title{font-size:1.15rem;font-weight:700;color:#f0f6fc}
.modal-badge{font-size:.75rem;font-weight:700;padding:3px 10px;border-radius:6px;color:#fff;margin-left:10px}
.close-btn{background:none;border:none;color:#8b949e;font-size:1.5rem;cursor:pointer;padding:0 6px;line-height:1}
.close-btn:hover{color:#f0f6fc}
.tabs{display:flex;gap:0;border-bottom:1px solid #21262d}
.tab{padding:12px 24px;background:none;border:none;color:#8b949e;cursor:pointer;font-size:.9rem;border-bottom:2px solid transparent;transition:all .2s}
.tab.active{color:#58a6ff;border-bottom-color:#58a6ff}
.tab-content{padding:24px;overflow-y:auto;flex:1}
.tab-content.hidden{display:none}
.explain-text{font-size:.9rem;line-height:1.8;color:#c9d1d9;margin-bottom:24px;background:#0d1117;padding:16px;border-radius:8px;border-left:3px solid #58a6ff}
.problem-box{background:#0d1117;padding:16px;border-radius:8px;border-left:3px solid #2ea043;margin-bottom:18px}
.problem-label{font-size:.8rem;font-weight:700;color:#2ea043;margin-bottom:8px;letter-spacing:.03em}
.problem-text{font-size:.9rem;line-height:1.8;color:#c9d1d9;white-space:pre-line}
/* 구조화된 문제 표시 */
.problem-desc{margin-bottom:16px}
.pd-lead{font-size:.96rem;line-height:1.7;color:#f0f6fc;font-weight:600;margin-bottom:11px}
.pd-list{list-style:none;display:flex;flex-direction:column;gap:8px;margin:0}
.pd-list li{position:relative;padding-left:19px;font-size:.9rem;line-height:1.65;color:#c9d1d9}
.pd-list li::before{content:"";position:absolute;left:3px;top:8px;width:6px;height:6px;border-radius:50%;background:#3fb950}
.pd-eg{font-size:.85rem;line-height:1.6;color:#9da7b3;background:#161b22;border-left:2px solid #6e7681;padding:8px 13px;border-radius:0 6px 6px 0;margin:9px 0}
.pd-eg b{color:#adbac7}
.problem-desc strong{color:#79c0ff;font-weight:700}
.io-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.io-box{background:#161b22;border:1px solid #21262d;border-radius:8px;padding:11px 14px}
.io-label{font-size:.72rem;font-weight:700;letter-spacing:.04em;margin-bottom:7px;display:inline-block;padding:2px 9px;border-radius:5px}
.io-label.in{color:#58a6ff;background:rgba(88,166,255,.13)}
.io-label.out{color:#3fb950;background:rgba(63,185,80,.13)}
.io-text{font-size:.85rem;line-height:1.7;color:#c9d1d9;white-space:pre-line}
.io-text .vsep{color:#6e7681}
@media(max-width:600px){ .io-grid{grid-template-columns:1fr} }
#mermaidChart{margin-top:8px;text-align:center;overflow-x:auto}
#mermaidChart svg{max-width:100%}
.code-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.copy-btn{padding:6px 14px;background:#21262d;border:1px solid #30363d;color:#8b949e;border-radius:6px;cursor:pointer;font-size:.8rem;transition:all .2s}
.copy-btn:hover{background:#30363d;color:#f0f6fc}
.copy-btn.copied{background:#238636;border-color:#238636;color:#fff}
pre{margin:0;border-radius:8px;overflow-x:auto}
pre code{font-size:.85rem;font-family:'Consolas',monospace;line-height:1.55}
/* 주석 종류별 색 구분 (가독성) */
pre code .hljs-comment{font-style:normal;color:#7d8590}
.hljs-comment.cm-role{color:#79c0ff;font-weight:600}        /* [메서드 역할] */
.hljs-comment.cm-eg{color:#e3b341}                          /* ▼ 예시 입력 */
.hljs-comment.cm-out{color:#3fb950;font-weight:600}         /* ✅ 출력 */
.hljs-comment.cm-note{color:#6e7781}                        /* 일반 트레이스 주석 */
/* 비개발자용 코드 설명 박스 */
.beginner-box{background:#0d1117;border:1px solid rgba(31,111,235,.4);border-left:3px solid #1f6feb;border-radius:8px;padding:14px 17px;margin-bottom:16px}
.beginner-title{font-size:.83rem;font-weight:700;color:#58a6ff;margin-bottom:10px;letter-spacing:.02em}
.bg-lead{font-size:.91rem;line-height:1.6;color:#f0f6fc;font-weight:600;margin-bottom:11px}
.bg-steps{list-style:none;counter-reset:bg;display:flex;flex-direction:column;gap:8px;margin:0}
.bg-steps li{counter-increment:bg;position:relative;padding-left:29px;font-size:.88rem;line-height:1.6;color:#c9d1d9}
.bg-steps li::before{content:counter(bg);position:absolute;left:0;top:1px;width:20px;height:20px;background:#1f6feb;color:#fff;border-radius:50%;font-size:.7rem;font-weight:700;display:flex;align-items:center;justify-content:center}
.bg-note{font-size:.82rem;color:#8b949e;margin-top:9px;line-height:1.55;padding-left:2px}
/* 📖 이야기(소설처럼 읽기) 탭 */
.story{max-width:680px;margin:0 auto;color:#c9d1d9}
.story-hd{margin-bottom:22px;padding-bottom:16px;border-bottom:1px solid #21262d}
.story-hd h3{font-size:1.35rem;color:#f0f6fc;font-weight:800;margin-bottom:7px;letter-spacing:-.01em}
.story-hd .sub{font-size:.86rem;color:#8b949e;line-height:1.6}
.story-ch{font-size:.78rem;font-weight:800;letter-spacing:.06em;color:#d29922;margin:26px 0 10px;display:flex;align-items:center;gap:8px}
.story-ch::before{content:"";width:16px;height:2px;background:#d29922;border-radius:2px}
.story p{font-size:1.02rem;line-height:1.95;margin-bottom:15px;color:#c9d1d9;letter-spacing:.005em}
.story p:first-letter{}
.story .lead::first-letter{font-size:2.4rem;font-weight:800;color:#d29922;float:left;line-height:1;padding:2px 10px 0 0}
.story code{font-family:'Consolas',monospace;font-size:.86rem;background:#161b22;color:#79c0ff;border:1px solid #21262d;border-radius:5px;padding:1px 6px}
.story b{color:#f0f6fc;font-weight:700}
.story .hl{color:#e3b341;font-weight:700}
.story .aside{background:#0d1117;border:1px solid #21262d;border-left:3px solid #3fb950;border-radius:0 8px 8px 0;padding:12px 16px;margin:18px 0;font-size:.92rem;line-height:1.75;color:#9da7b3}
.story .aside b{color:#3fb950}
.story .ending{text-align:center;color:#6e7681;font-size:.85rem;margin-top:30px;padding-top:18px;border-top:1px solid #21262d}
/* 군사 작전 브리핑 형식 */
.story .cast{background:#0d1117;border:1px solid #21262d;border-radius:10px;padding:14px 18px;margin-bottom:22px}
.story .cast .cast-t{font-size:.76rem;font-weight:800;letter-spacing:.05em;color:#8b949e;margin-bottom:10px}
.story .cast ul{list-style:none;margin:0;display:flex;flex-direction:column;gap:7px}
.story .cast li{font-size:.9rem;line-height:1.5;color:#adbac7}
.story .cast .nm{font-weight:800;color:#f0f6fc;font-family:'Consolas',monospace}
.story .act{font-size:.86rem;font-weight:800;letter-spacing:.04em;color:#a371f7;margin:28px 0 8px;padding-top:6px}
.story .cb-cap{font-size:.72rem;font-weight:800;letter-spacing:.04em;color:#8b949e;margin:16px 0 5px;display:flex;align-items:center;gap:6px}
.story .cb-cap::before{content:"⌗";color:#3fb950;font-weight:800}
.story pre.cb{background:#0b0f15;border:1px solid #21262d;border-radius:8px;padding:13px 15px;margin:0 0 18px;overflow-x:auto}
.story pre.cb code{font-family:'Consolas',monospace;font-size:.82rem;line-height:1.6;color:#c9d1d9;background:none;border:none;padding:0;white-space:pre}
.story pre.cb .cm{color:#6e7781}
.story pre.cb .kw{color:#ff7b72}
.story .why{background:rgba(88,166,255,.06);border:1px solid rgba(88,166,255,.22);border-left:3px solid #58a6ff;border-radius:0 8px 8px 0;padding:11px 15px;margin:2px 0 16px;font-size:.91rem;line-height:1.72;color:#adbac7}
.story .why .wt{font-size:.72rem;font-weight:800;letter-spacing:.04em;color:#58a6ff;display:block;margin-bottom:6px}
.story .why b{color:#f0f6fc}
.story .why code{font-size:.82rem}
.story .why ul{list-style:none;margin:5px 0 0;padding:0;display:flex;flex-direction:column;gap:6px}
.story .why li{position:relative;padding-left:15px}
.story .why li::before{content:"▸";position:absolute;left:0;color:#58a6ff}
/* 자료구조 친숙한 그림(viz) */
.story .viz{background:#0d1117;border:1px solid #30363d;border-radius:10px;padding:12px 14px;margin:11px 2px 2px}
.story .viz-t{font-size:.75rem;font-weight:800;color:#adbac7;margin-bottom:10px}
.story .viz-note{font-size:.76rem;color:#6e7681;margin-top:8px;line-height:1.5}
.story .viz-note b{color:#c9d1d9}
.story .adj-row{display:flex;align-items:center;gap:6px;margin:6px 0;flex-wrap:wrap}
.story .adj-k{width:26px;height:26px;border-radius:50%;background:#1f6feb;color:#fff;font-weight:800;font-size:.8rem;display:flex;align-items:center;justify-content:center;font-family:'Consolas',monospace}
.story .adj-ar{color:#6e7681;font-size:.9rem}
.story .adj-c{min-width:24px;height:24px;padding:0 8px;border-radius:13px;background:#161b22;border:1px solid #30363d;color:#adbac7;font-weight:700;font-size:.78rem;display:inline-flex;align-items:center;justify-content:center;font-family:'Consolas',monospace}
.story .viz-gwrap{display:flex;justify-content:center}
.story .viz-graph{max-width:100%}
.story .loop-wheel{display:flex;flex-direction:column;align-items:center;gap:2px;flex:0 0 auto}
.story .loop-lab{font-size:.66rem;color:#8b949e;text-align:center;font-weight:700;line-height:1.3}
.story .loop-lab .loop-cnt{color:#e3b341;font-size:1rem}
.story .sim-cell.cur{outline:3px solid #e3b341;outline-offset:-1px;z-index:1}
.story .sim-cell.chk{outline:2px dashed #58a6ff;outline-offset:-1px}
.story .sim-act{width:100%;text-align:center;font-size:.85rem;color:#c9d1d9;font-weight:700;min-height:1.3em;margin-bottom:8px}
.story .arr-wrap{overflow-x:auto}
.story .arr-row{display:inline-flex;align-items:flex-start}
.story .arr-box{min-width:32px;border:1px solid #30363d;border-right:0;background:#161b22;text-align:center;font-family:'Consolas',monospace}
.story .arr-box:last-child{border-right:1px solid #30363d;border-radius:0 7px 7px 0}
.story .arr-box:first-child{border-radius:7px 0 0 7px}
.story .arr-v{display:block;padding:6px 9px;font-weight:800;color:#c9d1d9;font-size:.82rem}
.story .arr-i{display:block;padding:2px;font-size:.62rem;color:#6e7681;border-top:1px solid #21262d;background:#0d1117}
.story .arr-box.hp .arr-v{color:#e3b341}
.story .arr-box.crown{position:relative}
.story .arr-box.crown::before{content:"👑";position:absolute;top:-15px;left:50%;transform:translateX(-50%);font-size:.72rem}
.story .map-row{display:flex;align-items:center;gap:8px;margin:6px 0;flex-wrap:wrap}
.story .map-k{padding:4px 10px;border-radius:7px;background:rgba(31,111,235,.15);border:1px solid rgba(31,111,235,.4);color:#79c0ff;font-weight:700;font-size:.78rem;font-family:'Consolas',monospace}
.story .map-ar{color:#6e7681}
.story .map-v{padding:4px 10px;border-radius:7px;background:#21262d;color:#adbac7;font-weight:700;font-size:.78rem;font-family:'Consolas',monospace}
.story .set-row{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.story .set-chip{padding:4px 11px;border-radius:16px;background:#161b22;border:1px solid #30363d;color:#c9d1d9;font-weight:700;font-size:.78rem}
.story .stk{display:inline-flex;flex-direction:column;gap:3px;align-items:stretch}
.story .stk-box{min-width:74px;padding:6px 12px;border:1px solid #30363d;background:#161b22;border-radius:6px;text-align:center;font-family:'Consolas',monospace;font-weight:700;color:#c9d1d9;font-size:.8rem}
.story .stk-box.top{border-color:#e3b341;background:#1c1a10}
.story .stk .tag{color:#e3b341;font-size:.66rem;font-weight:800}
.story .stk-base{font-size:.66rem;color:#6e7681;text-align:center;margin-top:3px}
.story .q-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.story .q-box{min-width:30px;padding:6px 10px;border:1px solid #30363d;background:#161b22;border-radius:7px;text-align:center;font-family:'Consolas',monospace;font-weight:700;color:#c9d1d9;font-size:.8rem}
.story .q-lab{font-size:.66rem;color:#e3b341;font-weight:800}
/* 프로세스 흐름(flow) */
.story .flow{background:#0d1117;border:1px solid #30363d;border-radius:10px;padding:12px 14px;margin:11px 2px 2px}
.story .flow-strip{display:flex;gap:9px;overflow-x:auto;padding-bottom:5px}
.story .flow-step{flex:0 0 auto;min-width:118px;max-width:190px;background:#161b22;border:1px solid #21262d;border-radius:9px;padding:9px 10px}
.story .flow-step .fs-op{font-size:.72rem;color:#adbac7;font-weight:700;line-height:1.4;margin-bottom:8px;min-height:2.6em}
.story .flow-step .fs-boxes{display:flex;gap:3px;flex-wrap:wrap;align-items:center;min-height:28px}
.story .flow-step .fs-boxes .q-box{min-width:24px;padding:3px 7px;font-size:.74rem}
.story .flow-step .q-empty{font-size:.72rem;color:#6e7681}
.story .flow-step .fs-out{font-size:.7rem;color:#3fb950;font-weight:800;margin-top:6px}
.story .flow-arrow{flex:0 0 auto;align-self:center;color:#6e7681;font-size:1rem}
/* 나무위키 문서 정리 형식 */
.story .toc{background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:13px 20px 13px 16px;margin-bottom:26px;display:inline-block;min-width:55%}
.story .toc .toc-t{font-weight:800;color:#f0f6fc;font-size:.88rem;margin-bottom:8px}
.story .toc ol{margin:0;padding-left:19px;color:#adbac7;font-size:.87rem;line-height:1.9}
.story .toc ol ol{padding-left:17px;color:#8b949e;font-size:.84rem}
.story h4.sec{font-size:1.16rem;color:#f0f6fc;font-weight:800;margin:30px 0 13px;padding-bottom:7px;border-bottom:2px solid #30363d;letter-spacing:-.01em}
.story h4.sec .n{color:#d29922;margin-right:8px}
.story h5.sub{font-size:1.0rem;color:#79c0ff;font-weight:700;margin:21px 0 9px}
.story h5.sub .n{color:#6e7681;margin-right:6px;font-weight:700}
.story ul.wl{margin:0 0 15px;padding-left:3px;list-style:none;display:flex;flex-direction:column;gap:9px}
.story ul.wl li{position:relative;padding-left:19px;line-height:1.8;font-size:.98rem;color:#c9d1d9}
.story ul.wl li::before{content:"•";position:absolute;left:3px;top:0;color:#d29922;font-weight:800}
.story ul.wl ul{margin-top:9px;padding-left:13px;list-style:none;display:flex;flex-direction:column;gap:7px}
.story ul.wl ul li{font-size:.94rem}
.story ul.wl ul li::before{content:"◦";color:#6e7681}
.story .wlink{color:#79c0ff;border-bottom:1px dashed rgba(121,192,255,.5)}
.story sup.fnref{color:#58a6ff;font-weight:700;font-size:.72rem;cursor:default}
.story .fnbox{margin-top:28px;padding-top:15px;border-top:1px solid #21262d}
.story .fnbox .fn-t{font-size:.78rem;font-weight:800;color:#8b949e;letter-spacing:.04em;margin-bottom:9px}
.story .fnbox .fn-i{font-size:.84rem;color:#8b949e;line-height:1.7;margin-bottom:7px;padding-left:2px}
.story .fnbox .fn-i .fn-n{color:#58a6ff;font-weight:700;margin-right:5px}
/* 만화(웹툰) + 시뮬 형식 */
.story .toon{max-width:600px;margin:0 auto}
.story .toon-hd{text-align:center;margin-bottom:18px;padding-bottom:14px;border-bottom:1px dashed #30363d}
.story .toon-hd h3{font-size:1.35rem;color:#f0f6fc;font-weight:900}
.story .toon-hd .sub{font-size:.85rem;color:#8b949e;margin-top:6px;line-height:1.6}
.story .bg-story{background:linear-gradient(135deg,rgba(210,153,34,.13),rgba(88,166,255,.07));border:1px solid #30363d;border-left:3px solid #d29922;border-radius:11px;padding:14px 17px;margin-bottom:20px;font-size:.96rem;line-height:1.75;color:#c9d1d9}
.story .bg-story .bt{display:block;font-size:.72rem;font-weight:800;letter-spacing:.05em;color:#e3b341;margin-bottom:6px}
.story .bg-story b{color:#f0f6fc}
.story .bg-story .goal{display:block;margin-top:8px;color:#3fb950;font-weight:700;font-size:.9rem}
.story .cast .lg{display:inline-block;width:13px;height:13px;border-radius:3px;vertical-align:-1px;margin-right:3px}
.story .panel{background:#0f141b;border:2px solid #2b3440;border-radius:16px;padding:16px;margin-bottom:16px;position:relative}
.story .panel .cut{position:absolute;top:-12px;left:16px;background:#d29922;color:#1a1205;font-weight:900;font-size:.72rem;padding:3px 11px;border-radius:20px}
.story .talk{display:flex;align-items:flex-start;gap:11px;margin:2px}
.story .talk+.talk{margin-top:6px}
.story .talk .person{flex:0 0 auto}
.story .talk .say{position:relative;background:#f3f4ee;color:#161616;border-radius:14px;padding:9px 13px;font-size:.94rem;line-height:1.55;font-weight:600;flex:1;margin-top:8px}
.story .talk .say::after{content:"";position:absolute;left:-9px;top:15px;border:9px solid transparent;border-right-color:#f3f4ee;border-left:0}
.story .talk.rev{flex-direction:row-reverse}
.story .talk.rev .say::after{left:auto;right:-9px;border-right-color:transparent;border-left-color:#f3f4ee}
.story .talk .say .nm{display:block;font-size:.72rem;font-weight:800;margin-bottom:3px;color:#c2410c}
.story .talk .say.teach .nm{color:#166534}
.story .talk .say b{color:#111;background:#ffe08a;border-radius:3px;padding:0 3px}
.story .talk .say code{font-family:'Consolas',monospace;font-size:.82rem;background:#24262b;color:#8fd3ff;border-radius:5px;padding:1px 6px}
.story pre.mc{background:#0b0f15;border:1px solid #2b3440;border-radius:9px;padding:10px 13px 11px;margin:11px 2px 2px;overflow-x:auto}

if (window.mermaid) mermaid.initialize({ startOnLoad: false, theme: 'dark', securityLevel: 'loose' });

const TYPE_COLOR = {

  '완전탐색':'#f59e0b','BFS/DFS':'#10b981','우선순위큐':'#f97316','구현/시뮬':'#14b8a6','스트림':'#0ea5e9','주식/금융':'#22c55e'
};
const DIFF_COLOR = { B:'#8b5a2b', S:'#4a6fa5', G:'#b8860b' };

const problems = [
// ───────────── 수학 ─────────────
{id:1000,title:'A+B',type:'수학',diff:'B5',
problem:'두 정수 A와 B가 주어집니다. 두 수를 더한 값을 출력하는, 입출력 연습용 기본 문제입니다.\n\n입력: 첫 줄에 A와 B가 공백으로 구분되어 주어진다. (0 < A, B < 10)\n출력: A+B의 결과를 한 줄에 출력',
summary:'두 정수 A, B를 입력받아 A+B 출력',
explain:'가장 기본적인 입출력 문제입니다. Scanner로 두 정수를 읽어 더한 뒤 출력합니다.',
flow:`flowchart TD
A([시작]) --> B["A, B 입력"]
B --> C["sum = A + B"]
C --> D["sum 출력"]
D --> E([종료])`,
code:`import java.util.Scanner;  // 입력을 편하게 읽기 위한 Scanner 사용 (입력량이 적어 속도 문제 없음)

public class Main {
    // [메서드 역할] 두 정수 A, B를 입력받아 A+B를 출력
    public static void main(String[] args) {
        // ▼ 예시 입력: 1 2
        Scanner 입력 = new Scanner(System.in);
        int 첫째수 = 입력.nextInt();   // 첫째수 = 1
        int 둘째수 = 입력.nextInt();   // 둘째수 = 2
        System.out.println(첫째수 + 둘째수);  // 1+2 → ✅ 출력: 3
    }
}`},

{id:2609,title:'GCD와 LCM',type:'수학',diff:'B1',
problem:'두 자연수 A, B가 주어집니다. 두 수를 모두 나누는 가장 큰 수(최대공약수)와, 두 수의 공통 배수 중 가장 작은 수(최소공배수)를 구하는 문제입니다.\n\n입력: 첫 줄에 A와 B가 공백으로 구분되어 주어진다. (1 ≤ A, B ≤ 10000)\n출력: 1행에 최대공약수, 2행에 최소공배수',
summary:'최대공약수(GCD)와 최소공배수(LCM) 구하기',
explain:'유클리드 호제법을 사용합니다. GCD(a,b) = GCD(b, a%b)이며 b=0이면 a가 GCD입니다. LCM = a ÷ GCD × b (오버플로우 방지를 위해 나누기 먼저).',
flow:`flowchart TD
A([시작]) --> B["a, b 입력"]
B --> C["gcd(a, b) 호출"]
C --> D{b == 0?}
D -->|Yes| E[return a]
D -->|No| F["gcd(b, a%b) 재귀"]
F --> D
E --> G["GCD 출력"]
G --> H["LCM = a/GCD × b"]
H --> I["LCM 출력"]
I --> J([종료])`,

public class Main {

    public static void main(String[] args) {
        // ▼ 예시 입력:  첫 줄 N=4 ,  둘째 줄  1 3 5 7
        Scanner 입력 = new Scanner(System.in);
        int 수개수 = 입력.nextInt(), 소수개수 = 0;       // 수개수=4, 소수개수=0
        for (int i = 0; i < 수개수; i++) {
            if (소수인가(입력.nextInt())) 소수개수++;
            // i=0: 입력 1 → 소수인가(1)=false → 소수개수=0
            // i=1: 입력 3 → 소수인가(3)=true  → 소수개수=1
            // i=2: 입력 5 → 소수인가(5)=true  → 소수개수=2
            // i=3: 입력 7 → 소수인가(7)=true  → 소수개수=3
        }
        System.out.println(소수개수);             // ✅ 출력: 3
    }
    // [메서드 역할] 대상수가 소수면 true, 아니면 false (2~√n 까지 나눠 약수가 있는지 검사)
    static boolean 소수인가(int 대상수) {
        if (대상수 < 2) return false;               // 예) 소수인가(1) → 1<2 이므로 바로 false
        for (int i = 2; i * i <= 대상수; i++)       // 예) 대상수=7 → i=2 일 때 2*2=4 <= 7 (검사)
            if (대상수 % i == 0) return false;       //      7%2=1 → 약수 아님, 다음 i=3은 3*3=9>7 종료
        return true;                            // 예) 소수인가(7) → 약수 없음 → true
    }
}`},

code:`import java.util.Scanner;

public class Main {
    // [메서드 역할] 이항계수 C(N,K)를 계산해 출력
    public static void main(String[] args) {
        // ▼ 예시 입력: 5 2
        Scanner 입력 = new Scanner(System.in);
        int 전체개수 = 입력.nextInt(), 뽑을개수 = 입력.nextInt();   // 전체개수=5, 뽑을개수=2
        System.out.println(이항계수(전체개수, 뽑을개수));   // C(5,2) → ✅ 출력: 10
    }
    // [메서드 역할] C(n,k)=n!/(k!(n-k)!) 를 분자 k항·분모 k!로 계산
    static long 이항계수(int 전체개수, int 뽑을개수) {
        if (뽑을개수 == 0 || 뽑을개수 == 전체개수) return 1;
        long 분자 = 1, 분모 = 1;
        for (int i = 0; i < 뽑을개수; i++) {
            분자 *= (전체개수 - i);          // i=0: 분자=5 / i=1: 분자=20  (5×4)
            분모 *= (i + 1);                // i=0: 분모=1 / i=1: 분모=2   (1×2)
        }
        return 분자 / 분모;                 // 20 / 2 = 10
    }
}`},

    public static void main(String[] args) throws Exception {
        // ▼ 예시 입력:  첫 줄 T=1 ,  둘째 줄  10 12 3 9
        BufferedReader 입력 = new BufferedReader(new InputStreamReader(System.in));
        int 테스트수 = Integer.parseInt(입력.readLine().trim());   // 테스트수=1
        StringBuilder 출력 = new StringBuilder();
        while (테스트수-- > 0) {
            StringTokenizer 토큰 = new StringTokenizer(입력.readLine());
            long 주기M = Long.parseLong(토큰.nextToken());      // 주기M=10
            long 주기N = Long.parseLong(토큰.nextToken());      // 주기N=12
            long 목표x = Long.parseLong(토큰.nextToken());      // 목표x=3
            long 목표y = Long.parseLong(토큰.nextToken());      // 목표y=9
            long 최소공배수 = 주기M / 최대공약수구하기(주기M, 주기N) * 주기N;     // 10/2*12 = 60
            long 정답해 = -1;
            for (long 해번호 = 목표x; 해번호 <= 최소공배수; 해번호 += 주기M) {
                if ((해번호 - 목표y) % 주기N == 0) { 정답해 = 해번호; break; }
                // 해번호=3:(3-9)%12≠0 / 13,23 ≠0 / 해번호=33:(33-9)=24 → 24%12=0 → 정답해=33

        // ▼ 예시 입력: 6 / push_front 1 / push_back 2 / front / back / pop_front / size
        BufferedReader 입력 = new BufferedReader(new InputStreamReader(System.in));
        StringBuilder 출력 = new StringBuilder();
        // 양쪽 끝에서 모두 넣고 뺄 수 있는 덱(앞·뒤 자유롭게 조작하는 자료구조)
        Deque<Integer> 값덱 = new ArrayDeque<>();   // 값덱=[]
        int 명령수 = Integer.parseInt(입력.readLine().trim());   // 명령수=6
        while (명령수-- > 0) {
            StringTokenizer 토큰 = new StringTokenizer(입력.readLine());
            String 명령 = 토큰.nextToken();
            switch (명령) {
                case "push_front": 값덱.addFirst(Integer.parseInt(토큰.nextToken())); break;
                case "push_back":  값덱.addLast(Integer.parseInt(토큰.nextToken())); break;
                case "pop_front":  출력.append(값덱.isEmpty() ? -1 : 값덱.pollFirst()).append('\\n'); break;
                case "pop_back":   출력.append(값덱.isEmpty() ? -1 : 값덱.pollLast()).append('\\n'); break;
                case "front":      출력.append(값덱.isEmpty() ? -1 : 값덱.peekFirst()).append('\\n'); break;
                case "back":       출력.append(값덱.isEmpty() ? -1 : 값덱.peekLast()).append('\\n'); break;
                case "size":       출력.append(값덱.size()).append('\\n'); break;
                case "empty":      출력.append(값덱.isEmpty() ? 1 : 0).append('\\n'); break;
            }
            // push_front 1 → 값덱=[1]
            // push_back 2  → 값덱=[1,2]
            // front        → 출력 1
            // back         → 출력 2
            // pop_front    → 출력 1, 값덱=[2]
            // size         → 출력 1
        }
        System.out.print(출력);   // ✅ 출력: 1 / 2 / 1 / 1
    }
}`},

{id:1874,title:'스택 수열',type:'자료구조',diff:'S2',

summary:'1~N을 순서대로 push/pop해서 목표 수열 만들기',
explain:'1부터 N까지 순서대로 스택에 push합니다. 스택 top이 목표값과 같으면 pop합니다. 불가능한 경우 "NO"를 출력합니다.',
flow:`flowchart TD
A([시작]) --> B["수열 입력"]
B --> C["cur=1, 스택 비어있음"]
C --> D["목표값 target 읽기"]
D --> E{"스택 top == target?"}
E -->|Yes| F["pop, + 기록"]
F --> G{다음 target?}
G -->|있음| D
E -->|No| H{cur <= N?}
H -->|Yes| I["cur push, - 기록, cur++"]
I --> E
H -->|No| J["NO 출력"]
F -->|스택 top != target| J
G -->|없음| K["+/- 출력"]
K --> L([종료])
J --> L`,
code:`import java.util.*;
import java.io.*;

public class Main {
    // [메서드 역할] 1~N push/pop으로 목표 수열을 만들면 +/- 기록, 불가하면 NO
    public static void main(String[] args) throws Exception {
        // ▼ 예시 입력:  8 / 4 3 6 8 7 5 2 1
        BufferedReader 입력 = new BufferedReader(new InputStreamReader(System.in));
        int 수열길이 = Integer.parseInt(입력.readLine().trim());   // 수열길이=8
        // 1~N을 오름차순으로 쌓아두는 스택(맨 위 값만 꺼낼 수 있음)
        Deque<Integer> 오름차순스택 = new ArrayDeque<>();
        StringBuilder 출력 = new StringBuilder();
        int 다음에넣을수 = 1;          // 다음에 push할 자연수
        boolean 만들수있음 = true;
        for (int i = 0; i < 수열길이; i++) {
            int 목표값 = Integer.parseInt(입력.readLine().trim());
            while (다음에넣을수 <= 목표값) {
                오름차순스택.push(다음에넣을수++);
                출력.append('+').append('\\n');
            }
            if (오름차순스택.peek() == 목표값) {
                오름차순스택.pop();
                출력.append('-').append('\\n');
            } else {
                만들수있음 = false;
                break;
            }
            // 목표값=4: 1,2,3,4 push(++++) → 4 pop(-)
            // 목표값=3: 3 pop(-)
            // 목표값=6: 5,6 push(++) → 6 pop(-)
            // 목표값=8: 7,8 push(++) → 8 pop(-)
            // 목표값=7,5,2,1: 차례로 pop(- - - -)
        }
        System.out.print(만들수있음 ? 출력 : "NO\\n");   // ✅ 출력: ++++--++-++------
    }
}`},

problem:'프린터는 큐 맨 앞 문서를 꺼낸 뒤, 큐에 더 높은 중요도의 문서가 남아 있으면 꺼낸 문서를 맨 뒤로 보내고, 그렇지 않으면 바로 인쇄합니다. 내가 궁금한 문서가 몇 번째로 인쇄되는지 구하는 문제입니다.\n\n입력: 1행에 테스트케이스 수 T. 각 케이스는 두 줄로, 1행에 문서 수 N과 궁금한 문서의 현재 위치 M(0부터 시작), 2행에 N개 문서의 중요도가 주어진다.\n출력: 케이스마다 궁금한 문서가 인쇄되는 순번',

flow:`flowchart TD

D -->|No| F["출력! count++"]

G -->|Yes| H["count 출력"]
G -->|No| C
E --> C
H --> I([종료])`,
code:`import java.util.*;
import java.io.*;

public class Main {
    // [메서드 역할] 목표 문서(M번째)가 몇 번째로 인쇄되는지 출력
    public static void main(String[] args) throws Exception {
        // ▼ 예시 입력:  T=1 / N=4 M=2 / 중요도 1 2 3 4
        BufferedReader 입력 = new BufferedReader(new InputStreamReader(System.in));
        int 테스트수 = Integer.parseInt(입력.readLine().trim());   // 테스트수=1
        StringBuilder 출력 = new StringBuilder();
        while (테스트수-- > 0) {
            StringTokenizer 토큰 = new StringTokenizer(입력.readLine());
            int 문서수 = Integer.parseInt(토큰.nextToken());   // 문서수=4
            int 목표위치 = Integer.parseInt(토큰.nextToken());   // 목표위치=2 (궁금한 문서 위치)
            int[] 중요도목록 = new int[문서수];
            토큰 = new StringTokenizer(입력.readLine());
            for (int i = 0; i < 문서수; i++) 중요도목록[i] = Integer.parseInt(토큰.nextToken());  // 중요도목록=[1,2,3,4]
            // 인쇄 대기 문서들을 {중요도, 원래위치} 형태로 순서대로 담는 큐
            Queue<int[]> 대기큐 = new LinkedList<>();
            for (int i = 0; i < 문서수; i++) 대기큐.add(new int[]{중요도목록[i], i});   // {중요도, 위치}
            // 남은 문서 중 가장 높은 중요도를 빠르게 확인하는 최대힙(우선순위 큐)
            PriorityQueue<Integer> 최대중요도힙 = new PriorityQueue<>(Collections.reverseOrder());
            for (int 중요도 : 중요도목록) 최대중요도힙.add(중요도);   // 최상단=4
            int 인쇄순번 = 0;
            while (!대기큐.isEmpty()) {
                int[] 현재문서 = 대기큐.poll();
                if (현재문서[0] == 최대중요도힙.peek()) {
                    최대중요도힙.poll();
                    인쇄순번++;
                    if (현재문서[1] == 목표위치) { 출력.append(인쇄순번).append('\\n'); break; }
                } else {
                    대기큐.add(현재문서);
                }
                // 1,2,3 은 최고(4) 아님 → 뒤로 / 4 인쇄(인쇄순번=1)
                // 1,2 뒤로 → 3 인쇄(인쇄순번=2), 위치2==목표위치 → 출력 2
            }
        }
        System.out.print(출력);   // ✅ 출력: 2
    }
}`},

code:`import java.util.Scanner;

public class Main {

    public static void main(String[] args) {
        // ▼ 예시 입력: N=8, M=8 보드  (8×8 이라 잘라낼 영역은 (0,0) 한 곳뿐)
        Scanner 입력 = new Scanner(System.in);

        for (int i = 0; i < 세로; i++) 보드[i] = 입력.next().toCharArray();
        int 최소칠할칸 = Integer.MAX_VALUE;
        for (int 시작행 = 0; 시작행 <= 세로-8; 시작행++) {        // 세로=가로=8 → (0,0)만 검사

                for (int i = 0; i < 8; i++)

                        if (보드[시작행+i][시작열+j] != 기대색) 다른칸수++;   // 기대색과 다르면 +1

                최소칠할칸 = Math.min(최소칠할칸, Math.min(다른칸수, 64-다른칸수));

{id:1260,title:'DFS와 BFS',type:'BFS/DFS',diff:'S2',
problem:'정점과 간선으로 이루어진 그래프를, 시작 정점 V에서 출발해 DFS(깊이 우선)와 BFS(너비 우선)로 각각 탐색하는 문제입니다. 다음에 갈 수 있는 정점이 여러 개라면 번호가 작은 정점부터 방문합니다.\n\n입력: 1행에 정점 수 N, 간선 수 M, 시작 정점 V. 이후 M개 줄에 간선으로 연결된 두 정점이 주어진다.\n출력: 1행에 DFS 방문 순서, 2행에 BFS 방문 순서',
summary:'그래프를 DFS와 BFS로 탐색한 순서 출력',
explain:'인접 리스트로 그래프를 저장합니다. 같은 깊이의 노드는 번호가 작은 것부터 방문하므로 정렬이 필요합니다. DFS는 재귀, BFS는 큐를 사용합니다.',
flow:`flowchart TD
A([시작]) --> B["N,M,V 입력 + 그래프 구성"]
B --> C["각 인접 리스트 정렬"]
C --> D["DFS(V) 실행"]
D --> E["방문 순서 출력"]
E --> F["방문 배열 초기화"]
F --> G["BFS(V) 실행 - 큐 사용"]
G --> H["방문 순서 출력"]
H --> I([종료])`,
code:`import java.util.*;
import java.io.*;

public class Main {
    // 인접 리스트: 각 정점에 연결된 정점들을 리스트로 저장 (간선이 적을 때 메모리 효율적)
    static List<Integer>[] 인접리스트;
    static boolean[] 방문여부;   // 같은 정점을 두 번 방문하지 않도록 체크
    static StringBuilder 출력 = new StringBuilder();

    // [메서드 역할] 그래프를 DFS·BFS로 탐색한 방문 순서를 각각 출력
    public static void main(String[] args) throws Exception {
        // ▼ 예시 입력:  4 5 1 / 간선 1-2, 1-3, 1-4, 2-4, 3-4
        BufferedReader 입력 = new BufferedReader(new InputStreamReader(System.in));
        StringTokenizer 토큰 = new StringTokenizer(입력.readLine());
        int 정점수 = Integer.parseInt(토큰.nextToken());   // 정점수=4
        int 간선수 = Integer.parseInt(토큰.nextToken());   // 간선수=5
        int 시작정점 = Integer.parseInt(토큰.nextToken());   // 시작정점=1
        인접리스트 = new ArrayList[정점수+1];
        for (int i = 1; i <= 정점수; i++) 인접리스트[i] = new ArrayList<>();
        for (int i = 0; i < 간선수; i++) {
            토큰 = new StringTokenizer(입력.readLine());
            int 정점A = Integer.parseInt(토큰.nextToken());
            int 정점B = Integer.parseInt(토큰.nextToken());
            인접리스트[정점A].add(정점B); 인접리스트[정점B].add(정점A);
        }
        for (int i = 1; i <= 정점수; i++) Collections.sort(인접리스트[i]);
        // 인접리스트: 1→[2,3,4], 2→[1,4], 3→[1,4], 4→[1,2,3]
        방문여부 = new boolean[정점수+1];
        깊이우선탐색(시작정점); 출력.append('\\n');     // DFS 결과 한 줄
        방문여부 = new boolean[정점수+1];
        너비우선탐색(시작정점); 출력.append('\\n');     // BFS 결과 한 줄
        System.out.print(출력);   // ✅ 출력:  1 2 4 3  (DFS) /  1 2 3 4  (BFS)
    }
    // [메서드 역할] DFS: 한 방향으로 끝까지 파고든 뒤 되돌아옴(재귀)
    static void 깊이우선탐색(int 현재정점) {
        방문여부[현재정점] = true;
        출력.append(현재정점).append(' ');
        for (int 다음정점 : 인접리스트[현재정점])
            if (!방문여부[다음정점]) 깊이우선탐색(다음정점);
        // 1 → 2 → 4 → 3  (작은 번호 + 깊이 우선) = "1 2 4 3"
    }
    // [메서드 역할] BFS: 가까운 정점부터 큐(FIFO)로 차례 방문
    static void 너비우선탐색(int 시작정점) {
        // 방문할 정점을 발견한 순서대로 담아 두는 탐색 대기 큐
        Queue<Integer> 방문예정큐 = new LinkedList<>();
        방문예정큐.add(시작정점); 방문여부[시작정점] = true;
        while (!방문예정큐.isEmpty()) {
            int 현재정점 = 방문예정큐.poll();
            출력.append(현재정점).append(' ');
            for (int 다음정점 : 인접리스트[현재정점])
                if (!방문여부[다음정점]) { 방문여부[다음정점]=true; 방문예정큐.add(다음정점); }
        }
        // 1 → (2,3,4 동시 적재) → "1 2 3 4"
    }
}`},

            StringTokenizer 토큰 = new StringTokenizer(입력.readLine());
            int 컴퓨터A = Integer.parseInt(토큰.nextToken());
            int 컴퓨터B = Integer.parseInt(토큰.nextToken());
            인접리스트[컴퓨터A].add(컴퓨터B); 인접리스트[컴퓨터B].add(컴퓨터A);
        }
        // 인접리스트: 1→[2,5], 2→[1,3,5], 3→[2], 5→[1,2,6], 6→[5], 4→[7], 7→[4]

        // 감염이 퍼질 컴퓨터를 발견 순서대로 담는 탐색 대기 큐(BFS)

code:`import java.util.*;
import java.io.*;

public class Main {
    static int[] 행이동={0,0,1,-1}, 열이동={1,-1,0,0};   // 상하좌우 4방향
    static int[][] 지도;            // 1이면 집이 있는 칸
    static boolean[][] 방문여부;
    static int 지도크기;

    public static void main(String[] args) throws Exception {

        }
        List<Integer> 단지크기목록 = new ArrayList<>();
        for (int i = 0; i < 지도크기; i++) for (int j = 0; j < 지도크기; j++) {
            if (지도[i][j]==1 && !방문여부[i][j]) 단지크기목록.add(단지가구수세기(i,j));
            // 미방문 집을 만날 때마다 그 단지 가구 수를 목록에 추가 → [8,9,7]

    static int 단지가구수세기(int 시작행, int 시작열) {
        // 한 단지에 이어진 집 칸을 퍼뜨리며 방문하는 탐색 큐(BFS)
        Queue<int[]> 탐색큐 = new LinkedList<>();
        탐색큐.add(new int[]{시작행,시작열}); 방문여부[시작행][시작열]=true;
        int 가구수 = 1;   // 시작 칸 자신 1채
        while (!탐색큐.isEmpty()) {
            int[] 현재칸 = 탐색큐.poll();
            for (int 방향 = 0; 방향 < 4; 방향++) {
                int 다음행=현재칸[0]+행이동[방향], 다음열=현재칸[1]+열이동[방향];
                if (다음행>=0&&다음행<지도크기&&다음열>=0&&다음열<지도크기&&지도[다음행][다음열]==1&&!방문여부[다음행][다음열]) {
                    방문여부[다음행][다음열]=true; 탐색큐.add(new int[]{다음행,다음열}); 가구수++;   // 인접 집마다 +1
                }
            }
        }
        return 가구수;   // 이 단지의 총 가구 수
    }
}`},

{id:1697,title:'숨바꼭질',type:'BFS/DFS',diff:'S1',

public class Main {

    public static void main(String[] args) {
        // ▼ 예시 입력: 5 17
        Scanner 입력 = new Scanner(System.in);
        int 시작위치 = 입력.nextInt(), 목표위치 = 입력.nextInt();   // 시작위치=5, 목표위치=17
        int 최대좌표 = 100001;
        int[] 걸린시간 = new int[최대좌표];                 // 걸린시간[위치] = 시작→그 위치 최소 시간
        Arrays.fill(걸린시간, -1);                     // -1 = 미방문
        // 가까운 위치부터 차례로 퍼뜨리며 최단 시간을 구하는 탐색 대기 큐(BFS)
        Queue<Integer> 방문예정큐 = new LinkedList<>();
        방문예정큐.add(시작위치); 걸린시간[시작위치] = 0;
        while (!방문예정큐.isEmpty()) {
            int 현재위치 = 방문예정큐.poll();
            if (현재위치 == 목표위치) { System.out.println(걸린시간[현재위치]); return; }
            for (int 다음위치 : new int[]{현재위치-1, 현재위치+1, 현재위치*2}) {
                if (다음위치 >= 0 && 다음위치 < 최대좌표 && 걸린시간[다음위치] == -1) {
                    걸린시간[다음위치] = 걸린시간[현재위치]+1; 방문예정큐.add(다음위치);
                }
            }

            // 최단 경로 예: 5 →10 →9 →18 →17  (×2, -1, ×2, -1)

        // ✅ 출력: 4
    }
}`},

        int 세로 = Integer.parseInt(토큰.nextToken());   // 세로=4

        int[][] 상자 = new int[세로][가로];      // 1=익음, 0=안 익음, -1=토마토 없음
        int[][] 익은날짜 = new int[세로][가로];    // 익은날짜[i][j] = 그 칸이 익기까지 걸린 날짜

        // ── 2) 상자 상태를 읽으며, 처음부터 익은 토마토를 모두 큐에 담기 ──
        //     (여러 시작점에서 동시에 퍼뜨리는 '멀티소스 BFS'라 시작점이 여러 개)
        Queue<int[]> 익음전파큐 = new LinkedList<>();
        for (int i = 0; i < 세로; i++) {
            토큰 = new StringTokenizer(입력.readLine());
            for (int j = 0; j < 가로; j++) {
                상자[i][j] = Integer.parseInt(토큰.nextToken());
                if (상자[i][j] == 1) 익음전파큐.add(new int[]{i,j});   // 익은 토마토는 시작점
                else 익은날짜[i][j] = -1;   // 안 익었거나(0) 빈 칸(-1)은 아직 날짜 미정 표시
            }
        }

        // ── 3) 익은 토마토에서 하루씩 사방으로 익음을 퍼뜨리기 ──
        int[] 행이동 = {0,0,1,-1}, 열이동 = {1,-1,0,0};   // 상하좌우
        int 마지막날짜 = 0;   // 모든 토마토가 익는 데 걸린 최대 날짜
        while (!익음전파큐.isEmpty()) {
            int[] 현재칸 = 익음전파큐.poll();
            for (int 방향 = 0; 방향 < 4; 방향++) {
                int 다음행 = 현재칸[0]+행이동[방향], 다음열 = 현재칸[1]+열이동[방향];
                if (다음행>=0&&다음행<세로&&다음열>=0&&다음열<가로&&상자[다음행][다음열]==0) {   // 인접한 '안 익은' 토마토만
                    상자[다음행][다음열] = 1;                              // 익힘
                    익은날짜[다음행][다음열] = 익은날짜[현재칸[0]][현재칸[1]]+1;  // 현재 칸보다 하루 뒤에 익음
                    마지막날짜 = Math.max(마지막날짜, 익은날짜[다음행][다음열]);   // 가장 늦게 익는 날짜 갱신
                    익음전파큐.add(new int[]{다음행,다음열});
                }
            }
        }

        // ── 4) 결과 판정: 안 익은 토마토(0)가 남았으면 -1, 아니면 최대 날짜 ──
        for (int[] 한줄 : 상자) for (int 칸 : 한줄) if (칸==0) { System.out.println(-1); return; }
        System.out.println(마지막날짜);
        // 익은 토마토에서 한 칸씩 퍼져 가장 먼 칸까지 거리(=날짜) 누적 → ✅ 출력: 8
    }
}`},

{id:7569,title:'토마토 (3D)',type:'BFS/DFS',diff:'G5',
problem:'토마토(2D) 문제의 3차원 버전입니다. 상자가 여러 층으로 쌓여 있고, 익은 토마토는 하루가 지나면 상하좌우뿐 아니라 위·아래 층까지 6방향으로 인접한 토마토를 익게 만듭니다. 모두 익는 최소 일수를 구합니다.\n\n입력: 1행에 가로 M·세로 N·높이 H, 이후 H개 층의 상자 상태가 차례로 주어진다. (1=익음, 0=안 익음, -1=빈 칸)\n출력: 모두 익는 최소 일수. 이미 다 익어 있으면 0, 끝내 다 익을 수 없으면 -1',
summary:'3차원 상자에서 토마토 익히기 — 위아래 방향 추가',
explain:'7576 토마토 2D와 동일한 멀티소스 BFS이지만 위아래(H축) 방향이 추가되어 6방향을 탐색합니다.',
flow:`flowchart TD
A([시작]) --> B["3D 상자 입력 (M,N,H)"]
B --> C["익은 토마토 모두 큐에 추가"]
C --> D["BFS - 6방향 탐색"]
D --> E["상하좌우앞뒤 인접 확인"]
E --> F{0인 칸?}
F -->|Yes| G["익히고 날짜 기록"]
F -->|No| E
G --> D
D -->|완료| H{0 남아있음?}
H -->|Yes| I["-1"]
H -->|No| J["최대 날짜 출력"]
I --> K([종료])
J --> K`,
code:`import java.util.*;
import java.io.*;

public class Main {
    // [메서드 역할] 3차원 상자에서 모두 익는 최소 일수 출력 (6방향 멀티소스 BFS)
    public static void main(String[] args) throws Exception {
        // ▼ 예시: M=4 N=3 H=2, 익은 토마토 1개 → 6방향으로 퍼져 모두 익는 일수
        // ── 1) 상자 크기 입력 (가로·세로·높이) ──
        BufferedReader 입력 = new BufferedReader(new InputStreamReader(System.in));
        StringTokenizer 토큰 = new StringTokenizer(입력.readLine());
        int 가로 = Integer.parseInt(토큰.nextToken());   // 가로=4
        int 세로 = Integer.parseInt(토큰.nextToken());   // 세로=3
        int 높이 = Integer.parseInt(토큰.nextToken());   // 높이=2

        int[][][] 상자 = new int[높이][세로][가로];     // 2D 토마토에 층(높이) 차원만 추가된 3차원 배열
        int[][][] 익은날짜 = new int[높이][세로][가로];

        // ── 2) 상태를 읽으며 처음부터 익은 토마토를 모두 큐에 담기 (멀티소스 BFS) ──
        Queue<int[]> 익음전파큐 = new LinkedList<>();
        for (int h=0; h<높이; h++) for (int i=0; i<세로; i++) {
            토큰 = new StringTokenizer(입력.readLine());
            for (int j=0; j<가로; j++) {
                상자[h][i][j] = Integer.parseInt(토큰.nextToken());
                if (상자[h][i][j]==1) 익음전파큐.add(new int[]{h,i,j});   // 익은 토마토 = 시작점
                else 익은날짜[h][i][j] = -1;
            }
        }

        // ── 3) 6방향(상하좌우 + 위층·아래층)으로 하루씩 익음 퍼뜨리기 ──
        int[] 층이동 = {0,0,0,0,1,-1}, 행이동 = {0,0,1,-1,0,0}, 열이동 = {1,-1,0,0,0,0};
        int 마지막날짜 = 0;   // 모두 익는 데 걸린 최대 날짜
        while (!익음전파큐.isEmpty()) {
            int[] 현재칸 = 익음전파큐.poll();
            for (int 방향=0; 방향<6; 방향++) {
                int 다음층=현재칸[0]+층이동[방향], 다음행=현재칸[1]+행이동[방향], 다음열=현재칸[2]+열이동[방향];
                if (다음층>=0&&다음층<높이&&다음행>=0&&다음행<세로&&다음열>=0&&다음열<가로&&상자[다음층][다음행][다음열]==0) {   // 6방향 중 안 익은 칸
                    상자[다음층][다음행][다음열] = 1;
                    익은날짜[다음층][다음행][다음열] = 익은날짜[현재칸[0]][현재칸[1]][현재칸[2]]+1;   // 하루 뒤에 익음
                    마지막날짜 = Math.max(마지막날짜, 익은날짜[다음층][다음행][다음열]);
                    익음전파큐.add(new int[]{다음층,다음행,다음열});
                }
            }
        }

        // ── 4) 안 익은(0) 칸이 남으면 -1, 아니면 최대 날짜 ──
        for (int[][] 한층 : 상자) for (int[] 한줄 : 한층) for (int 칸 : 한줄) if (칸==0) { System.out.println(-1); return; }
        System.out.println(마지막날짜);
        // 2D와 동일하되 위/아래 층까지 6방향으로 퍼짐 → ✅ 출력: 모두 익는 최대 날짜
    }
}`},

{id:10026,title:'적록색약',type:'BFS/DFS',diff:'G5',
problem:'R(빨강)·G(초록)·B(파랑)으로 칠해진 N×N 그림이 있습니다. 같은 색끼리 상하좌우로 연결된 칸들을 하나의 구역이라 합니다. 일반인이 봤을 때의 구역 수와, 빨강·초록을 구분하지 못하는 적록색약(R과 G를 같은 색으로 봄)이 봤을 때의 구역 수를 각각 구하는 문제입니다.\n\n입력: 1행에 그림 크기 N, 이후 N개 줄에 각 칸의 색(R/G/B)이 주어진다.\n출력: 일반인이 보는 구역 수와 적록색약이 보는 구역 수를 공백으로 구분해 출력',
summary:'일반인과 적록색약자가 보는 구역 수 각각 구하기',
explain:'정상 시각: R,G,B를 각각 다른 색으로 BFS. 색약 시각: R과 G를 같은 색으로 취급하여 BFS. 두 경우 모두 연결 요소 수를 셉니다.',
flow:`flowchart TD
A([시작]) --> B["색상 그리드 입력"]
B --> C["일반 BFS: R/G/B 구분"]
C --> D["연결 요소 수 = normal"]
D --> E["색약 BFS: G를 R로 변환"]
E --> F["연결 요소 수 = weak"]
F --> G["normal weak 출력"]
G --> H([종료])`,
code:`import java.util.*;
import java.io.*;

public class Main {
    static int 그림크기;
    static int[] 행이동={0,0,1,-1}, 열이동={1,-1,0,0};   // 상하좌우
    // [메서드 역할] 일반인·적록색약이 보는 구역 수를 각각 출력
    public static void main(String[] args) throws Exception {
        // ▼ 예시: N=5, RRRBB/GGBBB/BBBRR/BBRRR/RRRRR → 일반 4구역, 색약 3구역

        // ── 1) 그림 입력 ──
        BufferedReader 입력 = new BufferedReader(new InputStreamReader(System.in));
        그림크기 = Integer.parseInt(입력.readLine().trim());   // 그림크기=5
        char[][] 그림 = new char[그림크기][그림크기];
        for (int i = 0; i < 그림크기; i++) 그림[i] = 입력.readLine().toCharArray();

        // ── 2) 같은 함수를 '일반 시각'과 '색약 시각' 두 번 호출해 구역 수 비교 ──
        System.out.println(구역수세기(그림, false) + " " + 구역수세기(그림, true));
        // 일반(R/G/B 구분)=4, 색약(R=G 취급)=3 → ✅ 출력: 4 3
    }
    // 인접한 같은 색끼리 묶은 구역(연결 요소) 수를 BFS로 센다
    static int 구역수세기(char[][] 원본그림, boolean 색약모드) {
        // ── 색약 모드면 G를 R로 바꿔 둘을 같은 색으로 취급 → 코드 한 벌로 두 경우 처리 ──
        char[][] 볼그림 = new char[그림크기][그림크기];
        for (int i=0; i<그림크기; i++) for (int j=0; j<그림크기; j++)
            볼그림[i][j] = (색약모드 && 원본그림[i][j]=='G') ? 'R' : 원본그림[i][j];

        boolean[][] 방문여부 = new boolean[그림크기][그림크기];
        int 구역수 = 0;

        // ── 아직 안 묶인 칸을 만나면 새 구역 시작, 같은 색끼리 BFS로 묶기 ──
        for (int i=0; i<그림크기; i++) for (int j=0; j<그림크기; j++) {
            if (!방문여부[i][j]) {   // 아직 안 묶인 칸 = 새로운 구역 시작
                구역수++;
                Queue<int[]> 탐색큐 = new LinkedList<>();
                탐색큐.add(new int[]{i,j}); 방문여부[i][j]=true;
                while (!탐색큐.isEmpty()) {
                    int[] 현재칸 = 탐색큐.poll();
                    for (int 방향=0; 방향<4; 방향++) {
                        int 다음행=현재칸[0]+행이동[방향], 다음열=현재칸[1]+열이동[방향];
                        // 범위 안 + 미방문 + '같은 색'일 때만 같은 구역으로 묶음
                        if (다음행>=0&&다음행<그림크기&&다음열>=0&&다음열<그림크기&&!방문여부[다음행][다음열]&&볼그림[다음행][다음열]==볼그림[현재칸[0]][현재칸[1]]) {
                            방문여부[다음행][다음열]=true; 탐색큐.add(new int[]{다음행,다음열});
                        }
                    }
                }
            }
        }
        return 구역수;
    }
}`},

{id:11724,title:'연결 요소의 개수',type:'BFS/DFS',diff:'S2',
problem:'방향이 없는 그래프가 주어질 때, 서로 연결된 정점들의 묶음(연결 요소)이 몇 개인지 구하는 문제입니다. 어떤 정점에서 간선을 따라 도달할 수 있는 정점들끼리 하나의 연결 요소를 이룹니다.\n\n입력: 1행에 정점 수 N과 간선 수 M, 이후 M개 줄에 간선으로 연결된 두 정점이 주어진다.\n출력: 그래프의 연결 요소 개수',
summary:'방향 없는 그래프의 연결 요소 개수 구하기',
explain:'모든 노드를 순회하면서 방문하지 않은 노드에서 BFS를 시작합니다. BFS 시작 횟수가 연결 요소 수입니다.',
flow:`flowchart TD
A([시작]) --> B["그래프 입력"]
B --> C["모든 노드 순회"]
C --> D{미방문 노드?}
D -->|Yes| E["BFS 시작 + cnt++"]
E --> F["연결된 모든 노드 방문"]
F --> C
D -->|No| C
C -->|완료| G["cnt 출력"]
G --> H([종료])`,
code:`import java.util.*;
import java.io.*;

public class Main {
    // [메서드 역할] 방향 없는 그래프의 연결 요소 개수 출력
    public static void main(String[] args) throws Exception {
        // ▼ 예시: N=6 M=5 / 간선 1-2, 2-5, 5-1, 3-4, 4-6
        // ── 1) 정점·간선 수 입력 ──
        BufferedReader 입력 = new BufferedReader(new InputStreamReader(System.in));
        StringTokenizer 토큰 = new StringTokenizer(입력.readLine());
        int 정점수 = Integer.parseInt(토큰.nextToken());   // 정점수=6
        int 간선수 = Integer.parseInt(토큰.nextToken());   // 간선수=5

        // ── 2) 인접 리스트로 그래프 만들기 (양방향 간선) ──
        List<Integer>[] 인접리스트 = new ArrayList[정점수+1];
        for (int i=1; i<=정점수; i++) 인접리스트[i] = new ArrayList<>();
        for (int i=0; i<간선수; i++) {
            토큰 = new StringTokenizer(입력.readLine());
            int 정점A = Integer.parseInt(토큰.nextToken()), 정점B = Integer.parseInt(토큰.nextToken());
            인접리스트[정점A].add(정점B); 인접리스트[정점B].add(정점A);
        }
        // 인접리스트: 1↔2, 2↔5, 5↔1, 3↔4, 4↔6  →  덩어리 {1,2,5} 와 {3,4,6}

        // ── 3) 미방문 정점에서 BFS를 시작한 횟수 = 연결 요소 개수 ──
        boolean[] 방문여부 = new boolean[정점수+1];
        int 덩어리수 = 0;
        for (int i=1; i<=정점수; i++) {
            if (!방문여부[i]) {
                덩어리수++;   // 미방문 정점에서 새 덩어리 시작
                Queue<Integer> 탐색큐 = new LinkedList<>();
                탐색큐.add(i); 방문여부[i]=true;
                while (!탐색큐.isEmpty()) {
                    int 현재정점 = 탐색큐.poll();
                    for (int 다음정점 : 인접리스트[현재정점]) if (!방문여부[다음정점]) { 방문여부[다음정점]=true; 탐색큐.add(다음정점); }
                }
            }
            // i=1: {1,2,5} 방문 → 덩어리수=1 / i=3: {3,4,6} 방문 → 덩어리수=2
        }
        System.out.println(덩어리수);   // ✅ 출력: 2
    }
}`},

code:`import java.util.*;

public class Main {

    public static void main(String[] args) throws Exception {
        // ▼ 예시 입력:  5 / 1 / 3 / 0 / 0 / 0
        BufferedReader 입력 = new BufferedReader(new InputStreamReader(System.in));
        int 연산수 = Integer.parseInt(입력.readLine().trim());   // 연산수=5

        // 항상 '가장 작은 값'이 맨 위로 올라오는 최소 힙 (Java 기본 우선순위 큐)

        StringBuilder 출력 = new StringBuilder();

        while (연산수-- > 0) {
            int 입력값 = Integer.parseInt(입력.readLine().trim());
            if (입력값 == 0) 출력.append(최소힙.isEmpty() ? 0 : 최소힙.poll()).append('\\n');  // 0이면 최솟값 꺼내기

        }

    }
}`},

code:`import java.util.*;
import java.io.*;

public class Main {
    // [메서드 역할] 절댓값 최솟값(같으면 음수 먼저) 출력·제거, 그 외 값은 삽입
    public static void main(String[] args) throws Exception {
        // ▼ 예시 입력:  5 / 1 / -1 / 0 / 0 / 0
        BufferedReader 입력 = new BufferedReader(new InputStreamReader(System.in));
        int 연산수 = Integer.parseInt(입력.readLine().trim());   // 연산수=5

        // 정렬 기준을 직접 지정한 힙: '절댓값이 작은 값'이 맨 위, 절댓값이 같으면 음수를 먼저
        PriorityQueue<Integer> 절댓값힙 = new PriorityQueue<>((a, b) -> {
            int 절댓값a = Math.abs(a), 절댓값b = Math.abs(b);
            return 절댓값a != 절댓값b ? 절댓값a - 절댓값b : a - b;  // 절댓값 같으면 작은(음수) 값 먼저
        });
        StringBuilder 출력 = new StringBuilder();

        while (연산수-- > 0) {
            int 입력값 = Integer.parseInt(입력.readLine().trim());
            if (입력값 == 0) 출력.append(절댓값힙.isEmpty() ? 0 : 절댓값힙.poll()).append('\\n');  // 0이면 절댓값 최솟값 꺼내기
            else 절댓값힙.add(입력값);                                                          // 그 외 값은 삽입
            // 1  → 절댓값힙=[1]
            // -1 → 절댓값힙=[-1, 1]   (|−1|=|1| 동률 → 음수 -1이 먼저)
            // 0  → -1 출력, 절댓값힙=[1]
            // 0  → 1 출력,  절댓값힙=[]
            // 0  → 비었음 → 0 출력
        }
        System.out.print(출력);   // ✅ 출력: -1 / 1 / 0
    }
}`},

{id:7662,title:'이중 우선순위 큐',type:'우선순위큐',diff:'G4',
problem:'양쪽 끝(최댓값·최솟값)을 모두 빠르게 삭제할 수 있는 이중 우선순위 큐를 다루는 문제입니다. 명령 "I n"은 정수 n을 삽입, "D 1"은 현재 최댓값을 삭제, "D -1"은 현재 최솟값을 삭제합니다. 큐가 비어 있을 때의 D 명령은 무시합니다.\n\n입력: 1행에 테스트케이스 수 T. 각 케이스는 1행에 명령 수 k, 이후 k개 줄에 명령(I n 또는 D ±1)이 주어진다.\n출력: 케이스마다, 모든 명령 후 큐가 비어 있으면 EMPTY, 아니면 "최댓값 최솟값"을 공백으로 구분해 출력',
summary:'최솟값과 최댓값을 모두 꺼낼 수 있는 큐',
explain:'TreeMap<값, 개수>를 사용합니다. firstKey()로 최솟값, lastKey()로 최댓값을 O(logN)에 가져올 수 있습니다. 값이 중복될 수 있으므로 개수를 관리합니다.',
flow:`flowchart TD
A([시작]) --> B["T번 반복"]
B --> C["TreeMap 초기화"]
C --> D["명령 입력"]
D --> E{I or D?}
E -->|I n| F["map에 n 추가 (count++)"]
E -->|D 1| G{비어있음?}
E -->|D -1| H{비어있음?}
G -->|No| I["최댓값 제거"]
H -->|No| J["최솟값 제거"]
G -->|Yes| D
H -->|Yes| D
F --> D
I --> D
J --> D
D -->|완료| K{비어있음?}
K -->|Yes| L["EMPTY 출력"]
K -->|No| M["최솟값 최댓값 출력"]

code:`import java.util.*;
import java.io.*;

public class Main {
    // [메서드 역할] D 1=최댓값/D -1=최솟값 삭제 후, 비면 EMPTY 아니면 "최댓값 최솟값"
    public static void main(String[] args) throws Exception {
        // ▼ 예시: T=1 / k=7 / I 16, I -5643, D -1, D 1, D 1, I 123, D -1
        BufferedReader 입력 = new BufferedReader(new InputStreamReader(System.in));
        int 테스트수 = Integer.parseInt(입력.readLine().trim());   // 테스트수=1
        StringBuilder 출력 = new StringBuilder();

        while (테스트수-- > 0) {
            int 명령수 = Integer.parseInt(입력.readLine().trim());   // 명령수=7

            // 값을 항상 정렬 상태로 보관하는 맵 <값, 그 값의 개수>
            // → firstKey()로 최솟값, lastKey()로 최댓값을 바로 알 수 있음 (중복은 개수로 관리)
            TreeMap<Integer,Integer> 값별개수맵 = new TreeMap<>();

            while (명령수-- > 0) {
                StringTokenizer 토큰 = new StringTokenizer(입력.readLine());
                char 명령 = 토큰.nextToken().charAt(0);   // I=삽입, D=삭제
                int 값 = Integer.parseInt(토큰.nextToken());

                if (명령 == 'I') {
                    값별개수맵.merge(값, 1, Integer::sum);          // 삽입: 개수 +1
                } else {
                    if (값별개수맵.isEmpty()) continue;             // 비었으면 삭제 무시
                    int 대상키 = (값 == 1) ? 값별개수맵.lastKey() : 값별개수맵.firstKey();  // D 1=최댓값, D -1=최솟값
                    if (값별개수맵.get(대상키) == 1) 값별개수맵.remove(대상키);              // 마지막 하나면 제거
                    else 값별개수맵.put(대상키, 값별개수맵.get(대상키)-1);                    // 여러 개면 개수 -1
                }
                // I 16,-5643 → {-5643,16} / D -1 → 최솟값 -5643 삭제 → {16}
                // D 1 → 최댓값 16 삭제 → {} / D 1 → 무시 / I 123 → {123} / D -1 → {}
            }

            // 모든 명령 후: 비었으면 EMPTY, 아니면 "최댓값 최솟값"
            if (값별개수맵.isEmpty()) 출력.append("EMPTY\\n");
            else 출력.append(값별개수맵.lastKey()).append(' ').append(값별개수맵.firstKey()).append('\\n');
        }
        System.out.print(출력);   // ✅ 출력: EMPTY
    }
}`},

code:`import java.util.*;
import java.io.*;

public class Main {
    // [메서드 역할] 평균·중앙값·최빈값·범위를 구해 4줄 출력
    public static void main(String[] args) throws Exception {
        // ▼ 예시 입력:  5 / 1 / 3 / 8 / -2 / 2
        // ── 1) 입력받으며 합계와 '값별 등장 횟수'를 동시에 기록 ──
        BufferedReader 입력 = new BufferedReader(new InputStreamReader(System.in));
        int 개수 = Integer.parseInt(입력.readLine().trim());   // 개수=5
        int[] 수배열 = new int[개수];
        int[] 등장횟수 = new int[8001];   // -4000~4000 → +4000 옮겨서 배열 칸으로 사용
        long 합계 = 0;
        for (int i = 0; i < 개수; i++) {
            수배열[i] = Integer.parseInt(입력.readLine().trim());
            등장횟수[수배열[i]+4000]++;
            합계 += 수배열[i];
        }
        Arrays.sort(수배열);   // 수배열=[-2,1,2,3,8], 합계=12

        // ── 2) 평균(반올림)과 중앙값(정렬 후 한가운데) ──
        int 평균 = (int) Math.round((double)합계/개수);   // 12/5=2.4 → 2
        int 중앙값 = 수배열[개수/2];   // 수배열[2]=2

        // ── 3) 최빈값: 가장 많이 나온 값, 여럿이면 그중 두 번째로 작은 값 ──
        int 최대등장 = 0;
        for (int 횟수 : 등장횟수) 최대등장 = Math.max(최대등장, 횟수);   // 모두 1번 등장 → 최대등장=1
        int 최빈값 = 0; boolean 후보찾음 = false;
        for (int i = 0; i <= 8000; i++) {
            if (등장횟수[i] == 최대등장) {
                if (!후보찾음) { 최빈값 = i-4000; 후보찾음 = true; }   // 첫 후보 -2 기억
                else { 최빈값 = i-4000; break; }                    // 두 번째 후보 1 → 최빈값
            }
        }

        // ── 4) 범위(최대 - 최소)와 결과 출력 ──
        int 범위 = 수배열[개수-1] - 수배열[0];   // 8 - (-2) = 10
        System.out.println(평균+"\\n"+중앙값+"\\n"+최빈값+"\\n"+범위);   // ✅ 출력: 2 / 2 / 1 / 10
    }

{id:1074,title:'Z',type:'구현/시뮬',diff:'S1',
problem:'2^N × 2^N 크기의 배열을 Z 모양으로 방문합니다. 배열을 4등분한 뒤 왼쪽 위 → 오른쪽 위 → 왼쪽 아래 → 오른쪽 아래 순서로, 각 사분면을 다시 같은 방식으로 재귀적으로 방문합니다. 이때 r행 c열 칸이 몇 번째(0부터 시작)로 방문되는지 구하는 문제입니다.\n\n입력: N, r, c가 공백으로 구분되어 주어진다.\n출력: (r, c) 칸을 방문하는 순서 번호',
summary:'Z 모양으로 탐색할 때 (r,c)가 몇 번째인지',
explain:'분할정복으로 풀어냅니다. 2^n × 2^n 을 4등분하여 (r,c)가 어느 사분면에 있는지 결정합니다. 해당 사분면 크기(2^(n-1) × 2^(n-1))를 오프셋으로 더합니다.',
flow:`flowchart TD

B --> C["solve(size, r, c, 0) 호출"]
C --> D{size == 1?}

D -->|No| F["절반 = size/2"]
F --> G{r < 절반?}
G -->|Yes r<절반| H{c < 절반?}
G -->|No| I{c < 절반?}
H -->|Yes| J["1사분면: offset 그대로"]
H -->|No| K["2사분면: offset += 절반²"]
I -->|Yes| L["3사분면: offset += 절반²×2"]
I -->|No| M["4사분면: offset += 절반²×3"]

code:`import java.util.Scanner;

public class Main {
    // [메서드 역할] Z 순서로 방문할 때 (r,c)가 몇 번째인지 출력
    public static void main(String[] args) {
        // ▼ 예시 입력: 2 3 1   (2^2 × 2^2 = 4×4 판)
        Scanner 입력 = new Scanner(System.in);
        int 단계N = 입력.nextInt(), 목표행 = 입력.nextInt(), 목표열 = 입력.nextInt();   // 단계N=2, 목표행=3, 목표열=1
        System.out.println(Z순서번호(1 << 단계N, 목표행, 목표열));   // 1<<2=4 → Z순서번호(4,3,1)
    }
    // [메서드 역할] 판(크기×크기)을 4사분면으로 나눠 (행,열)이 든 곳만 재귀로 추적
    static long Z순서번호(int 판크기, int 행, int 열) {
        if (판크기 == 1) return 0;
        int 절반 = 판크기 / 2;
        long 사분면칸수 = (long) 절반 * 절반;   // 한 사분면의 칸 수
        if (행 < 절반 && 열 < 절반) return Z순서번호(절반, 행, 열);                        // 1사분면(좌상)
        if (행 < 절반 && 열 >= 절반) return 사분면칸수 + Z순서번호(절반, 행, 열-절반);       // 2사분면(우상)
        if (행 >= 절반 && 열 < 절반) return 사분면칸수*2 + Z순서번호(절반, 행-절반, 열);     // 3사분면(좌하)
        return 사분면칸수*3 + Z순서번호(절반, 행-절반, 열-절반);                            // 4사분면(우하)
        // Z순서번호(4,3,1): 좌하 → 4*2 + Z순서번호(2,1,1)
        //   Z순서번호(2,1,1): 우하 → 1*3 + Z순서번호(1,0,0)=3
        //   → 8 + 3 = 11
    }
}`},

code:`import java.util.*;
import java.io.*;

public class Main {
    static int[] 행이동={0,0,1,-1}, 열이동={1,-1,0,0};   // 상하좌우
    static int[][] 보드;
    static boolean[][] 방문여부;
    static int 세로, 가로, 최대합 = 0;   // 최대합: 어떤 테트로미노로 얻을 수 있는 칸 합의 최댓값

    public static void main(String[] args) throws Exception {
        // ▼ 예시: N=4 M=5 보드 (각 칸 숫자 주어짐)

        BufferedReader 입력 = new BufferedReader(new InputStreamReader(System.in));
        StringTokenizer 토큰 = new StringTokenizer(입력.readLine());
        세로 = Integer.parseInt(토큰.nextToken()); 가로 = Integer.parseInt(토큰.nextToken());   // 세로=4, 가로=5
        보드 = new int[세로][가로]; 방문여부 = new boolean[세로][가로];
        for (int i=0; i<세로; i++) {
            토큰 = new StringTokenizer(입력.readLine());
            for (int j=0; j<가로; j++) 보드[i][j] = Integer.parseInt(토큰.nextToken());
        }

        // ── 2) 모든 칸을 시작점으로 삼아 연결된 4칸 조합을 DFS로 탐색 ──
        for (int i=0; i<세로; i++) for (int j=0; j<가로; j++) {
            방문여부[i][j] = true;
            연결4칸탐색(i, j, 1, 보드[i][j]);   // (i,j)에서 시작해 연결된 4칸 조합 탐색
            방문여부[i][j] = false;             // 다음 시작점 위해 방문 해제(백트래킹)
        }
        System.out.println(최대합);   // ✅ 출력: 가능한 테트로미노 중 칸 합 최댓값

    static void 연결4칸탐색(int 행, int 열, int 고른칸수, int 지금합){
        if (고른칸수==4) { 최대합 = Math.max(최대합, 지금합); return; }   // 4칸 완성 → 합 비교
        for (int 방향=0; 방향<4; 방향++) {
            int 다음행=행+행이동[방향], 다음열=열+열이동[방향];
            if (다음행>=0&&다음행<세로&&다음열>=0&&다음열<가로&&!방문여부[다음행][다음열]) {

                방문여부[다음행][다음열] = false;                                   // 백트래킹: 다른 모양 시도
            }
        }
        // 주의: 이 경로형 DFS는 'ㅗ(T)' 모양은 못 만들어 → 실제 제출 시 별도 처리 필요
    }

{id:5430,title:'AC',type:'구현/시뮬',diff:'G5',
problem:'정수 배열에 두 가지 함수를 적용하는 문제입니다. R은 배열의 순서를 뒤집고, D는 맨 앞 원소 하나를 버립니다. 단, 비어 있는 배열에 D를 수행하면 에러가 발생합니다. 함수들이 이어진 명령 문자열 p를 앞에서부터 차례로 적용한 최종 배열을 구합니다(R이 연속되면 실제로 뒤집지 않고 방향만 바꿔 효율적으로 처리).\n\n입력: 1행에 테스트케이스 수 T. 각 케이스는 명령 문자열 p, 배열 크기 n, [x1,x2,...] 형태의 배열이 차례로 주어진다.\n출력: 케이스마다 최종 배열을 [...] 형태로 출력. 도중에 에러가 나면 error',
summary:'R(뒤집기)과 D(앞 삭제) 연산으로 배열 변환',
explain:'실제로 배열을 뒤집으면 O(N)이 반복되어 TLE. 대신 덱과 boolean 반전 플래그를 사용합니다. R은 플래그 토글, D는 플래그에 따라 앞 또는 뒤에서 삭제합니다.',
flow:`flowchart TD

code:`import java.util.*;
import java.io.*;

public class Main {
    // [메서드 역할] R(뒤집기)·D(앞 삭제) 명령 수행 후 배열 출력 (불가하면 error)
    public static void main(String[] args) throws Exception {
        // ▼ 예시: T=1 / p="RDD" / n=4 / 배열 [1,2,3,4]
        BufferedReader 입력 = new BufferedReader(new InputStreamReader(System.in));
        int 테스트수 = Integer.parseInt(입력.readLine().trim());   // 테스트수=1
        StringBuilder 출력 = new StringBuilder();

        while (테스트수-- > 0) {
            // ── 1) 명령 문자열과 배열 입력 ──
            String 명령문자열 = 입력.readLine().trim();          // 명령문자열="RDD"
            int 원소수 = Integer.parseInt(입력.readLine().trim());  // 원소수=4
            String 배열문자열 = 입력.readLine().trim();          // 배열문자열="[1,2,3,4]"

            // 값을 양쪽 끝에서 뺄 수 있는 덱에 담아 둠
            Deque<Integer> 값덱 = new ArrayDeque<>();       // 값덱=[1,2,3,4]
            if (원소수 > 0) {
                String[] 조각들 = 배열문자열.substring(1, 배열문자열.length()-1).split(",");
                for (String 조각 : 조각들) 값덱.addLast(Integer.parseInt(조각));
            }

            // ── 2) 명령 실행: R은 실제로 뒤집지 않고 '방향 플래그'만 토글해 O(1) 처리 ──
            boolean 뒤집힘 = false, 오류 = false;
            for (char 명령 : 명령문자열.toCharArray()) {
                if (명령 == 'R') { 뒤집힘 = !뒤집힘; }   // 방향만 반전 (O(1))
                else {
                    if (값덱.isEmpty()) { 오류 = true; break; }        // 빈 배열에 D → 에러
                    if (뒤집힘) 값덱.pollLast(); else 값덱.pollFirst();  // 방향에 따라 앞/뒤에서 삭제
                }
                // 'R' → 뒤집힘=true (뒤집힌 상태)
                // 'D' → 뒤에서 삭제: 4 제거 → 값덱=[1,2,3]
                // 'D' → 뒤에서 삭제: 3 제거 → 값덱=[1,2]
            }

            // ── 3) 결과 출력: 오류면 error, 아니면 방향 플래그에 맞춰 순서 정해 출력 ──
            if (오류) { 출력.append("error\\n"); continue; }
            StringJoiner 결과 = new StringJoiner(",","[","]");
            if (뒤집힘) { Integer[] 배열=값덱.toArray(new Integer[0]); for(int i=배열.length-1;i>=0;i--) 결과.add(String.valueOf(배열[i])); }
            else for (int 값 : 값덱) 결과.add(String.valueOf(값));
            출력.append(결과).append('\\n');
            // 뒤집힘=true → 남은 [1,2]를 역순으로 → ✅ 출력: [2,1]
        }
        System.out.print(출력);
    }
}`},

{id:16928,title:'뱀과 사다리 게임',type:'구현/시뮬',diff:'G5',
problem:'1번 칸에서 출발해 100번 칸 도착을 목표로 하는 보드게임입니다. 매 턴 주사위를 굴려 나온 수(1~6)만큼 앞으로 이동하며, 도착한 칸에 사다리가 있으면 그 끝으로 올라가고 뱀이 있으면 그 끝으로 내려갑니다. 100번 칸에 도달하기 위해 주사위를 굴려야 하는 최소 횟수를 구하는 문제입니다.\n\n입력: 1행에 사다리 수 N과 뱀 수 M, 이후 N+M개 줄에 각 사다리·뱀의 시작 칸과 도착 칸이 주어진다.\n출력: 100번 칸에 도달하기 위한 최소 주사위 굴림 횟수',

code:`import java.util.*;
import java.io.*;

public class Main {
    // [메서드 역할] 1번 칸에서 100번 칸까지 최소 주사위 횟수 출력 (BFS)
    public static void main(String[] args) throws Exception {
        // ▼ 예시: 사다리 3개, 뱀 7개 → 1번에서 100번까지 최소 3번
        // ── 1) 사다리·뱀 위치 입력 ──
        BufferedReader 입력 = new BufferedReader(new InputStreamReader(System.in));
        StringTokenizer 토큰 = new StringTokenizer(입력.readLine());
        int 사다리수 = Integer.parseInt(토큰.nextToken()), 뱀수 = Integer.parseInt(토큰.nextToken());  // 사다리수=3, 뱀수=7

        // 순간이동표[칸] = 그 칸에 사다리/뱀이 있으면 도착 칸, 없으면 0
        int[] 순간이동표 = new int[101];
        for (int i = 0; i < 사다리수+뱀수; i++) {   // 사다리·뱀 모두 "시작→도착 이동"이라 똑같이 처리
            토큰 = new StringTokenizer(입력.readLine());
            int 시작칸 = Integer.parseInt(토큰.nextToken()), 도착칸 = Integer.parseInt(토큰.nextToken());
            순간이동표[시작칸] = 도착칸;
        }

        // ── 2) BFS 최단경로: 주사위 한 번 = 한 칸 퍼짐 → 처음 도달한 순간이 최소 횟수 ──
        int[] 최소굴림수 = new int[101];   // 최소굴림수[칸] = 1번 칸에서 그 칸까지 최소 주사위 횟수
        Arrays.fill(최소굴림수, -1);       // -1 = 미방문
        Queue<Integer> 방문예정큐 = new LinkedList<>();
        방문예정큐.add(1); 최소굴림수[1] = 0;
        while (!방문예정큐.isEmpty()) {
            int 현재칸 = 방문예정큐.poll();
            for (int 주사위 = 1; 주사위 <= 6; 주사위++) {   // 주사위 눈 1~6 모두 시도
                int 다음칸 = 현재칸 + 주사위;
                if (다음칸 > 100) continue;                 // 100을 넘는 이동은 불가
                if (순간이동표[다음칸] != 0) 다음칸 = 순간이동표[다음칸];   // 사다리는 위로/뱀은 아래로 즉시 이동
                if (최소굴림수[다음칸] == -1) {               // 아직 안 가본 칸만
                    최소굴림수[다음칸] = 최소굴림수[현재칸]+1;
                    if (다음칸 == 100) { System.out.println(최소굴림수[다음칸]); return; }   // ✅ 출력: 3
                    방문예정큐.add(다음칸);
                }
            }
            // 1 → 주사위로 2~7 도달(1번) → 사다리 점프 … → 최소 3번 만에 100 도달
        }
    }
}`},

{id:8001,title:'1회 매매 최대 수익 · 투포인터',type:'주식/금융',diff:'S5',
problem:'하루마다의 주가가 주어진다. 한 번 사서 나중에 한 번 팔 때(매수일 < 매도일) 얻을 수 있는 최대 수익을 구하시오. (수익이 없으면 0)\n\n입력: 1행 N, 2행 N일치 주가\n출력: 최대 수익',
summary:'지금까지 최저가를 추적하며 최대 차익 구하기 (O(N))',
explain:'왼쪽부터 한 번 훑으며 "지금까지 최저가"를 갱신하고, 오늘 팔았을 때의 수익(현재가-최저가)의 최댓값을 추적합니다. 모든 쌍을 보면 O(N²)이지만 이 방법은 O(N).',
flow:`flowchart TD
A([시작]) --> B["minPrice=첫날, best=0"]
B --> C["다음 날부터 순회"]
C --> D["best = max(best, 오늘가-minPrice)"]
D --> E["minPrice = min(minPrice, 오늘가)"]
E --> C
C -->|끝| F["best 출력"]
F --> G([종료])`,
code:`import java.util.*;
import java.io.*;

public class Main {
    // [메서드 역할] 한 번 사고팔아 얻는 최대 수익 출력
    public static void main(String[] args) throws Exception {
        // ▼ 예시 입력:  6 / 7 1 5 3 6 4
        BufferedReader 입력 = new BufferedReader(new InputStreamReader(System.in));
        int 일수 = Integer.parseInt(입력.readLine().trim());
        int[] 주가 = new int[일수];
        StringTokenizer 토큰 = new StringTokenizer(입력.readLine());
        for (int i = 0; i < 일수; i++) 주가[i] = Integer.parseInt(토큰.nextToken());

        int 지금까지최저가 = 주가[0], 최대수익 = 0;
        for (int i = 1; i < 일수; i++) {
            최대수익 = Math.max(최대수익, 주가[i] - 지금까지최저가);  // 오늘 팔 때 수익
            지금까지최저가 = Math.min(지금까지최저가, 주가[i]);        // 지금까지 최저가 갱신
        }
        System.out.println(최대수익);   // ✅ 출력: 5  (1에 사서 6에 팔기)
    }
}`},

D -->|Yes| E["pop, ans=i-그때"]
E --> D
D -->|No| F["i push"]
F --> C
C -->|끝| G["남은 인덱스 마무리 후 출력"]
G --> H([종료])`,
code:`import java.util.*;
import java.io.*;

public class Main {
    // [메서드 역할] 각 시점 가격이 유지된 시간(초) 출력
    public static void main(String[] args) throws Exception {
        // ▼ 예시 입력:  5 / 1 2 3 2 3
        BufferedReader 입력 = new BufferedReader(new InputStreamReader(System.in));
        int 일수 = Integer.parseInt(입력.readLine().trim());
        int[] 주가 = new int[일수];
        StringTokenizer 토큰 = new StringTokenizer(입력.readLine());
        for (int i = 0; i < 일수; i++) 주가[i] = Integer.parseInt(토큰.nextToken());

        int[] 유지시간 = new int[일수];
        // 아직 가격이 안 떨어진 시점의 '인덱스'를 쌓아 두는 스택
        Deque<Integer> 대기시점스택 = new ArrayDeque<>();
        for (int i = 0; i < 일수; i++) {
            while (!대기시점스택.isEmpty() && 주가[대기시점스택.peek()] > 주가[i]) {
                int 떨어진시점 = 대기시점스택.pop();
                유지시간[떨어진시점] = i - 떨어진시점;   // 그 시점은 i에서 가격이 떨어짐
            }
            대기시점스택.push(i);
        }
        while (!대기시점스택.isEmpty()) {        // 끝까지 안 떨어진 시점
            int 남은시점 = 대기시점스택.pop();
            유지시간[남은시점] = 일수 - 1 - 남은시점;
        }

        StringBuilder 출력 = new StringBuilder();
        for (int 시간 : 유지시간) 출력.append(시간).append(' ');
        System.out.println(출력.toString().trim());   // ✅ 출력: 4 3 1 1 0
    }
}`},

explain:'아래 절반은 최대 힙, 위 절반은 최소 힙에 담고 두 힙의 크기를 ±1로 균형 맞추면, 중앙값은 항상 아래 절반의 최댓값입니다. 매 삽입 O(log N).',
flow:`flowchart TD

D --> B
B -->|끝| E([종료])`,
code:`import java.util.*;
import java.io.*;

public class Main {
    // [메서드 역할] 주가가 들어올 때마다 중앙값 출력
    public static void main(String[] args) throws Exception {
        // ▼ 예시 입력:  5 / 5 15 1 3 8
        BufferedReader 입력 = new BufferedReader(new InputStreamReader(System.in));
        int 일수 = Integer.parseInt(입력.readLine().trim());
        StringTokenizer 토큰 = new StringTokenizer(입력.readLine());

        // 중앙값을 기준으로 아래 절반은 최대 힙, 위 절반은 최소 힙에 나눠 담는다
        PriorityQueue<Integer> 아래절반최대힙 = new PriorityQueue<>(Collections.reverseOrder());
        PriorityQueue<Integer> 위절반최소힙 = new PriorityQueue<>();
        StringBuilder 출력 = new StringBuilder();

        for (int i = 0; i < 일수; i++) {
            int 오늘주가 = Integer.parseInt(토큰.nextToken());
            // 1) 중앙값보다 작거나 같으면 아래 힙, 크면 위 힙에 넣기
            if (아래절반최대힙.isEmpty() || 오늘주가 <= 아래절반최대힙.peek()) 아래절반최대힙.add(오늘주가); else 위절반최소힙.add(오늘주가);
            // 2) 두 힙 크기를 ±1 이내로 균형 맞추기
            if (아래절반최대힙.size() > 위절반최소힙.size() + 1) 위절반최소힙.add(아래절반최대힙.poll());
            else if (위절반최소힙.size() > 아래절반최대힙.size()) 아래절반최대힙.add(위절반최소힙.poll());
            // 3) 중앙값 = 아래 절반의 최댓값
            출력.append(아래절반최대힙.peek()).append('\\n');
        }
        System.out.print(출력);   // ✅ 출력: 5 / 5 / 5 / 3 / 5
    }
}`},

        // ▼ 예시 입력:  3 10 / 가격 4 6 5 / 수익 5 6 4
        BufferedReader 입력 = new BufferedReader(new InputStreamReader(System.in));
        StringTokenizer 토큰 = new StringTokenizer(입력.readLine());
        int 종목수 = Integer.parseInt(토큰.nextToken());
        int 예산 = Integer.parseInt(토큰.nextToken());

        토큰 = new StringTokenizer(입력.readLine());
        for (int i = 0; i < 종목수; i++) 가격[i] = Integer.parseInt(토큰.nextToken());
        토큰 = new StringTokenizer(입력.readLine());
        for (int i = 0; i < 종목수; i++) 기대수익[i] = Integer.parseInt(토큰.nextToken());

        // 종목을 넣고/빼는 모든 경우(부분집합)를 비트로 표현해 완전탐색
        int 최대수익 = 0;
        for (int 조합 = 0; 조합 < (1 << 종목수); 조합++) {   // 모든 부분집합
            int 가격합 = 0, 수익합 = 0;

            if (가격합 <= 예산) 최대수익 = Math.max(최대수익, 수익합);
        }

summary:'창을 옮길 때 빠지는 값만 빼고 더해 O(N)',
explain:'매번 K개를 다시 더하면 O(NK). 슬라이딩 윈도우는 창이 한 칸 이동할 때 새로 들어온 값을 더하고 빠지는 값을 빼서 O(N)에 처리합니다.',
flow:`flowchart TD
A([시작]) --> B["sum에 오늘값 더함"]
B --> C{"i>=K?"}
C -->|Yes| D["sum -= K칸 전 값"]
C -->|No| E["넘어감"]
D --> F{"i>=K-1?"}
E --> F
F -->|Yes| G["sum/K 출력"]
G --> B
B -->|끝| H([종료])`,
code:`import java.util.*;
import java.io.*;

public class Main {
    // [메서드 역할] K일 이동평균을 슬라이딩 윈도우로 출력
    public static void main(String[] args) throws Exception {
        // ▼ 예시 입력:  5 3 / 1 2 3 4 5
        BufferedReader 입력 = new BufferedReader(new InputStreamReader(System.in));
        StringTokenizer 토큰 = new StringTokenizer(입력.readLine());
        int 일수 = Integer.parseInt(토큰.nextToken());
        int 창크기K = Integer.parseInt(토큰.nextToken());
        int[] 주가 = new int[일수];
        토큰 = new StringTokenizer(입력.readLine());
        for (int i = 0; i < 일수; i++) 주가[i] = Integer.parseInt(토큰.nextToken());

        StringBuilder 출력 = new StringBuilder();
        int 창안합계 = 0;   // 최근 K일 주가의 합
        for (int i = 0; i < 일수; i++) {
            창안합계 += 주가[i];
            if (i >= 창크기K) 창안합계 -= 주가[i - 창크기K];               // 창에서 빠지는 값 빼기
            if (i >= 창크기K - 1) 출력.append((double) 창안합계 / 창크기K).append(' ');

summary:'평단가(가중평균) 갱신 + 매도 시 실현손익 누적',
explain:'매수하면 보유수량과 매입원가 합을 늘립니다(평단가=원가합/수량). 매도하면 (매도가-평단가)×수량을 실현손익에 더하고, 원가도 평단가만큼 줄입니다.',
flow:`flowchart TD

B --> C{"BUY?"}
C -->|Yes| D["수량·원가합 증가"]
C -->|No| E["실현손익 += (매도가-평단)×수량"]
D --> B
E --> B
B -->|끝| F["실현손익 출력"]
F --> G([종료])`,
code:`import java.util.*;
import java.io.*;

public class Main {
    // [메서드 역할] 매수/매도 명령 처리 후 실현 손익 출력
    public static void main(String[] args) throws Exception {
        // ▼ 예시:  3 / BUY 100 10 / BUY 120 10 / SELL 130 15
        BufferedReader 입력 = new BufferedReader(new InputStreamReader(System.in));
        int 명령수 = Integer.parseInt(입력.readLine().trim());
        long 보유수량 = 0, 매입원가합 = 0, 실현손익 = 0;
        while (명령수-- > 0) {
            StringTokenizer 토큰 = new StringTokenizer(입력.readLine());
            String 명령 = 토큰.nextToken();
            long 단가 = Long.parseLong(토큰.nextToken());
            long 수량 = Long.parseLong(토큰.nextToken());
            if (명령.equals("BUY")) {
                보유수량 += 수량; 매입원가합 += 단가 * 수량;        // 평단가 계산용으로 누적
            } else { // SELL
                long 평단가 = 매입원가합 / 보유수량;
                실현손익 += (단가 - 평단가) * 수량;                // (매도가-평단가)×수량
                보유수량 -= 수량; 매입원가합 -= 평단가 * 수량;
            }
        }
        System.out.println(실현손익);   // ✅ 출력: 300  (평단 110, 130에 15주)
    }
}`},

flow:`flowchart TD

code:`import java.util.*;
import java.io.*;
import java.util.stream.*;

public class Main {
    // [메서드 역할] 종목별 거래대금 합을 사전순 출력
    public static void main(String[] args) throws Exception {
        // ▼ 예시:  4 / A 100 / B 200 / A 50 / B 30
        BufferedReader 입력 = new BufferedReader(new InputStreamReader(System.in));
        int 거래수 = Integer.parseInt(입력.readLine().trim());
        List<String> 거래줄목록 = new ArrayList<>();
        for (int i = 0; i < 거래수; i++) 거래줄목록.add(입력.readLine());

        // 종목코드별로 묶어(groupingBy) 거래대금을 합산(summingInt), TreeMap이라 사전순 정렬
        Map<String, Integer> 종목별합계 = 거래줄목록.stream()
            .map(거래줄 -> 거래줄.split(" "))
            .collect(Collectors.groupingBy(
                토큰들 -> 토큰들[0], TreeMap::new,
                Collectors.summingInt(토큰들 -> Integer.parseInt(토큰들[1]))));

        StringBuilder 출력 = new StringBuilder();
        종목별합계.forEach((종목코드, 금액) -> 출력.append(종목코드).append(' ').append(금액).append('\\n'));
        System.out.print(출력);   // ✅ 출력: A 150 / B 230

}`},

summary:'sorted(내림차순) + limit(3) + sum',
explain:'내림차순 정렬 후 limit(3)으로 상위 3개만 남기고 합칩니다. limit은 스트림을 앞에서 N개로 자르는 연산입니다.',
flow:`flowchart TD

B --> C["sorted(reverseOrder)"]

D --> E["mapToInt → sum 출력"]
E --> F([종료])`,
code:`import java.util.*;
import java.io.*;

public class Main {
    // [메서드 역할] 거래대금 상위 3건의 합 출력
    public static void main(String[] args) throws Exception {
        // ▼ 예시 입력:  5 / 100 500 300 200 400
        BufferedReader 입력 = new BufferedReader(new InputStreamReader(System.in));
        입력.readLine();
        int 상위3합 = Arrays.stream(입력.readLine().split(" "))

function diffColor(diff) {
  const c = diff.charAt(0);
  return DIFF_COLOR[c] || '#555';
}

function renderCards(type) {
  const grid = document.getElementById('grid');
  const filtered = type === '전체' ? problems.filter(p => p.type !== '스트림') : problems.filter(p => p.type === type);
  grid.innerHTML = filtered.map(p => `
    <div class="card" data-id="${p.id}" style="border-top:3px solid ${TYPE_COLOR[p.type]}">
      <div class="card-bar" style="background:${TYPE_COLOR[p.type]}22"></div>
      <div class="card-type" style="color:${TYPE_COLOR[p.type]}">${p.type}</div>
      <div class="card-id">#${p.id}</div>
      <div class="card-title">${p.title}</div>
      <div class="card-summary">${p.summary}</div>
      <div class="diff-badge" style="background:${diffColor(p.diff)}">${p.diff}</div>
    </div>
  `).join('');
  grid.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => openModal(parseInt(card.dataset.id)));

function renderFilters() {
  const types = ['전체','수학','자료구조','해시/맵','완전탐색','BFS/DFS','우선순위큐','구현/시뮬','주식/금융','스트림'];
  const div = document.getElementById('filters');
  div.innerHTML = types.map(t => `<button class="filter-btn${t==='전체'?' active':''}" data-type="${t}">${t}</button>`).join('');
  div.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      div.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderCards(btn.dataset.type);
    });
  });
}

// HTML 특수문자 이스케이프 (문제에 <x:y> 같은 표기가 있어 필수)
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
// 입력 스펙 안의 "N행 …, M행 …" 을 줄바꿈으로 분리해 가독성 향상
function formatIO(s) {
  let t = escHtml(s.trim());
  t = t.replace(/,\s*(?=\d+행)/g, '\n');                 // ", 2행" → 줄바꿈
  t = t.replace(/\s*(?:또는|혹은)\s*/g, ' <span class="vsep">|</span> ');
  return t;
}

  {who:'teach',nm:'🧑‍🏫 알고 선생님',say:'밭을 훑다가 아직 안 센 배추를 만나면 <b>지렁이수++</b> 하고, 그 무리를 BFS로 통째로 방문 표시해요.',why:'왜 <b>무리 수 = 지렁이 수</b>일까? 지렁이 한 마리가 <b>연결된 배추 한 무리</b> 전체를 담당하니까요. 그래서 문제가 "지렁이 몇 마리?"지만, 사실은 <b>연결 요소(덩어리)가 몇 개?</b>와 똑같은 질문이에요. 안 센 배추에서 BFS로 한 무리를 통째로 묶고 +1 하면 끝!',cap:'② 무리마다 세기 + BFS',code:'int 지렁이수 = 0;\nfor (int i=0; i&lt;밭세로; i++)\n  for (int j=0; j&lt;밭가로; j++)\n    if (배추밭[i][j]==1 &amp;&amp; !방문여부[i][j]) {\n        지렁이수++;\n        Queue&lt;int[]&gt; 탐색큐 = new LinkedList&lt;&gt;();\n        탐색큐.add(new int[]{i,j}); 방문여부[i][j]=true;\n        while (!탐색큐.isEmpty()) {\n            int[] 현재칸 = 탐색큐.poll();\n            for (int 방향=0; 방향&lt;4; 방향++) {\n                int 다음행=현재칸[0]+행이동[방향], 다음열=현재칸[1]+열이동[방향];\n                if (다음행&gt;=0 &amp;&amp; 다음행&lt;밭세로 &amp;&amp; 다음열&gt;=0 &amp;&amp; 다음열&lt;밭가로\n                    &amp;&amp; 배추밭[다음행][다음열]==1 &amp;&amp; !방문여부[다음행][다음열]) {\n                    방문여부[다음행][다음열]=true;\n                    탐색큐.add(new int[]{다음행,다음열});\n                }\n            }\n        }\n    }'},

10026:{title:'🎨 적록색약 구역',sub:'같은 색끼리 붙은 구역이 몇 개? 일반 시야 vs 적록색약(R=G)! — 10026',

 cuts:[
  {who:'teach',nm:'🧑‍🏫 알고 선생님',say:'같은 색끼리 붙은 게 <b>한 구역</b>이에요. 핵심은 <b>같은 함수를 두 번</b> 호출하는 것! 일반 시야(false), 적록색약(true).',cap:'① 두 번 호출',code:'char[][] 그림 = 입력으로 읽기;\nSystem.out.println(구역수세기(그림, false) + " " + 구역수세기(그림, true));'},
  {who:'teach',nm:'🧑‍🏫 알고 선생님',say:'함수 안에서 <b>색약이면 G를 R로</b> 바꾼 그림을 만들고, 안 센 칸마다 같은 색 구역을 BFS로 묶어 개수를 셉니다.',why:'왜 <b>같은 함수를 두 번</b>? 일반 시야와 색약 시야는 "붙은 같은 색 세기"라는 <b>규칙이 똑같고</b>, 딱 하나 —색약은 R과 G가 같다— 만 달라요. 그래서 새 알고리즘을 짤 필요 없이, <b>그림만 살짝 바꿔</b> 같은 함수를 재사용하는 게 가장 간결해요. 왜 <b>G를 R로</b>? 둘을 하나로 합쳐야 인접한 R·G가 "같은 색"이 되어 한 구역으로 묶이거든요.',cap:'② 구역수세기 함수 (색 변환 + BFS)',code:'static int 구역수세기(char[][] 원본그림, boolean 색약모드) {\n    char[][] 볼그림 = new char[그림크기][그림크기];\n    for (int i=0; i&lt;그림크기; i++)\n      for (int j=0; j&lt;그림크기; j++)\n        볼그림[i][j] = (색약모드 &amp;&amp; 원본그림[i][j]==\'G\') ? \'R\' : 원본그림[i][j];\n    boolean[][] 방문여부 = new boolean[그림크기][그림크기];\n    int 구역수 = 0;\n    for (int i=0; i&lt;그림크기; i++)\n      for (int j=0; j&lt;그림크기; j++)\n        if (!방문여부[i][j]) {\n            구역수++;\n            Queue&lt;int[]&gt; 탐색큐 = new LinkedList&lt;&gt;();\n            탐색큐.add(new int[]{i,j}); 방문여부[i][j]=true;\n            while (!탐색큐.isEmpty()) {\n                int[] 현재칸 = 탐색큐.poll();\n                for (int 방향=0; 방향&lt;4; 방향++) {\n                    int 다음행=현재칸[0]+행이동[방향], 다음열=현재칸[1]+열이동[방향];\n                    if (다음행&gt;=0 &amp;&amp; 다음행&lt;그림크기 &amp;&amp; 다음열&gt;=0 &amp;&amp; 다음열&lt;그림크기\n                        &amp;&amp; !방문여부[다음행][다음열]\n                        &amp;&amp; 볼그림[다음행][다음열]==볼그림[현재칸[0]][현재칸[1]]) {\n                        방문여부[다음행][다음열]=true;\n                        탐색큐.add(new int[]{다음행,다음열});\n                    }\n                }\n            }\n        }\n    return 구역수;\n}'}
 ]},
