  explain:'큐=FIFO. addLast/pollFirst 조합이 헷갈리기 쉽습니다(LinkedList보다 ArrayDeque가 빠름).'},
 {q:'front/back 명령(맨 앞·맨 뒤 "확인")을 작성해 보세요. pop과 어떻게 다를까요?',
  hint:'확인은 peek(빼지 않음), pop은 poll(빼냄).',
  code:'sb.append(q.isEmpty() ? -1 : q.peekFirst()).append(\'\\n\');  // front\nsb.append(q.isEmpty() ? -1 : q.peekLast()).append(\'\\n\');   // back',
  explain:'peek은 값을 확인만 하고 그대로 두고, poll은 꺼내서 제거합니다. 이 둘을 헷갈리면 틀립니다.'}
],
1260:[
 {q:'인접 리스트를 쓰는 재귀 DFS를 작성해 보세요.',
  hint:'방문 표시 → 처리 → 미방문 인접 정점 재귀.',
  code:'static void dfs(int node) {\n    visited[node] = true;\n    sb.append(node).append(\' \');\n    for (int next : graph[node])\n        if (!visited[next]) dfs(next);\n}',
  explain:'방문 표시를 먼저 하지 않으면 무한 재귀에 빠집니다.'},
 {q:'큐를 쓰는 반복 BFS를 작성해 보세요. (DFS와 가장 헷갈리는 부분)',
  hint:'시작 노드를 큐에 넣고 방문 표시. 꺼내며 인접 미방문을 큐에 넣을 때 바로 방문 표시.',
  code:'Queue<Integer> q = new LinkedList<>();\nq.add(start); visited[start] = true;\nwhile (!q.isEmpty()) {\n    int cur = q.poll();\n    sb.append(cur).append(\' \');\n    for (int next : graph[cur])\n        if (!visited[next]) { visited[next] = true; q.add(next); }\n}',
  explain:'BFS는 "큐에 넣는 순간" 방문 표시해야 합니다. 꺼낼 때 표시하면 같은 노드가 여러 번 들어가는 버그가 나요(가장 흔한 실수!).'}
],
2667:[
 {q:'상하좌우 4방향을 dx/dy 배열로 순회하는 패턴을 작성해 보세요.',
  hint:'dx={1,-1,0,0}, dy={0,0,1,-1}.',
  code:'int[] dx = {1, -1, 0, 0};\nint[] dy = {0, 0, 1, -1};\nfor (int d = 0; d < 4; d++) {\n    int nx = x + dx[d], ny = y + dy[d];\n    // nx, ny 사용\n}',
  explain:'방향 배열은 격자 BFS/DFS의 필수 패턴입니다. if를 4번 쓰면 길고 실수가 늘어요.'},
 {q:'(x,y)에서 연결된 집 수를 세는 DFS를 작성해 보세요. (경계·방문 체크 포함)',
  hint:'범위 밖/집 아님/방문이면 0. 아니면 1 + 네 방향 합.',
  code:'static int dfs(int x, int y) {\n    if (x<0 || y<0 || x>=n || y>=n || map[x][y]!=1 || visited[x][y]) return 0;\n    visited[x][y] = true;\n    return 1 + dfs(x+1,y) + dfs(x-1,y) + dfs(x,y+1) + dfs(x,y-1);\n}',
  explain:'경계·방문 검사를 함수 맨 앞에 모으면 깔끔하고 실수가 줄어듭니다.'}
],
1697:[
 {q:'현재 위치 cur를 3방향(−1, +1, ×2)으로 BFS 확장하는 코드를 작성해 보세요.',
  hint:'범위(0~100000)와 미방문 확인 후 거리+1.',
  code:'for (int nx : new int[]{cur-1, cur+1, cur*2}) {\n    if (nx >= 0 && nx <= 100000 && !visited[nx]) {\n        visited[nx] = true;\n        dist[nx] = dist[cur] + 1;\n        queue.add(nx);\n    }\n}',
  explain:'모든 이동 비용이 1이라 BFS로 처음 도달한 dist가 최소 시간입니다.'},
 {q:'BFS에서 방문 표시는 "언제" 해야 할까요? 그 부분을 코드로 보여 주세요.',
  hint:'큐에서 꺼낼 때가 아니라, 큐에 "넣을 때".',
  code:'if (!visited[nx]) {\n    visited[nx] = true;   // 큐에 넣는 순간 표시!\n    queue.add(nx);\n}',
  explain:'꺼낼 때 표시하면 같은 칸이 큐에 여러 번 들어가 시간 초과·오답이 납니다. 넣을 때 표시가 정답.'}
],
11279:[
 {q:'최대 힙으로 동작하는 PriorityQueue 선언을 작성해 보세요.',
  hint:'기본은 최소 힙. 역순 정렬자.',
  code:'PriorityQueue<Integer> pq = new PriorityQueue<>(Collections.reverseOrder());',
  explain:'reverseOrder()를 넣으면 최댓값이 맨 위로 옵니다.'},
 {q:'입력 x 처리 분기(0이면 빼서 출력, 아니면 넣기)를 작성해 보세요.',
  hint:'x==0이면 isEmpty?0:poll, 아니면 add.',
  code:'if (x == 0)\n    sb.append(pq.isEmpty() ? 0 : pq.poll()).append(\'\\n\');\nelse\n    pq.add(x);',
  explain:'힙이 비었을 때 0을 출력하는 처리를 빠뜨리지 않는 것이 포인트입니다.'}
],
11286:[
 {q:'절댓값 힙을 만드는 PriorityQueue 선언(비교자 포함)을 작성해 보세요.',
  hint:'절댓값이 다르면 절댓값 오름차순, 같으면 값 오름차순.',
  code:'PriorityQueue<Integer> pq = new PriorityQueue<>((a, b) -> {\n    int absA = Math.abs(a), absB = Math.abs(b);\n    return absA != absB ? absA - absB : a - b;\n});',
  explain:'절댓값이 같을 때 a-b로 비교하면 음수가 먼저 나옵니다.'},
 {q:'입력 x 처리 분기(0이면 빼서 출력, 아니면 넣기)를 작성해 보세요.',
  hint:'x==0이면 isEmpty?0:poll.',
  code:'if (x == 0)\n    sb.append(pq.isEmpty() ? 0 : pq.poll()).append(\'\\n\');\nelse\n    pq.add(x);',
  explain:'비교자만 다를 뿐, 빼기/넣기 분기 구조는 최소·최대 힙과 똑같습니다.'}
],
1874:[
 {q:'1부터 target까지 스택에 push하며 "+"를 기록하는 코드를 작성해 보세요.',
  hint:'cur가 target 이하인 동안 push하고 cur++.',
  code:'while (cur <= target) {\n    stack.push(cur++);\n    sb.append("+\\n");\n}',
  explain:'다음에 넣을 수 cur를 증가시키며 target까지 채웁니다.'},
 {q:'스택으로 수열을 만들 수 있는지 판정하고 pop/NO를 처리하는 코드를 작성해 보세요.',
  hint:'맨 위가 target이면 pop("-"), 아니면 불가능.',
  code:'if (stack.peek() == target) {\n    stack.pop();\n    sb.append("-\\n");\n} else {\n    ok = false;   // 만들 수 없음 → NO\n    break;\n}',
  explain:'push로 target까지 올린 뒤 맨 위가 target이 아니면(이미 더 큰 값이 위에 있음) 절대 만들 수 없습니다.'}
],
11050:[{q:'C(N,K)를 분자·분모를 K번 곱하는 반복문으로 구하는 코드를 작성해 보세요.',hint:'분자는 n,n-1,... K개, 분모는 1,2,...,K(=K!).',code:'long num = 1, den = 1;\nfor (int i = 0; i < k; i++) {\n    num *= (n - i);   // 분자\n    den *= (i + 1);   // 분모 = k!\n}\nlong result = num / den;',explain:'팩토리얼을 따로 구하지 않고 K번만 곱해 분자·분모를 만든 뒤 나눕니다.'}],
6064:[{q:'x에서 M씩 더하며 (k-y)%N==0 인 해 k를 찾는 반복문을 작성해 보세요. (lcm 초과 시 -1)',hint:'후보 k는 x, x+M, x+2M ... lcm 까지.',code:'long ans = -1;\nfor (long k = x; k <= lcm; k += M) {\n    if ((k - y) % N == 0) { ans = k; break; }\n}',explain:'x조건(M주기)을 만족하는 값 중 y조건(N주기)도 맞는 첫 k가 답. lcm까지 없으면 -1.'}],
10866:[{q:'N개의 명령을 한 줄씩 읽어 반복 처리하는 while 루프 골격을 작성해 보세요.',hint:'n번 반복하며 명령어 토큰을 읽어 분기.',code:'while (n-- > 0) {\n    StringTokenizer st = new StringTokenizer(br.readLine());\n    String cmd = st.nextToken();\n    // cmd에 따라 push_front / pop_back 등 처리\n}',explain:'명령 처리 문제의 공통 골격입니다. n번 돌며 각 줄의 명령을 분기합니다.'}],
11866:[{q:'큐가 빌 때까지 앞 K-1명을 뒤로 보내고 K번째를 제거하는 반복문을 작성해 보세요.',hint:'q.add(q.poll())로 회전, 그다음 q.poll()로 제거.',code:'while (!q.isEmpty()) {\n    for (int i = 0; i < k - 1; i++) q.add(q.poll()); // 앞 K-1명 회전\n    sb.append(q.poll());                              // K번째 제거\n    if (!q.isEmpty()) sb.append(", ");\n}',explain:'큐의 회전(앞→뒤)으로 원형을 흉내 내고, K번째를 꺼내 기록합니다.'}],
1966:[{q:'맨 앞보다 더 중요한 문서가 남아 있으면 뒤로 보내고 아니면 인쇄하는 반복문을 작성해 보세요.',hint:'최대 우선순위는 maxPQ.peek()로 비교.',code:'int cnt = 0;\nwhile (!q.isEmpty()) {\n    int[] cur = q.poll();\n    if (cur[0] == maxPQ.peek()) {     // 가장 중요한 문서\n        maxPQ.poll(); cnt++;\n        if (cur[1] == m) { answer = cnt; break; }\n    } else {\n        q.add(cur);                   // 뒤로 보냄\n    }\n}',explain:'현재 문서가 최고 우선순위면 인쇄(cnt++), 아니면 큐 뒤로 보냅니다.'}],
1620:[{q:'N개의 이름을 두 HashMap(이름→번호, 번호→이름)에 저장하는 반복문을 작성해 보세요.',hint:'1번부터 순서대로 양방향 저장.',code:'for (int i = 1; i <= n; i++) {\n    String name = br.readLine().trim();\n    nameToId.put(name, i);\n    idToName.put(i, name);\n}',explain:'양방향 조회를 위해 두 맵에 동시에 넣어 두는 것이 핵심입니다.'}],
1764:[{q:'둘째 명단을 순회하며 HashSet에 있는 이름만 결과에 모으는 반복문을 작성해 보세요.',hint:'heard.contains(name)이면 교집합.',code:'for (int i = 0; i < m; i++) {\n    String name = br.readLine().trim();\n    if (heard.contains(name)) result.add(name);\n}',explain:'첫 명단을 Set에 넣어두면 둘째 명단을 한 번만 훑어 교집합을 O(M)에 구합니다.'}],
17219:[{q:'M개의 질문 사이트를 순회하며 Map에서 비밀번호를 찾아 출력하는 반복문을 작성해 보세요.',hint:'map.get(사이트).',code:'for (int i = 0; i < m; i++)\n    sb.append(map.get(br.readLine().trim())).append("\\n");',explain:'사이트→비밀번호 맵을 미리 만들어 두면 각 질문을 O(1)에 답합니다.'}],
2798:[{q:'카드 N장 중 3장을 고르는 3중 반복문으로 M 이하 최대 합을 구하는 코드를 작성해 보세요.',hint:'i<j<k 로 중복 없이 조합.',code:'for (int i = 0; i < n; i++)\n  for (int j = i+1; j < n; j++)\n    for (int k = j+1; k < n; k++) {\n        int s = c[i] + c[j] + c[k];\n        if (s <= m) ans = Math.max(ans, s);\n    }',explain:'모든 3장 조합을 완전탐색하며 M 이하 중 최댓값을 갱신합니다.'}],
2231:[{q:'1부터 N-1까지 각 m의 분해합(m + 자릿수 합)을 구해 N과 같은지 확인하는 반복문을 작성해 보세요.',hint:'안쪽 while로 자릿수 합.',code:'for (int m = 1; m < n; m++) {\n    int sum = m, tmp = m;\n    while (tmp > 0) { sum += tmp % 10; tmp /= 10; }\n    if (sum == n) { System.out.println(m); return; }\n}\nSystem.out.println(0);',explain:'가장 작은 생성자를 찾으려 1부터 올라가며 처음 맞는 m을 출력합니다.'}],
1018:[{q:'체스판 다시 칠하기를 "끝까지" 구현해 보세요. (스캔 루프 + countRepaint 함수 전체)',hint:'각 8×8 위치에서 W시작 기준 다른 칸 수 cnt를 세고, B시작은 64-cnt. 둘 중 작은 값.',code:'// ① 모든 8×8 시작 위치를 훑으며 최솟값 갱신\nint ans = Integer.MAX_VALUE;\nfor (int r = 0; r <= n - 8; r++)\n  for (int c = 0; c <= m - 8; c++) {\n      int cnt = countRepaint(r, c);\n      ans = Math.min(ans, Math.min(cnt, 64 - cnt));   // B시작 = 64-cnt\n  }\n\n// ② (r,c)에서 시작하는 8×8이 \'W시작 체스판\'과 다른 칸 수\nstatic int countRepaint(int r, int c) {\n    int cnt = 0;\n    for (int i = 0; i < 8; i++)\n        for (int j = 0; j < 8; j++) {\n            char expected = ((i + j) % 2 == 0) ? \'W\' : \'B\';\n            if (board[r+i][c+j] != expected) cnt++;\n        }\n    return cnt;\n}',explain:'바깥 루프가 자를 위치를 고르고, countRepaint가 그 8×8을 정답 체스판과 비교합니다. W시작 비용이 cnt면 B시작 비용은 64-cnt예요.'}],
2606:[{q:'1번에서 BFS로 감염되는 컴퓨터 수를 세는 반복문을 작성해 보세요.',hint:'큐에 넣을 때 방문 표시 + count++.',code:'int count = 0;\nQueue<Integer> q = new LinkedList<>();\nq.add(1); visited[1] = true;\nwhile (!q.isEmpty()) {\n    int cur = q.poll();\n    for (int next : graph[cur])\n        if (!visited[next]) { visited[next] = true; count++; q.add(next); }\n}',explain:'1번에서 도달 가능한 노드 수를 BFS로 셉니다(1번 자신 제외).'}],
1012:[{q:'배추 무리(지렁이) 수 세기를 "끝까지" 구현해 보세요. (스캔 루프 + bfs 함수 전체)',hint:'배추(1)이고 미방문이면 bfs로 무리 전체를 방문 표시하고 worms++.',code:'// ① 메인: 격자를 훑으며 새 무리마다 +1\nint worms = 0;\nfor (int i = 0; i < n; i++)\n  for (int j = 0; j < m; j++)\n    if (field[i][j] == 1 && !visited[i][j]) { bfs(i, j); worms++; }\n\n// ② 한 무리를 통째로 묶는 격자 BFS\nstatic void bfs(int sx, int sy) {\n    int[] dx = {1,-1,0,0}, dy = {0,0,1,-1};\n    Queue<int[]> q = new LinkedList<>();\n    q.add(new int[]{sx, sy}); visited[sx][sy] = true;\n    while (!q.isEmpty()) {\n        int[] c = q.poll();\n        for (int d = 0; d < 4; d++) {\n            int nx = c[0]+dx[d], ny = c[1]+dy[d];\n            if (nx>=0 && ny>=0 && nx<n && ny<m && field[nx][ny]==1 && !visited[nx][ny]) {\n                visited[nx][ny] = true;\n                q.add(new int[]{nx, ny});\n            }\n        }\n    }\n}',explain:'바깥 루프가 무리의 "시작점"을 찾고, bfs가 그 무리를 통째로 방문 표시합니다. 둘이 합쳐져야 완성이에요.'}],
10026:[{q:'구역 수 세기를 "끝까지" 구현해 보세요. (스캔 루프 + dfs 함수 전체)',hint:'미방문 칸마다 dfs로 같은 색 구역을 방문 표시하고 regions++.',code:'// ① 메인: 격자를 훑으며 새 구역마다 +1\nint regions = 0;\nfor (int i = 0; i < n; i++)\n  for (int j = 0; j < n; j++)\n    if (!visited[i][j]) { dfs(i, j, grid[i][j]); regions++; }\n\n// ② 같은 색 구역을 통째로 묶는 DFS\nstatic void dfs(int x, int y, char color) {\n    visited[x][y] = true;\n    int[] dx = {1,-1,0,0}, dy = {0,0,1,-1};\n    for (int d = 0; d < 4; d++) {\n        int nx = x+dx[d], ny = y+dy[d];\n        if (nx>=0 && ny>=0 && nx<n && ny<n && !visited[nx][ny] && grid[nx][ny]==color)\n            dfs(nx, ny, color);\n    }\n}',explain:'바깥 루프가 구역 시작을 세고, dfs가 같은 색 구역을 통째로 묶습니다. 적록색약 모드는 R을 G로 바꾼 grid로 같은 루프를 한 번 더 돌려요.'}],
11724:[{q:'연결요소 개수 세기를 "끝까지" 구현해 보세요. (스캔 루프 + bfs 함수 전체)',hint:'미방문 정점마다 bfs를 돌리고 +1. bfs는 큐로 도달 가능한 정점을 모두 방문 표시.',code:'// ① 메인: 모든 정점을 훑으며 새 그룹마다 +1\nint components = 0;\nfor (int v = 1; v <= n; v++)\n    if (!visited[v]) { bfs(v); components++; }\n\n// ② 연결요소 하나를 통째로 묶는 BFS\nstatic void bfs(int start) {\n    Queue<Integer> q = new LinkedList<>();\n    q.add(start); visited[start] = true;\n    while (!q.isEmpty()) {\n        int cur = q.poll();\n        for (int next : graph[cur])\n            if (!visited[next]) { visited[next] = true; q.add(next); }\n    }\n}',explain:'바깥 루프가 "새 그룹 시작"을 세고, bfs 한 번이 그 그룹 전체를 방문 표시합니다. 둘이 합쳐져야 완성이에요.'}],
1927:[{q:'N개의 입력을 반복하며 0이면 최솟값을 빼서 출력, 아니면 넣는 반복문을 작성해 보세요.',hint:'x==0이면 isEmpty?0:poll.',code:'while (n-- > 0) {\n    int x = Integer.parseInt(br.readLine().trim());\n    if (x == 0) sb.append(pq.isEmpty() ? 0 : pq.poll()).append("\\n");\n    else pq.add(x);\n}',explain:'힙은 자동 정렬되므로, 0일 때 poll만 하면 최솟값이 나옵니다.'}],
7662:[{q:'k개의 명령(I n / D 1 / D -1)을 반복 처리하는 루프 골격을 작성해 보세요.',hint:'op가 I면 삽입, D면 n부호로 최대/최소.',code:'while (k-- > 0) {\n    StringTokenizer st = new StringTokenizer(br.readLine());\n    String op = st.nextToken();\n    int n = Integer.parseInt(st.nextToken());\n    if (op.equals("I")) insert(n);\n    else if (n == 1) deleteMax();\n    else deleteMin();\n}',explain:'명령을 반복하며 삽입/최대삭제/최소삭제를 분기 처리합니다.'}],
2108:[{q:'N개의 수를 순회하며 합과 등장 횟수(count 배열)를 동시에 구하는 반복문을 작성해 보세요.',hint:'음수 인덱스 방지로 +4000 오프셋.',code:'int sum = 0;\nfor (int i = 0; i < n; i++) {\n    sum += a[i];\n    count[a[i] + 4000]++;   // 최빈값용\n}',explain:'한 번의 루프로 평균(합)과 최빈값(횟수)을 함께 준비합니다. 음수는 오프셋으로 처리.'}],
1074:[{q:'2^N×2^N에서 (r,c)의 방문 순서를 재귀로 구하는 함수를 작성해 보세요.',hint:'사분면 번호 × (반칸 넓이) + 재귀.',code:'static int solve(int n, int r, int c) {\n    if (n == 0) return 0;\n    int half = 1 << (n - 1);\n    int quad = (r < half ? 0 : 2) + (c < half ? 0 : 1);\n    return quad * half * half + solve(n - 1, r % half, c % half);\n}',explain:'직접 다 세면 너무 크니, 사분면을 따져 앞 칸 수를 더하며 재귀로 좁힙니다.'}],
14500:[{q:'테트로미노를 "끝까지" 구현해 보세요. (스캔 루프 + DFS(깊이4) + ㅗ모양 별도처리)',hint:'대부분 모양은 길이 4 DFS로 만들어지지만, ㅗ(T)자만 DFS로 안 돼서 따로 처리합니다.',code:'// ① 모든 칸을 시작점으로 최대 합 갱신\nint ans = 0;\nfor (int i = 0; i < n; i++)\n  for (int j = 0; j < m; j++) {\n      visited[i][j] = true;\n      dfs(i, j, 1, board[i][j]);   // 길이 4까지 DFS\n      visited[i][j] = false;\n      checkT(i, j);                // ㅗ(T) 모양 별도\n  }\n\n// ② 한 칸에서 4칸까지 이어 붙이며 최댓값\nstatic void dfs(int x, int y, int depth, int sum) {\n    if (depth == 4) { ans = Math.max(ans, sum); return; }\n    int[] dx={1,-1,0,0}, dy={0,0,1,-1};\n    for (int d = 0; d < 4; d++) {\n        int nx=x+dx[d], ny=y+dy[d];\n        if (nx>=0 && ny>=0 && nx<n && ny<m && !visited[nx][ny]) {\n            visited[nx][ny] = true;\n            dfs(nx, ny, depth+1, sum + board[nx][ny]);\n            visited[nx][ny] = false;\n        }\n    }\n}\n\n// ③ DFS로 못 만드는 ㅗ/ㅏ/ㅜ/ㅓ(T자) 모양: 가운데 + 4방향 중 3개\nstatic void checkT(int x, int y) {\n    int[] dx={1,-1,0,0}, dy={0,0,1,-1};\n    for (int skip = 0; skip < 4; skip++) {\n        int sum = board[x][y], cnt = 0;\n        for (int k = 0; k < 4; k++) {\n            if (k == skip) continue;\n            int nx=x+dx[k], ny=y+dy[k];\n            if (nx>=0 && ny>=0 && nx<n && ny<m) { sum += board[nx][ny]; cnt++; }\n        }\n        if (cnt == 3) ans = Math.max(ans, sum);\n    }\n}',explain:'테트로미노 19가지 중 ㅗ(T)자 빼고는 모두 "한 칸에서 인접 칸을 4개까지 잇는 DFS"로 만들어집니다. T자만 가운데 칸 기준 3방향으로 따로 처리하면 완성이에요.'}],
5430:[{q:'명령 문자열 p를 순회하며 R(방향 토글)·D(앞 제거)를 처리하는 반복문을 작성해 보세요.',hint:'R은 뒤집지 말고 방향만, D는 현재 방향의 앞에서 제거.',code:'boolean reversed = false;\nfor (char ch : p.toCharArray()) {\n    if (ch == \'R\') reversed = !reversed;\n    else {  // D\n        if (dq.isEmpty()) { error = true; break; }\n        if (reversed) dq.pollLast();\n        else dq.pollFirst();\n    }\n}',explain:'R마다 실제 뒤집으면 느려서 방향 플래그만 토글하고, D는 그 방향의 앞에서 제거합니다.'}],
16928:[{q:'현재 칸에서 주사위 1~6칸을 BFS로 확장하는 반복문을 작성해 보세요. (사다리/뱀은 board[]로 점프)',hint:'next>100이면 무시, board[next]!=0이면 점프.',code:'for (int dice = 1; dice <= 6; dice++) {\n    int next = cur + dice;\n    if (next > 100) continue;\n    if (board[next] != 0) next = board[next];   // 사다리·뱀\n    if (!visited[next]) {\n        visited[next] = true;\n        dist[next] = dist[cur] + 1;\n        queue.add(next);\n    }\n}',explain:'한 칸을 6갈래로 확장하되, 도착 칸에 사다리·뱀이 있으면 그 끝으로 이동합니다.'}],
7576:[{q:'여러 익은 토마토에서 동시에 시작하는 BFS로 하루씩 익히는 반복문을 작성해 보세요.',hint:'안 익은 칸(0)에 날짜를 +1로 기록.',code:'while (!queue.isEmpty()) {\n    int[] cur = queue.poll();\n    for (int d = 0; d < 4; d++) {\n        int nx = cur[0]+dx[d], ny = cur[1]+dy[d];\n        if (range(nx, ny) && box[nx][ny] == 0) {\n            box[nx][ny] = box[cur[0]][cur[1]] + 1;  // 날짜 누적\n            queue.add(new int[]{nx, ny});\n        }\n    }\n}',explain:'처음 익은 토마토들을 모두 큐에 넣고 동시에 퍼뜨립니다. 칸 값이 곧 익은 날짜.'}],
7569:[{q:'3차원 토마토를 6방향으로 퍼뜨리는 BFS 확장 반복문을 작성해 보세요.',hint:'dx/dy/dz 6방향 배열.',code:'int[] dx={1,-1,0,0,0,0}, dy={0,0,1,-1,0,0}, dz={0,0,0,0,1,-1};\nfor (int d = 0; d < 6; d++) {\n    int nx=x+dx[d], ny=y+dy[d], nz=z+dz[d];\n    if (range(nx,ny,nz) && box[nz][nx][ny] == 0) {\n        box[nz][nx][ny] = box[z][x][y] + 1;\n        queue.add(new int[]{nz, nx, ny});\n    }\n}',explain:'2D의 4방향에 위·아래(z±1)를 더해 6방향으로 확장하는 것만 다릅니다.'}]
};
function renderImpl(im, idx) {
  let h = `<div class="quiz-q impl"><div class="quiz-qnum">✍️ 구현 ${idx + 1}</div><div class="quiz-text">${escHtml(im.q)}</div>`;
  if (im.hint) h += `<button class="qa-btn" data-act="hint">💡 힌트</button>`;
  h += `<button class="qa-btn" data-act="reveal">✅ 모범 답안 보기</button>`;
  if (im.hint) h += `<div class="quiz-hint">${escHtml(im.hint)}</div>`;
  h += `<div class="quiz-answer"><pre><code class="language-java">${escHtml(im.code)}</code></pre>`;
  if (im.explain) h += `<div class="quiz-explain show" style="margin-top:11px"><b>💡 해설</b> ${escHtml(im.explain)}</div>`;
  return h + '</div></div>';
}

function renderQuiz(id) {
  const qs = quizzes[id], im = IMPL[id], cq = CODEQ[id], bq = BLOCKQ[id];
  if (!qs && !im && !cq && !bq) return '<div class="quiz-empty">이 문제의 퀴즈는 곧 추가될 예정이에요 🙌</div>';
  let h = '<div class="quiz-intro">💡 객관식·코드(빈칸)는 보기를 눌러 채점하고, ✍️ 구현 문제는 직접 떠올린 뒤 모범 답안과 비교해 보세요!</div>';
  (qs || []).forEach((quiz, qi) => {
    h += `<div class="quiz-q"><div class="quiz-qnum">Q${qi + 1}</div><div class="quiz-text">${escHtml(quiz.q)}</div><div class="quiz-opts">`;
    quiz.options.forEach((o, oi) => {
      h += `<button class="quiz-opt" data-oi="${oi}" data-correct="${quiz.answer}">${escHtml(o)}</button>`;
    });
    h += `</div><div class="quiz-explain"><b>💡 해설</b> ${escHtml(quiz.explain)}</div></div>`;
  });
  if (bq) bq.forEach((q, i) => h += renderBlockQ(q, i));
  if (cq) cq.forEach((q, i) => h += renderCodeMCQ(q, i));
  if (im) (Array.isArray(im) ? im : [im]).forEach((q, i) => h += renderImpl(q, i));
  return h;
}
// 코드 주석을 종류별로 색 구분 (역할 / 예시입력 / 출력 / 일반)
function styleComments(el) {
  el.querySelectorAll('.hljs-comment').forEach(c => {
    const t = c.textContent;
    if (t.includes('✅') || /출력\s*[:：(]/.test(t))            c.classList.add('cm-out');
    else if (t.includes('▼') || t.includes('예시') || t.includes('예)')) c.classList.add('cm-eg');
    else if (t.includes('[메서드') || t.includes('역할]'))  c.classList.add('cm-role');
    else c.classList.add('cm-note');
  });
}
// 인라인 강조: **굵게**, "따옴표" 자동 굵게
function inlineFmt(s) {
  let t = escHtml(s);
  t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/"([^"]+)"/g, '<strong>$1</strong>');
  return t;
}
// 한국어 문장 단위로 분리 (마침표+공백 기준) — lookbehind 미사용(iOS 사파리 호환)
function splitSentences(s) {
  const out = []; let buf = '';
  for (let i = 0; i < s.length; i++) {
    buf += s[i];
    if (s[i] === '.' && (i + 1 >= s.length || s[i + 1] === ' ')) { out.push(buf.trim()); buf = ''; }
  }
  if (buf.trim()) out.push(buf.trim());
  return out.filter(Boolean);
}
// 설명을 [핵심 한 줄(lead) + 규칙 불릿 + 예시 박스]로 구조화
function renderDesc(d) {
  const lines = d.split('\n').map(l => l.trim()).filter(Boolean);
  const bullets = [], prose = [];
  let sawBullet = false;
  for (const l of lines) {
    if (/^[·\-]\s*/.test(l)) { bullets.push(l.replace(/^[·\-]\s*/, '')); sawBullet = true; }
    else prose.push(l);
  }
  let leads = [], items = [];
  if (sawBullet) { leads = prose; items = bullets; }          // 명령형: 프로세 전부 lead + ·항목 불릿
  else {                                                       // 서술형: 첫 문장 lead + 나머지 문장 불릿
    const sents = splitSentences(prose.join(' '));
    leads = sents.slice(0, 1); items = sents.slice(1);
  }
  // 블록 순서대로 구성 (예시 문장은 별도 박스)
  let html = '';
  for (const s of leads) html += `<div class="pd-lead">${inlineFmt(s)}</div>`;
  let listOpen = false;
  const openList  = () => { if (!listOpen) { html += '<ul class="pd-list">'; listOpen = true; } };
  const closeList = () => { if (listOpen)  { html += '</ul>'; listOpen = false; } };
  for (const b of items) {
    if (/^예\)|^예를 들어|^예:/.test(b)) { closeList(); html += `<div class="pd-eg">${inlineFmt(b)}</div>`; }
    else { openList(); html += `<li>${inlineFmt(b)}</li>`; }
  }
  closeList();
  return html;
}
// 문제 텍스트를 [설명 / 입력 / 출력] 블록으로 구조화
function renderProblem(text) {
  const lines = text.split('\n');
  const desc = [];
  let input = null, output = null, mode = 'desc';
  for (const line of lines) {
    const t = line.trim();
    if (/^입력\s*[:：]/.test(t))      { mode = 'in';  input  = t.replace(/^입력\s*[:：]\s*/, ''); continue; }
    if (/^출력\s*[:：]/.test(t))      { mode = 'out'; output = t.replace(/^출력\s*[:：]\s*/, ''); continue; }
    if (mode === 'desc') desc.push(line);
    else if (mode === 'in')  input  += '\n' + line;
    else                     output += '\n' + line;
  }
  let html = '';
  const d = desc.join('\n').trim();
  if (d) html += `<div class="problem-desc">${renderDesc(d)}</div>`;
  if (input != null || output != null) {
    html += '<div class="io-grid">';
    if (input  != null) html += `<div class="io-box"><span class="io-label in">입력</span><div class="io-text">${formatIO(input)}</div></div>`;
    if (output != null) html += `<div class="io-box"><span class="io-label out">출력</span><div class="io-text">${formatIO(output)}</div></div>`;
    html += '</div>';
  }
  return html || `<div class="problem-desc">${escHtml(text)}</div>`;
}

async function openModal(id) {
  const p = problems.find(x => x.id === id);
  if (!p) return;
  document.getElementById('modalTitle').textContent = `#${p.id} ${p.title}`;
  document.getElementById('modalBadge').textContent = p.diff;
  document.getElementById('modalBadge').style.background = diffColor(p.diff);
  document.getElementById('modalType').textContent = p.type;
  document.getElementById('modalType').style.color = TYPE_COLOR[p.type];
  document.getElementById('modalProblem').innerHTML = renderProblem(p.problem);
  document.getElementById('skillBox').innerHTML = renderCap(p.type);
  document.getElementById('modalExplain').textContent = p.explain;
  const chartDiv = document.getElementById('mermaidChart');
  chartDiv.innerHTML = '<p style="color:#8b949e;text-align:center">순서도 생성 중...</p>';
  const bbox = document.getElementById('beginnerBox');
  bbox.innerHTML = renderBeginner(beginner[p.id]);
  bbox.style.display = beginner[p.id] ? 'block' : 'none';
  const tbox = document.getElementById('traceBox');
  const traceHtml = renderTraceBox(traces[p.id]);
  tbox.innerHTML = traceHtml;
  tbox.style.display = traceHtml ? 'block' : 'none';
  document.getElementById('quizTab').innerHTML = renderQuiz(p.id);
  document.querySelectorAll('#quizTab pre code').forEach(c => { if (window.hljs) { hljs.highlightElement(c); styleComments(c); } c.dataset.hl = '1'; });
  const codeEl = document.getElementById('modalCode');
  codeEl.textContent = p.code;
  codeEl.removeAttribute('data-highlighted');
  if (window.hljs) { hljs.highlightElement(codeEl); styleComments(codeEl); }
  document.getElementById('overlay').classList.add('show');
  document.getElementById('explainTab').classList.remove('hidden');
  document.getElementById('codeTab').classList.add('hidden');
  document.getElementById('quizTab').classList.add('hidden');
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector('.tab[data-tab="explain"]').classList.add('active');
  if (!window.mermaid) {
    chartDiv.innerHTML = '<p style="color:#8b949e;text-align:center;font-size:.85rem">📊 순서도는 인터넷 연결 시 표시됩니다<br>(나머지 내용은 그대로 보실 수 있어요)</p>';
  } else {
    try {
      const uid = 'mermaid-' + (++mermaidCounter);
      const { svg } = await mermaid.render(uid, p.flow);
      chartDiv.innerHTML = svg;
    } catch(e) {
      chartDiv.innerHTML = '<p style="color:#8b949e;text-align:center;font-size:.85rem">순서도를 표시할 수 없습니다</p>';
    }
  }
}

// ─────────── Modal Controls ───────────
document.getElementById('closeBtn').addEventListener('click', () => {
  document.getElementById('overlay').classList.remove('show');
});
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay'))
    document.getElementById('overlay').classList.remove('show');
});
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const target = tab.dataset.tab;
    document.getElementById('explainTab').classList.toggle('hidden', target !== 'explain');
    document.getElementById('codeTab').classList.toggle('hidden', target !== 'code');
    document.getElementById('quizTab').classList.toggle('hidden', target !== 'quiz');
  });
});
// 퀴즈 정답 채점 (이벤트 위임 — 한 번만 등록)
document.getElementById('quizTab').addEventListener('click', e => {
  const btn = e.target.closest('.qa-btn');
  if (btn) {
    const card = btn.closest('.quiz-q');
    if (btn.dataset.act === 'hint') {
      card.querySelector('.quiz-hint').classList.toggle('show');
    } else {
      const ans = card.querySelector('.quiz-answer');
      ans.classList.add('show');
      const code = ans.querySelector('code');
      if (code && !code.dataset.hl && window.hljs) { hljs.highlightElement(code); styleComments(code); code.dataset.hl = '1'; }
      btn.style.display = 'none';
    }
    return;
  }
  const opt = e.target.closest('.quiz-opt');
  if (!opt) return;
  const card = opt.closest('.quiz-q');
  if (card.classList.contains('answered')) return;
  card.classList.add('answered');
  const correct = +opt.dataset.correct;
  const picked = +opt.dataset.oi;
  card.querySelectorAll('.quiz-opt').forEach((o, i) => {
    o.classList.add('disabled');
    if (i === correct) { o.classList.add('correct'); o.innerHTML += '<span class="mk">✓</span>'; }
  });
  if (picked !== correct) opt.innerHTML += '<span class="mk">✗</span>', opt.classList.add('wrong');
  const ex = card.querySelector('.quiz-explain');
  if (ex) ex.classList.add('show');
});
document.getElementById('copyBtn').addEventListener('click', () => {
  const code = document.getElementById('modalCode').textContent;
  navigator.clipboard.writeText(code).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✅ 복사됨!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 코드 복사'; btn.classList.remove('copied'); }, 2000);
  });
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('overlay').classList.remove('show');
});

// ─────────── Init ───────────
renderFilters();
renderCards('전체');
</script>
