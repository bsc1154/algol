 cuts:[
  {who:'teach',nm:'🧑‍🏫 알고 선생님',say:'2D와 똑같이 익은 토마토를 전부 큐에 넣어요. 배열이 <b>3차원</b>(층·세로·가로)인 것만 달라요.',cap:'① 입력 + 큐 담기 (3D)',code:'int[][][] 상자 = new int[높이][세로][가로];\nint[][][] 익은날짜 = new int[높이][세로][가로];\nQueue&lt;int[]&gt; 익음전파큐 = new LinkedList&lt;&gt;();\nfor (int h=0; h&lt;높이; h++)\n  for (int i=0; i&lt;세로; i++)\n    for (int j=0; j&lt;가로; j++) {\n        상자[h][i][j] = 입력값;\n        if (상자[h][i][j]==1) 익음전파큐.add(new int[]{h,i,j});\n        else 익은날짜[h][i][j] = -1;\n    }'},
  {who:'teach',nm:'🧑‍🏫 알고 선생님',say:'이웃이 <b>6개</b>(상하좌우 + 위층·아래층)! 방향 배열만 6개로 늘리면 나머지는 2D와 똑같아요.',why:'왜 코드가 2D와 거의 똑같을까? 핵심 아이디어(멀티소스 BFS로 거리=날짜 구하기)는 <b>차원과 무관</b>하기 때문이에요. 달라지는 건 딱 하나 —이웃이 4개→<b>6개</b>(위·아래 층 추가)— 라서, <b>방향 배열만 6개로</b> 늘리면 나머진 그대로! 좋은 알고리즘은 이렇게 확장이 쉬워요.',cap:'② 6방향 BFS',code:'int[] 층이동={0,0,0,0,1,-1}, 행이동={0,0,1,-1,0,0}, 열이동={1,-1,0,0,0,0};\nint 마지막날짜 = 0;\nwhile (!익음전파큐.isEmpty()) {\n    int[] 현재칸 = 익음전파큐.poll();\n    for (int 방향=0; 방향&lt;6; 방향++) {\n        int 다음층=현재칸[0]+층이동[방향], 다음행=현재칸[1]+행이동[방향], 다음열=현재칸[2]+열이동[방향];\n        if (다음층&gt;=0 &amp;&amp; 다음층&lt;높이 &amp;&amp; 다음행&gt;=0 &amp;&amp; 다음행&lt;세로 &amp;&amp; 다음열&gt;=0 &amp;&amp; 다음열&lt;가로\n            &amp;&amp; 상자[다음층][다음행][다음열]==0) {\n            상자[다음층][다음행][다음열] = 1;\n            익은날짜[다음층][다음행][다음열] = 익은날짜[현재칸[0]][현재칸[1]][현재칸[2]] + 1;\n            마지막날짜 = Math.max(마지막날짜, 익은날짜[다음층][다음행][다음열]);\n            익음전파큐.add(new int[]{다음층,다음행,다음열});\n        }\n    }\n}'},
  {who:'teach',nm:'🧑‍🏫 알고 선생님',say:'안 익은 칸(0)이 남으면 -1, 아니면 마지막 날짜!',cap:'③ 판정 · 출력',code:'for (int[][] 한층 : 상자)\n  for (int[] 한줄 : 한층)\n    for (int 칸 : 한줄)\n      if (칸==0) { System.out.println(-1); return; }\nSystem.out.println(마지막날짜);'}
 ]},
1697:{title:'🏃 숨바꼭질 최단 기동',sub:'수직선에서 N→K로. 매초 -1, +1, ×2 순간이동. 최소 몇 초? — 1697',
 bg:'🙈 수빈이가 동생과 숨바꼭질 중! 수빈이는 수직선 위 <b>위치 N</b>에, 동생은 <b>위치 K</b>에 숨어 있어요. 수빈이는 1초마다 셋 중 하나로 움직여요 — <b>한 칸 뒤로(−1)</b>, <b>한 칸 앞으로(+1)</b>, 또는 <b>순간이동(현재의 ×2)</b>! 동생은 가만히 있어요.<span class="goal">🎯 수빈이가 동생을 찾는 <b>가장 빠른 시간(초)</b>은?</span>',
 legend:[['#e3b341','시작 N'],['#e5484d','목표 K'],['#46a758','방문한 위치(숫자=초)']],
 cuts:[
  {who:'teach',nm:'🧑‍🏫 알고 선생님',say:'위치를 노드로 봐요. 걸린시간 배열을 -1(미방문)로 채우고, 시작 위치를 큐에 넣고 0초로 시작!',cap:'① 준비',code:'int 최대좌표 = 100001;\nint[] 걸린시간 = new int[최대좌표];\nArrays.fill(걸린시간, -1);   <span class="cm">// -1 = 미방문</span>\nQueue&lt;Integer&gt; 방문예정큐 = new LinkedList&lt;&gt;();\n방문예정큐.add(시작위치); 걸린시간[시작위치] = 0;'},
  {who:'teach',nm:'🧑‍🏫 알고 선생님',say:'한 번 이동 = 1초라 <b>비용이 다 같아요</b>. 그래서 BFS로 <b>처음 닿은 순간</b>이 최소 시간! 세 갈래(−1, +1, ×2)로 퍼뜨립니다.',why:'왜 <b>BFS</b>이고 왜 <b>처음 닿으면 바로 정답</b>일까? −1·+1·×2 모두 <b>1초</b>라 이동 비용이 같아요. BFS는 "1초 걸리는 곳 → 2초 걸리는 곳 →…" 순서로 <b>가까운 시간부터</b> 방문하니까, 목표 K에 <b>처음 도착한 순간의 시간이 곧 최소</b>! (그래서 도착하자마자 return)',cap:'② BFS 본체',code:'while (!방문예정큐.isEmpty()) {\n    int 현재위치 = 방문예정큐.poll();\n    if (현재위치 == 목표위치) {\n        System.out.println(걸린시간[현재위치]); return;   <span class="cm">// 처음 닿음 = 최소</span>\n    }\n    for (int 다음위치 : new int[]{현재위치-1, 현재위치+1, 현재위치*2}) {\n        if (다음위치&gt;=0 &amp;&amp; 다음위치&lt;최대좌표 &amp;&amp; 걸린시간[다음위치]==-1) {\n            걸린시간[다음위치] = 걸린시간[현재위치] + 1;\n            방문예정큐.add(다음위치);\n        }\n    }\n}'}
 ]},
1260:{title:'🗺️ 두 가지 탐색: DFS vs BFS',sub:'그래프를 깊이우선(DFS)·너비우선(BFS)으로 방문한 순서 — 1260',
 bg:'🧭 여러 거점이 길로 이어진 지도를 탐험대가 조사해요! 시작 거점 <b>V</b>에서 출발해 두 가지 방식으로 훑습니다 — <b>DFS</b>(한 길로 끝까지 파고들었다 되돌아오기)와 <b>BFS</b>(가까운 곳부터 넓게 퍼지기). 갈림길에선 <b>번호가 작은 곳</b>부터!<span class="goal">🎯 DFS 방문 순서와 BFS 방문 순서를 각각 출력하자!</span>',
 legend:[['#e3b341','현재 방문'],['#e5484d','방문 완료'],['#30363d','미방문']],
 cuts:[
  {who:'teach',nm:'🧑‍🏫 알고 선생님',say:'먼저 <b>인접 리스트</b>로 그래프를 만들고, 각 리스트를 오름차순 정렬해요(작은 번호부터 방문해야 하니까).',viz:{t:'graph',n:4,edges:[[1,2],[1,3],[1,4],[2,4],[3,4]],title:'🗺️ 이렇게 연결돼 있어요 — 선으로 이어진 게 이웃!',note:'1번은 2·3·4와, 2번은 1·4와 선으로 이어져 있죠. 이 "누가 누구와 이웃인지"를 코드에선 <b>인접 리스트</b>로 적어둬요.'},cap:'① 그래프 구성 + 정렬',code:'인접리스트 = new ArrayList[정점수+1];\nfor (int i=1; i&lt;=정점수; i++) 인접리스트[i] = new ArrayList&lt;&gt;();\nfor (int e=0; e&lt;간선수; e++) {\n    int 정점A=..., 정점B=...;\n    인접리스트[정점A].add(정점B);\n    인접리스트[정점B].add(정점A);\n}\nfor (int i=1; i&lt;=정점수; i++) Collections.sort(인접리스트[i]);'},
  {who:'teach',nm:'🧑‍🏫 알고 선생님',say:'<b>DFS</b>는 재귀로 한 길 끝까지! 방문 표시부터 하고 미방문 이웃으로 파고듭니다.',why:'왜 <b>정렬</b>부터? "번호 작은 곳부터"라는 규칙 때문에, 인접 리스트를 오름차순으로 만들어두면 그냥 순서대로 돌기만 해도 규칙이 지켜져요. 왜 DFS는 <b>방문 표시를 먼저</b>? 표시 전에 재귀로 들어가면 같은 정점을 또 방문해 <b>무한 재귀</b>에 빠지거든요. DFS=한 길 끝까지(재귀), BFS=가까운 곳부터(큐) — 목적에 따라 골라 써요.',cap:'② DFS (재귀)',code:'static void 깊이우선탐색(int 현재정점) {\n    방문여부[현재정점] = true;\n    출력.append(현재정점).append(\' \');\n    for (int 다음정점 : 인접리스트[현재정점])\n        if (!방문여부[다음정점]) 깊이우선탐색(다음정점);\n}'},
  {who:'teach',nm:'🧑‍🏫 알고 선생님',say:'<b>BFS</b>는 큐로 가까운 곳부터! 큐에 <b>넣는 순간</b> 방문 표시하는 게 포인트예요.',flow:{title:'🎞️ BFS 큐의 흐름 — 이웃을 넣고(뒤로) → 하나 꺼내(앞에서) 방문, 반복!',steps:[{op:'시작: 1을 큐에 넣고 방문 표시',q:[1]},{op:'1 꺼냄 → 방문! 이웃 2·3·4를 뒤에 넣기',q:[2,3,4],out:'1'},{op:'2 꺼냄 → 이웃(1·4)은 이미 방문',q:[3,4],out:'2'},{op:'3 꺼냄 → 이웃 이미 방문',q:[4],out:'3'},{op:'4 꺼냄 → 큐가 빔, 끝!',q:[],out:'4'}]},cap:'③ BFS (큐)',code:'static void 너비우선탐색(int 시작정점) {\n    Queue&lt;Integer&gt; 방문예정큐 = new LinkedList&lt;&gt;();\n    방문예정큐.add(시작정점); 방문여부[시작정점] = true;\n    while (!방문예정큐.isEmpty()) {\n        int 현재정점 = 방문예정큐.poll();\n        출력.append(현재정점).append(\' \');\n        for (int 다음정점 : 인접리스트[현재정점])\n            if (!방문여부[다음정점]) { 방문여부[다음정점]=true; 방문예정큐.add(다음정점); }\n    }\n}'}
 ]},
2606:{title:'🦠 바이러스 확산',sub:'1번 컴퓨터가 감염되면 연결된 컴퓨터로 번진다. 몇 대 감염? — 2606',
 bg:'💻 회사 전산망에 웜 바이러스 발생! <b>1번 컴퓨터</b>가 처음 감염됐어요. 바이러스는 <b>네트워크로 직접·간접 연결된 컴퓨터</b>를 타고 계속 번져요. 보안팀이 급히 묻습니다.<span class="goal">🎯 1번 때문에 감염되는 컴퓨터가 <b>몇 대</b>인지 구하자! (1번 자신은 제외)</span>',
 legend:[['#e3b341','현재'],['#e5484d','감염됨'],['#30363d','안전']],
 cuts:[
  {who:'teach',nm:'🧑‍🏫 알고 선생님',say:'컴퓨터 연결을 <b>인접 리스트</b>(양방향)로 만들어 둬요.',viz:{t:'graph',n:7,edges:[[1,2],[2,3],[1,5],[5,2],[5,6],[4,7]],colors:{1:'#e5484d',4:'#484f58',7:'#484f58'},title:'🗺️ 컴퓨터 연결망 — 빨강(1)이 감염 시작!',note:'1번(빨강)과 <b>선으로 이어진</b> 2·3·5·6은 감염돼요. 4·7은 따로 떨어져(회색) <b>안 감염</b>!'},cap:'① 연결망 구성',code:'List&lt;Integer&gt;[] 인접리스트 = new ArrayList[컴퓨터수+1];\nfor (int i=1; i&lt;=컴퓨터수; i++) 인접리스트[i] = new ArrayList&lt;&gt;();\nfor (int e=0; e&lt;연결수; e++) {\n    int 컴퓨터A=..., 컴퓨터B=...;\n    인접리스트[컴퓨터A].add(컴퓨터B);\n    인접리스트[컴퓨터B].add(컴퓨터A);\n}'},
  {who:'teach',nm:'🧑‍🏫 알고 선생님',say:'1번에서 BFS로 퍼뜨리며 <b>새로 감염되는 수</b>를 세요. 1번 자신은 세지 않으니 답이 딱 맞아요.',why:'왜 <b>1번은 안 세도</b> 정답이 맞을까? 1번은 시작할 때 미리 방문 표시를 해두고, <b>새로 방문되는 이웃만</b> 감염수++ 하니까요. 그래서 카운트에 1번 자신이 절대 안 들어가 "1번 제외" 조건이 저절로 지켜져요. 왜 큐에 <b>넣을 때</b> 표시? 안 그러면 같은 컴퓨터가 여러 번 큐에 들어가 중복으로 세집니다.',flow:{title:'🎞️ 감염 확산 — 큐로 연결된 컴퓨터를 하나씩 (감염수 세기)',steps:[{op:'1번 감염. 큐에 1',q:[1]},{op:'1 꺼냄 → 이웃 2·5 감염 (+2)',q:[2,5]},{op:'2 꺼냄 → 3 감염 (+1)',q:[5,3]},{op:'5 꺼냄 → 6 감염 (+1)',q:[3,6]},{op:'3·6 꺼냄 → 새 감염 없음',q:[]}],}, cap:'② BFS 감염 + 세기',code:'boolean[] 방문여부 = new boolean[컴퓨터수+1];\nQueue&lt;Integer&gt; 방문예정큐 = new LinkedList&lt;&gt;();\n방문예정큐.add(1); 방문여부[1] = true;\nint 감염수 = 0;\nwhile (!방문예정큐.isEmpty()) {\n    int 현재컴퓨터 = 방문예정큐.poll();\n    for (int 이웃컴퓨터 : 인접리스트[현재컴퓨터])\n        if (!방문여부[이웃컴퓨터]) {\n            방문여부[이웃컴퓨터] = true;\n            감염수++;\n            방문예정큐.add(이웃컴퓨터);\n        }\n}\nSystem.out.println(감염수);'}
 ]},
11724:{title:'🔗 연결 요소 개수',sub:'따로 떨어진 그래프 덩어리가 몇 개? — 11724',
 bg:'👥 친구 관계망을 조사해요! 서로 아는 사람끼리 선으로 이어져 있어요. 직접·간접으로 연결된 사람들은 <b>한 무리</b>지만, 아무와도 안 이어진 무리들은 서로 <b>남남</b>이에요. 조사관이 묻습니다.<span class="goal">🎯 전체가 <b>몇 개의 독립된 무리(연결 요소)</b>로 나뉘는지 세자!</span>',

 cuts:[
  {who:'teach',nm:'🧑‍🏫 알고 선생님',say:'그래프를 <b>인접 리스트</b>(양방향)로 만들어요.',viz:{t:'graph',n:6,edges:[[1,2],[2,5],[5,1],[3,4],[4,6]],colors:{1:'#3fb950',2:'#3fb950',5:'#3fb950',3:'#a371f7',4:'#a371f7',6:'#a371f7'},title:'🗺️ 두 무리가 보이나요? — 초록 팀 · 보라 팀',note:'1·2·5(초록)는 서로 이어졌지만 3·4·6(보라)과는 <b>선이 없어요</b>. 그래서 <b>독립된 무리가 2개</b>!'},cap:'① 그래프 구성',code:'List&lt;Integer&gt;[] 인접리스트 = new ArrayList[정점수+1];\nfor (int i=1; i&lt;=정점수; i++) 인접리스트[i] = new ArrayList&lt;&gt;();\nfor (int e=0; e&lt;간선수; e++) {\n    int 정점A=..., 정점B=...;\n    인접리스트[정점A].add(정점B);\n    인접리스트[정점B].add(정점A);\n}'},
  {who:'teach',nm:'🧑‍🏫 알고 선생님',say:'미방문 정점에서 BFS를 <b>시작한 횟수</b>가 곧 덩어리(연결 요소) 개수! 새 그룹이 시작될 때마다 +1.',why:'왜 <b>BFS 시작 횟수 = 덩어리 수</b>일까? 한 번 BFS를 돌리면 <b>연결된 정점 전체</b>가 방문돼요. 그러니 반복문에서 <b>아직 미방문인 정점</b>을 만난다는 건 "지금까지 어느 덩어리와도 안 이어진 새 덩어리"란 뜻! 그때마다 +1 하면 독립된 덩어리 개수가 정확히 세집니다.',flow:{title:'🎞️ 미방문에서 BFS 시작한 횟수 = 덩어리 수',steps:[{op:'1 미방문 → 덩어리 1 시작! 큐에 1',q:[1]},{op:'1 꺼냄 → 2·5 넣기',q:[2,5]},{op:'2·5 꺼냄 → {1,2,5} 무리 완료',q:[]},{op:'3 미방문 → 덩어리 2 시작!',q:[3]},{op:'…{3,4,6} 완료. 총 2개!',q:[]}]},cap:'② 미방문마다 새 덩어리 + BFS',code:'boolean[] 방문여부 = new boolean[정점수+1];\nint 덩어리수 = 0;\nfor (int i=1; i&lt;=정점수; i++) {\n    if (!방문여부[i]) {\n        덩어리수++;\n        Queue&lt;Integer&gt; 탐색큐 = new LinkedList&lt;&gt;();\n        탐색큐.add(i); 방문여부[i]=true;\n        while (!탐색큐.isEmpty()) {\n            int 현재정점 = 탐색큐.poll();\n            for (int 다음정점 : 인접리스트[현재정점])\n                if (!방문여부[다음정점]) { 방문여부[다음정점]=true; 탐색큐.add(다음정점); }\n        }\n    }\n}\nSystem.out.println(덩어리수);'}
 ]},
10828:{title:'🥞 접시 쌓기, 스택',sub:'맨 위에만 올리고 맨 위에서만 빼는 통 — 10828 스택',
 bg:'🍽️ 뷔페 접시 더미를 떠올려요! <b>스택</b>은 접시를 쌓듯 <b>맨 위에만</b> 올리고(push), <b>맨 위</b>에서만 빼요(pop). 나중에 넣은 게 먼저 나오는 <b>LIFO</b>! 명령 5종을 처리하는 스택을 직접 만들어요.<span class="goal">🎯 push·pop·top·size·empty 명령을 순서대로 처리해 출력!</span>',
 cuts:[
  {who:'teach',nm:'🧑‍🏫 알고 선생님',say:'Java에선 <code>ArrayDeque</code>를 스택처럼 쓰면 빨라요. <b>pop·top은 비었는지 먼저 확인</b>(-1)하는 게 포인트!',why:'왜 <b>pop·top에서 비었는지 먼저</b> 확인? 빈 스택에 pop/peek를 하면 <b>예외(에러)</b>가 나거든요. 그래서 isEmpty()로 막고 −1을 내보내요. 왜 <b>ArrayDeque</b>? 옛 Stack 클래스보다 빠르고, push/pop이 그대로 스택처럼 동작해서예요.',viz:{t:'stack',title:'🥞 스택 — 접시 더미처럼 맨 위에서만',vals:[1,2],note:'push는 위에 <b>올리고</b>, pop·top은 <b>맨 위(top)</b>만 건드려요. 나중에 넣은 2가 먼저 나와요(LIFO).'},cap:'스택 명령 처리 전체',code:'BufferedReader 입력 = new BufferedReader(new InputStreamReader(System.in));\nStringBuilder 출력 = new StringBuilder();\nDeque&lt;Integer&gt; 값스택 = new ArrayDeque&lt;&gt;();\nint 명령수 = Integer.parseInt(입력.readLine().trim());\nwhile (명령수-- &gt; 0) {\n    StringTokenizer 토큰 = new StringTokenizer(입력.readLine());\n    String 명령 = 토큰.nextToken();\n    switch (명령) {\n        case "push": 값스택.push(Integer.parseInt(토큰.nextToken())); break;\n        case "pop":  출력.append(값스택.isEmpty()?-1:값스택.pop()).append(\'\\n\'); break;\n        case "top":  출력.append(값스택.isEmpty()?-1:값스택.peek()).append(\'\\n\'); break;\n        case "size": 출력.append(값스택.size()).append(\'\\n\'); break;\n        case "empty":출력.append(값스택.isEmpty()?1:0).append(\'\\n\'); break;\n    }\n}\nSystem.out.print(출력);'}
 ]},
10845:{title:'🚶 줄 서기, 큐',sub:'먼저 온 사람이 먼저 나가는 줄 — 10845 큐',
 bg:'🎢 놀이공원 대기 줄! <b>큐</b>는 <b>뒤로 들어와서 앞으로 나가요</b>. 먼저 온 사람이 먼저 타는 <b>FIFO</b>! 명령 6종을 처리하는 큐를 만들어요.<span class="goal">🎯 push·pop·size·empty·front·back 처리!</span>',
 cuts:[
  {who:'teach',nm:'🧑‍🏫 알고 선생님',say:'큐는 <b>뒤(addLast)로 넣고 앞(pollFirst)에서 빼요</b>. front/back은 확인만(peek), pop은 빼내기(poll)!',why:'왜 <b>뒤로 넣고 앞에서</b> 뺄까? 큐는 "먼저 온 게 먼저 나가는" FIFO라, 새 손님은 줄 <b>맨 뒤(addLast)</b>에 서고 서비스는 <b>맨 앞(pollFirst)</b>부터 받아야 순서가 공평해요. 왜 front/back은 peek? "확인"만 하고 줄에서 빼면 안 되니까(빼는 건 pop)!',viz:{t:'queue',title:'🚶 큐 — 놀이공원 줄처럼',vals:[1,2],note:'새 값은 <b>뒤로</b> 들어오고, 뺄 땐 <b>앞</b>에서 나가요. 먼저 온 1이 먼저 나감(FIFO).'},cap:'큐 명령 처리 전체',code:'Deque&lt;Integer&gt; 값큐 = new ArrayDeque&lt;&gt;();\nint 명령수 = Integer.parseInt(입력.readLine().trim());\nwhile (명령수-- &gt; 0) {\n    StringTokenizer 토큰 = new StringTokenizer(입력.readLine());\n    String 명령 = 토큰.nextToken();\n    switch (명령) {\n        case "push":  값큐.addLast(Integer.parseInt(토큰.nextToken())); break;\n        case "pop":   출력.append(값큐.isEmpty()?-1:값큐.pollFirst()).append(\'\\n\'); break;\n        case "front": 출력.append(값큐.isEmpty()?-1:값큐.peekFirst()).append(\'\\n\'); break;\n        case "back":  출력.append(값큐.isEmpty()?-1:값큐.peekLast()).append(\'\\n\'); break;\n        case "size":  출력.append(값큐.size()).append(\'\\n\'); break;\n        case "empty": 출력.append(값큐.isEmpty()?1:0).append(\'\\n\'); break;\n    }\n}\nSystem.out.print(출력);'}
 ]},
10866:{title:'🔁 양쪽 문, 덱',sub:'앞·뒤 양쪽에서 넣고 빼는 자료구조 — 10866 덱',
 bg:'🚇 양쪽에 문이 달린 지하철! <b>덱(deque)</b>은 <b>앞·뒤 양쪽</b>에서 자유롭게 넣고 뺄 수 있어요. 스택도 큐도 되는 만능! 명령 8종을 처리해요.<span class="goal">🎯 push_front/back·pop_front/back·front·back·size·empty!</span>',
 cuts:[
  {who:'teach',nm:'🧑‍🏫 알고 선생님',say:'<code>ArrayDeque</code>가 덱을 그대로 지원해요. 앞은 First, 뒤는 Last 메서드!',why:'덱은 왜 필요할까? 스택(한쪽 끝)과 큐(양 끝 각각)를 <b>둘 다</b> 할 수 있는 만능이라, 앞뒤 어디서든 넣고 빼야 하는 상황(예: 슬라이딩 윈도우 최댓값)에서 강력해요. 여기선 앞=First, 뒤=Last 메서드로 8개 명령을 그대로 매핑하면 끝!',viz:{t:'queue',title:'🔁 덱 — 양쪽에 문이 달린 줄',vals:[1,2],note:'스택+큐 합체! <b>앞·뒤 양쪽</b>에서 자유롭게 넣고 뺄 수 있어요.'},cap:'덱 명령 처리 전체',code:'Deque&lt;Integer&gt; 값덱 = new ArrayDeque&lt;&gt;();\nwhile (명령수-- &gt; 0) {\n    String 명령 = 토큰.nextToken();\n    switch (명령) {\n        case "push_front": 값덱.addFirst(Integer.parseInt(토큰.nextToken())); break;\n        case "push_back":  값덱.addLast(Integer.parseInt(토큰.nextToken())); break;\n        case "pop_front":  출력.append(값덱.isEmpty()?-1:값덱.pollFirst()).append(\'\\n\'); break;\n        case "pop_back":   출력.append(값덱.isEmpty()?-1:값덱.pollLast()).append(\'\\n\'); break;\n        case "front":      출력.append(값덱.isEmpty()?-1:값덱.peekFirst()).append(\'\\n\'); break;\n        case "back":       출력.append(값덱.isEmpty()?-1:값덱.peekLast()).append(\'\\n\'); break;\n        case "size":       출력.append(값덱.size()).append(\'\\n\'); break;\n        case "empty":      출력.append(값덱.isEmpty()?1:0).append(\'\\n\'); break;\n    }\n}'}
 ]},
11866:{title:'🎪 요세푸스, 원형 제거',sub:'원으로 앉아 K번째마다 빠지는 순서 — 11866 요세푸스 0',
 bg:'🎯 사람들이 <b>원을 이뤄</b> 앉아 있어요! 1번부터 세다가 <b>K번째 사람을 제거</b>하고, 그 다음부터 또 K번째를 제거… 계속 반복해요. 큐의 <b>회전</b>으로 원형을 흉내 냅니다.<span class="goal">🎯 제거되는 순서(요세푸스 순열)를 출력!</span>',
 cuts:[
  {who:'teach',nm:'🧑‍🏫 알고 선생님',say:'앞에서 <b>K-1명을 빼서 뒤로</b> 보내면(회전), 남은 맨 앞이 바로 K번째! 그걸 <b>제거</b>하고 반복해요.',why:'왜 <b>큐를 회전</b>시킬까? 사람들이 원형으로 앉아 있는데, 배열로 "원"을 표현하긴 번거로워요. 대신 <b>앞에서 빼서 뒤에 붙이면</b>(add(poll())) 마치 원을 돌리는 효과가 나요. K−1명을 뒤로 보내면 남은 맨 앞이 정확히 <b>K번째</b>가 되니, 그걸 빼면 제거 순서가 완성됩니다.',cap:'큐 회전으로 제거',code:'Queue&lt;Integer&gt; 사람큐 = new LinkedList&lt;&gt;();\nfor (int 번호=1; 번호&lt;=사람수; 번호++) 사람큐.add(번호);\nStringBuilder 출력 = new StringBuilder("&lt;");\nwhile (!사람큐.isEmpty()) {\n    for (int i=0; i&lt;셀개수K-1; i++) 사람큐.add(사람큐.poll());  // K-1명 뒤로 회전\n    출력.append(사람큐.poll());                              // K번째 제거\n    if (!사람큐.isEmpty()) 출력.append(", ");\n}\n출력.append("&gt;");\nSystem.out.println(출력);'}
 ]},
1874:{title:'📚 스택 수열 만들기',sub:'1~N을 push/pop해서 목표 수열 만들기 — 1874 스택 수열',
 bg:'🔢 1부터 N까지를 <b>오름차순으로만</b> 스택에 넣을 수 있어요(push). 원하는 때 꺼내서(pop) 목표 수열을 만들 수 있을까요? 가능하면 +/− 기호를, 불가능하면 NO!<span class="goal">🎯 목표 수열을 만드는 push(+)·pop(−) 순서, 안 되면 NO!</span>',
 cuts:[
  {who:'teach',nm:'🧑‍🏫 알고 선생님',say:'목표값까지 1씩 올려 push(+)하고, 맨 위가 목표면 pop(−)! 맨 위가 목표보다 작으면(이미 지나감) <b>만들 수 없어 NO</b>.',why:'왜 <b>맨 위가 목표보다 작으면 NO</b>일까? 스택은 나중에 넣은 게 먼저 나와요(LIFO). 목표값이 스택 맨 위보다 크면 더 push해서 꺼내면 되지만, <b>맨 위가 목표보다 작다면</b> 그 목표는 이미 더 큰 값들 <b>아래에 깔려</b> 있다는 뜻 → 영영 못 꺼내요. 그래서 그 순간 불가능(NO) 판정!',cap:'스택 수열 판정 전체',code:'Deque&lt;Integer&gt; 오름차순스택 = new ArrayDeque&lt;&gt;();\nStringBuilder 출력 = new StringBuilder();\nint 다음에넣을수 = 1; boolean 만들수있음 = true;\nfor (int i=0; i&lt;수열길이; i++) {\n    int 목표값 = 입력값;\n    while (다음에넣을수 &lt;= 목표값) { 오름차순스택.push(다음에넣을수++); 출력.append(\'+\').append(\'\\n\'); }\n    if (오름차순스택.peek() == 목표값) { 오름차순스택.pop(); 출력.append(\'-\').append(\'\\n\'); }\n    else { 만들수있음 = false; break; }\n}\nSystem.out.print(만들수있음 ? 출력 : "NO\\n");'}
 ]},
1966:{title:'🖨️ 프린터 큐',sub:'중요한 문서를 먼저 인쇄하는 큐 — 1966 프린터 큐',
 bg:'🖨️ 사무실 프린터! 큐 맨 앞 문서를 꺼냈는데, <b>뒤에 더 중요한 문서</b>가 있으면 다시 맨 뒤로 보내요. 아니면 인쇄! 내가 낸 문서가 <b>몇 번째로</b> 인쇄될까요?<span class="goal">🎯 목표 문서가 인쇄되는 순번을 구하기!</span>',
 cuts:[
  {who:'teach',nm:'🧑‍🏫 알고 선생님',say:'큐엔 <b>{중요도, 원래 위치}</b>를 담고, 최대 중요도는 <b>최대 힙</b>으로 빠르게 확인해요. 최고면 인쇄, 아니면 뒤로!',why:'왜 <b>최대 힙</b>을 따로 둘까? "지금 큐에 나보다 중요한 게 있나?"를 매번 확인해야 하는데, 큐를 다 뒤지면 느려요. <b>최대 힙</b>에 중요도만 담아두면 최댓값을 O(1)에 바로 봐서 빠르게 판단할 수 있어요. 왜 <b>{중요도, 원래 위치}</b>를 같이? 뒤섞여도 "내 문서"를 위치로 알아봐야 하니까요.',cap:'프린터 큐 시뮬 전체',code:'Queue&lt;int[]&gt; 대기큐 = new LinkedList&lt;&gt;();       // {중요도, 위치}\nfor (int i=0; i&lt;문서수; i++) 대기큐.add(new int[]{중요도목록[i], i});\nPriorityQueue&lt;Integer&gt; 최대중요도힙 = new PriorityQueue&lt;&gt;(Collections.reverseOrder());\nfor (int p : 중요도목록) 최대중요도힙.add(p);\nint 인쇄순번 = 0;\nwhile (!대기큐.isEmpty()) {\n    int[] 현재문서 = 대기큐.poll();\n    if (현재문서[0] == 최대중요도힙.peek()) {   // 가장 중요\n        최대중요도힙.poll(); 인쇄순번++;\n        if (현재문서[1] == 목표위치) { System.out.println(인쇄순번); break; }\n    } else 대기큐.add(현재문서);              // 뒤로 보내기\n}'}
 ]},
1927:{title:'⛰️ 최소 힙',sub:'항상 가장 작은 값이 튀어나오는 통 — 1927 최소 힙',
 bg:'⛏️ 마법 상자! 아무리 많이 넣어도 <b>꺼낼 땐 항상 가장 작은 값</b>이 나와요. 양수 x가 오면 넣고(add), <b>0이 오면 최솟값</b>을 빼서 출력(비면 0). 이게 <b>최소 힙</b>!<span class="goal">🎯 0이 올 때마다 최솟값을 꺼내 출력!</span>',
 cuts:[
  {who:'teach',nm:'🧑‍🏫 알고 선생님',say:'Java의 <code>PriorityQueue</code>가 <b>기본 최소 힙</b>이에요. 0이면 <code>poll()</code>로 최솟값을 꺼내면 끝!',why:'왜 <b>힙</b>을 쓸까? 매번 최솟값을 찾으려고 전체를 정렬/스캔하면 느려요(O(N)). 힙은 넣기·최솟값 빼기를 <b>O(log N)</b>에 해줘서, 삽입·삭제가 마구 섞여도 항상 빠르게 최솟값이 튀어나와요. 그래서 0이 오면 그냥 poll() 한 방!',viz:{t:'array',title:'⛰️ 최소 힙 — 항상 가장 작은 값이 꼭대기',vals:[1,3,5,7],hp:true,note:'정렬해서 보면 <b>왼쪽(맨 앞)이 항상 최솟값</b>. 그래서 0이 오면 맨 앞을 쏙 빼면 돼요!'},cap:'최소 힙 전체',code:'PriorityQueue&lt;Integer&gt; 최소힙 = new PriorityQueue&lt;&gt;();   // 기본=최소 힙\nStringBuilder 출력 = new StringBuilder();\nwhile (연산수-- &gt; 0) {\n    int 입력값 = Integer.parseInt(입력.readLine().trim());\n    if (입력값 == 0) 출력.append(최소힙.isEmpty() ? 0 : 최소힙.poll()).append(\'\\n\');\n    else 최소힙.add(입력값);\n}\nSystem.out.print(출력);'}
 ]},
11279:{title:'🗻 최대 힙',sub:'항상 가장 큰 값이 튀어나오는 통 — 11279 최대 힙',
 bg:'⛰️ 이번엔 반대! 꺼낼 때 <b>항상 가장 큰 값</b>이 나오는 <b>최대 힙</b>이에요. 로직은 최소 힙과 똑같고 <b>정렬 기준만 뒤집으면</b> 돼요.<span class="goal">🎯 0이 올 때마다 최댓값을 꺼내 출력!</span>',
 cuts:[
  {who:'teach',nm:'🧑‍🏫 알고 선생님',say:'<code>reverseOrder()</code>만 넣으면 최댓값이 맨 위로! 나머진 최소 힙과 동일해요.',why:'왜 <b>reverseOrder() 하나</b>로 끝날까? 힙의 원리(항상 "우선순위 1등"이 위로)는 그대로고, "1등"의 기준만 <b>작은 값→큰 값</b>으로 뒤집으면 최대 힙이 되기 때문이에요. 로직·코드는 최소 힙과 완전히 똑같아서, 비교 기준만 바꾸는 게 핵심이에요.',cap:'최대 힙 전체',code:'PriorityQueue&lt;Integer&gt; 최대힙 = new PriorityQueue&lt;&gt;(Collections.reverseOrder());\nStringBuilder 출력 = new StringBuilder();\nwhile (연산수-- &gt; 0) {\n    int 입력값 = Integer.parseInt(입력.readLine().trim());\n    if (입력값 == 0) 출력.append(최대힙.isEmpty() ? 0 : 최대힙.poll()).append(\'\\n\');\n    else 최대힙.add(입력값);\n}\nSystem.out.print(출력);'}
 ]},
11286:{title:'⚖️ 절댓값 힙',sub:'절댓값이 작은 값 먼저(같으면 음수 먼저) — 11286',
 bg:'⚖️ 특별한 저울 상자! 꺼낼 땐 <b>절댓값이 가장 작은 값</b>이 나와요. 절댓값이 같으면 <b>더 작은(음수) 값</b>이 먼저! 비교 규칙만 직접 정해주면 돼요.<span class="goal">🎯 0이 올 때마다 절댓값 최소를 꺼내 출력!</span>',
 cuts:[
  {who:'teach',nm:'🧑‍🏫 알고 선생님',say:'<b>비교자(Comparator)</b>를 직접 줘요. 절댓값이 다르면 절댓값 순, 같으면 값(a-b)순 — 그럼 음수가 먼저!',why:'왜 <b>비교자를 직접</b> 줄까? "절댓값이 작은 것 먼저, 같으면 음수 먼저"는 기본 정렬 규칙에 없는 우리만의 기준이에요. 힙은 <b>비교자만 바꾸면</b> 어떤 우선순위든 따르니, 규칙을 코드로 적어주면(절댓값 다르면 절댓값순, 같으면 a−b) 나머진 힙이 알아서 처리해요.',cap:'절댓값 힙 전체',code:'PriorityQueue&lt;Integer&gt; 절댓값힙 = new PriorityQueue&lt;&gt;((a, b) -&gt; {\n    int 절댓값a = Math.abs(a), 절댓값b = Math.abs(b);\n    return 절댓값a != 절댓값b ? 절댓값a - 절댓값b : a - b;\n});\nwhile (연산수-- &gt; 0) {\n    int 입력값 = Integer.parseInt(입력.readLine().trim());\n    if (입력값 == 0) 출력.append(절댓값힙.isEmpty() ? 0 : 절댓값힙.poll()).append(\'\\n\');\n    else 절댓값힙.add(입력값);\n}\nSystem.out.print(출력);'}
 ]},
7662:{title:'↕️ 이중 우선순위 큐',sub:'최댓값·최솟값을 모두 빠르게 빼기 — 7662',
 bg:'🎡 양쪽 끝을 다 쓰는 힙! <b>D 1</b>이면 최댓값 삭제, <b>D −1</b>이면 최솟값 삭제, <b>I n</b>이면 삽입. 최댓값·최솟값을 모두 빠르게 다뤄야 해요.<span class="goal">🎯 모든 명령 후, 남았으면 "최댓값 최솟값", 비면 EMPTY!</span>',
 cuts:[
  {who:'teach',nm:'🧑‍🏫 알고 선생님',say:'<code>TreeMap&lt;값,개수&gt;</code>를 쓰면 <b>firstKey=최솟값, lastKey=최댓값</b>을 O(log N)에! 중복은 개수로 관리해요.',why:'왜 <b>TreeMap</b>일까? 최댓값·최솟값을 <b>둘 다</b> 빠르게 빼야 하는데, 힙 하나론 한쪽만 빨라요. TreeMap은 값을 <b>정렬 상태로</b> 보관해 firstKey(최소)·lastKey(최대)를 모두 O(log N)에 주죠. 왜 <b>값별 개수</b>로? 같은 값이 여러 번 들어올 수 있어서, 지울 때 개수만 줄이면 중복도 깔끔히 관리돼요.',cap:'이중 우선순위 큐 전체',code:'TreeMap&lt;Integer,Integer&gt; 값별개수맵 = new TreeMap&lt;&gt;();\nwhile (명령수-- &gt; 0) {\n    char 명령 = 토큰.nextToken().charAt(0);   // I=삽입, D=삭제\n    int 값 = Integer.parseInt(토큰.nextToken());\n    if (명령 == \'I\') 값별개수맵.merge(값, 1, Integer::sum);\n    else {\n        if (값별개수맵.isEmpty()) continue;\n        int 대상키 = (값 == 1) ? 값별개수맵.lastKey() : 값별개수맵.firstKey();\n        if (값별개수맵.get(대상키) == 1) 값별개수맵.remove(대상키);\n        else 값별개수맵.put(대상키, 값별개수맵.get(대상키) - 1);\n    }\n}\nif (값별개수맵.isEmpty()) 출력.append("EMPTY\\n");\nelse 출력.append(값별개수맵.lastKey()).append(\' \').append(값별개수맵.firstKey()).append(\'\\n\');'}
 ]},
1000:{title:'➕ 첫 관문, A+B',sub:'두 수를 더해 출력하는 입출력 연습 — 1000 A+B',
 bg:'🚪 알고리즘 세계의 <b>첫 관문</b>! 두 정수 A, B를 입력받아 더한 값을 출력하는, 입출력에 익숙해지는 연습 문제예요.<span class="goal">🎯 A+B를 출력!</span>',
 cuts:[{who:'teach',nm:'🧑‍🏫 알고 선생님',say:'입력이 적으니 <code>Scanner</code>로 간단히 읽어 더하면 끝!',why:'왜 <b>Scanner</b>로 충분? 입력이 딱 두 개라 속도 걱정이 없어요. (입력이 아주 많은 문제에선 BufferedReader가 필요하지만, 여긴 가독성 우선!)',cap:'전체 코드',code:'Scanner 입력 = new Scanner(System.in);\nint 첫째수 = 입력.nextInt();\nint 둘째수 = 입력.nextInt();\nSystem.out.println(첫째수 + 둘째수);'}]},
2609:{title:'📐 최대공약수·최소공배수',sub:'두 수의 GCD와 LCM 구하기 — 2609',
 bg:'🔢 두 자연수가 주어져요. <b>둘을 모두 나누는 가장 큰 수(최대공약수)</b>와 <b>둘의 공통 배수 중 가장 작은 수(최소공배수)</b>를 구해요.<span class="goal">🎯 GCD와 LCM을 각각 출력!</span>',
 cuts:[{who:'teach',nm:'🧑‍🏫 알고 선생님',say:'<b>유클리드 호제법</b>: 큰 수를 작은 수로 나눈 나머지로 계속 바꿔가면 GCD가 나와요. LCM은 <b>두 수의 곱 ÷ GCD</b>!',why:'왜 <b>나누기를 먼저</b> 할까? (수A × 수B)를 곧바로 곱하면 <b>int 범위를 넘칠 수</b> 있어요. 그래서 <code>수A / GCD * 수B</code>처럼 나누기부터 하고 long으로 받아 오버플로를 막아요. — 자주 하는 실수!',cap:'전체 코드',code:'int 수A = 입력.nextInt(), 수B = 입력.nextInt();\nint 최대공약수 = 최대공약수구하기(수A, 수B);\nSystem.out.println(최대공약수);                    // GCD\nSystem.out.println((long) 수A / 최대공약수 * 수B);  // LCM\n\nstatic int 최대공약수구하기(int 수A, int 수B) {\n    return 수B == 0 ? 수A : 최대공약수구하기(수B, 수A % 수B);   // 유클리드 호제법\n}'}]},
1978:{title:'🔍 소수 찾기',sub:'주어진 수들 중 소수 개수 — 1978',
 bg:'🧮 여러 수가 주어져요. 그중 <b>소수</b>(1과 자기 자신만 약수인 수, 1은 제외)가 <b>몇 개</b>인지 세요.<span class="goal">🎯 소수의 개수를 출력!</span>',
 cuts:[{who:'teach',nm:'🧑‍🏫 알고 선생님',say:'각 수를 <b>2부터 √n까지</b> 나눠 봐서 약수가 없으면 소수! 1보다 작으면 바로 탈락이에요.',why:'왜 <b>√n까지</b>만 확인해도 될까? 약수는 항상 <b>짝</b>으로 존재해요(예: 36 = 6×6, 4×9…). 한쪽 약수가 √n보다 크면 짝이 되는 다른 약수는 반드시 √n보다 작죠. 그래서 √n까지만 봐도 놓치는 약수가 없어요 → 훨씬 빠름!',cap:'전체 코드',code:'int 수개수 = 입력.nextInt(), 소수개수 = 0;\nfor (int i=0; i&lt;수개수; i++)\n    if (소수인가(입력.nextInt())) 소수개수++;\nSystem.out.println(소수개수);\n\nstatic boolean 소수인가(int 대상수) {\n    if (대상수 &lt; 2) return false;               // 1 이하는 소수 아님\n    for (int i=2; i*i &lt;= 대상수; i++)\n        if (대상수 % i == 0) return false;        // 약수 발견\n    return true;\n}'}]},
11050:{title:'🔢 이항계수 C(N,K)',sub:'N개 중 K개 고르는 경우의 수 — 11050',
 bg:'🎲 서로 다른 N개 중에서 <b>순서 없이 K개</b>를 고르는 경우의 수, 즉 이항계수 C(N,K)를 구해요.<span class="goal">🎯 C(N,K) = N! / (K!·(N−K)!) 계산!</span>',
 cuts:[{who:'teach',nm:'🧑‍🏫 알고 선생님',say:'팩토리얼을 통째로 구하지 말고, 분자엔 n·(n−1)…을 <b>K번</b>, 분모엔 1·2…K를 곱해요.',why:'왜 <b>K번만</b> 곱할까? C(N,K)=N!/(K!(N−K)!)에서 분자·분모의 공통 부분 (N−K)!이 <b>약분</b>돼요. 남는 건 분자 K항, 분모 K! 뿐이라, 큰 팩토리얼을 통째로 계산할 필요 없이 K번만 곱하면 돼서 <b>오버플로도 줄고 빨라요</b>.',cap:'전체 코드',code:'static long 이항계수(int 전체개수, int 뽑을개수) {\n    if (뽑을개수 == 0 || 뽑을개수 == 전체개수) return 1;\n    long 분자 = 1, 분모 = 1;\n    for (int i=0; i&lt;뽑을개수; i++) {\n        분자 *= (전체개수 - i);   // n, n-1, ...\n        분모 *= (i + 1);          // 1, 2, ..., k (= k!)\n    }\n    return 분자 / 분모;\n}'}]},
6064:{title:'📅 카잉 달력',sub:'두 주기 M·N에서 <x:y>가 몇 번째 해? — 6064',
 bg:'🗓️ 카잉 달력은 날짜를 <b>&lt;x:y&gt;</b>로 표현해요. 해가 바뀔 때마다 x는 M을 넘으면 1로, y는 N을 넘으면 1로 돌아가요. 찾는 날짜가 <b>몇 번째 해</b>에 나타날까요?<span class="goal">🎯 해의 번호(없으면 −1)!</span>',
 cuts:[{who:'teach',nm:'🧑‍🏫 알고 선생님',say:'x 조건을 만족하는 후보는 x, x+M, x+2M… 이에요. 그중 <b>y 조건 (해−y)%N==0</b>도 맞는 첫 번째 해를 찾아요.',why:'왜 <b>최소공배수(LCM)까지</b>만 보면 될까? M과 N 주기가 <b>동시에 처음으로 다시 맞물리는 지점</b>이 LCM(M,N)이에요. 그 안에 답이 없으면 이후엔 같은 패턴이 반복될 뿐이라 영영 없다는 뜻 → −1. 그래서 LCM까지만 탐색하면 충분해요.',cap:'전체 코드',code:'long 최소공배수 = 주기M / 최대공약수구하기(주기M, 주기N) * 주기N;\nlong 정답해 = -1;\nfor (long 해번호 = 목표x; 해번호 &lt;= 최소공배수; 해번호 += 주기M) {\n    if ((해번호 - 목표y) % 주기N == 0) { 정답해 = 해번호; break; }\n}\nSystem.out.println(정답해);   // 못 찾으면 -1'}]},
1620:{title:'📗 포켓몬 도감',sub:'이름↔번호 양방향 조회 — 1620 포켓몬 마스터',
 bg:'📕 1번부터 N번까지 포켓몬 이름이 도감에 순서대로 적혀 있어요. <b>번호를 물으면 이름</b>을, <b>이름을 물으면 번호</b>를 답해야 해요.<span class="goal">🎯 각 질문에 번호 또는 이름으로 답!</span>',
 cuts:[{who:'teach',nm:'🧑‍🏫 알고 선생님',say:'<b>HashMap 두 개</b>를 만들어요 — 이름→번호, 번호→이름. 질문이 숫자면 번호로, 글자면 이름으로 조회!',why:'왜 <b>맵을 두 개</b>나? 조회가 <b>양방향</b>이라서예요. 하나의 맵으론 한쪽 방향만 O(1)로 빠르고 반대 방향은 전체를 뒤져야 느려요. 두 방향을 미리 만들어두면 <b>어느 쪽 질문이든 O(1)</b>에 답할 수 있어요.',viz:{t:'map',title:'📒 사전(맵) — 이름으로 번호를 바로 찾기 (반대 맵도 같이!)',pairs:[['Bulbasaur','1'],['Ivysaur','2'],['Venusaur','3']],note:'전화번호부처럼 <b>이름 → 번호</b>를 즉시 조회. 번호로도 찾게 <b>번호 → 이름</b> 맵을 하나 더 만들어요.'},cap:'전체 코드',code:'Map&lt;String,Integer&gt; 이름으로번호찾기 = new HashMap&lt;&gt;();\nMap&lt;Integer,String&gt; 번호로이름찾기 = new HashMap&lt;&gt;();\nfor (int 번호=1; 번호&lt;=포켓몬수; 번호++) {\n    String 이름 = 입력.readLine().trim();\n    이름으로번호찾기.put(이름, 번호);\n    번호로이름찾기.put(번호, 이름);\n}\n// 질문이 숫자면 번호→이름, 글자면 이름→번호\nif (Character.isDigit(질문.charAt(0)))\n    출력.append(번호로이름찾기.get(Integer.parseInt(질문)));\nelse\n    출력.append(이름으로번호찾기.get(질문));'}]},
1764:{title:'🧑‍🤝‍🧑 듣보잡',sub:'두 명단의 교집합 — 1764',
 bg:'📋 <b>듣도 못한 사람</b> 명단과 <b>보도 못한 사람</b> 명단이 있어요. <b>둘 다에 있는 사람</b>(=듣도 보도 못한 사람)을 찾아 사전순으로 출력해요.<span class="goal">🎯 교집합 인원 수 + 사전순 명단!</span>',
 cuts:[{who:'teach',nm:'🧑‍🏫 알고 선생님',say:'첫 명단을 <b>HashSet</b>에 담고, 둘째 명단을 돌면서 Set에 있으면 교집합!',why:'왜 <b>HashSet</b>? 둘째 명단의 각 이름이 첫 명단에 있는지 매번 확인해야 하는데, 리스트를 뒤지면 O(N)이라 전체 O(N·M)로 느려요. Set은 <b>포함 여부를 O(1)</b>에 알려줘서 한 번씩만 훑으면 끝(O(N+M))!',viz:{t:'set',title:'📋 집합(Set) — 중복 없는 명단, 포함 여부를 즉시 확인',items:['ohhenrie','charlie','baesangwook'],note:'첫 명단을 Set에 담아두면, 둘째 명단의 이름이 <b>여기 있나?</b>를 O(1)에 확인해요.'},cap:'전체 코드',code:'Set&lt;String&gt; 듣도못한사람 = new HashSet&lt;&gt;();\nfor (int i=0; i&lt;듣도못한수; i++) 듣도못한사람.add(입력.readLine().trim());\nList&lt;String&gt; 교집합명단 = new ArrayList&lt;&gt;();\nfor (int i=0; i&lt;보도못한수; i++) {\n    String 이름 = 입력.readLine().trim();\n    if (듣도못한사람.contains(이름)) 교집합명단.add(이름);   // 양쪽에 다 있음\n}\nCollections.sort(교집합명단);   // 사전순'}]},
17219:{title:'🔑 비밀번호 찾기',sub:'사이트로 비밀번호 조회 — 17219',
 bg:'🔐 사이트 주소와 비밀번호 쌍이 저장돼 있어요. 비밀번호를 못 외우는 김지민을 위해, 질문한 사이트의 비밀번호를 찾아줘요.<span class="goal">🎯 각 질문 사이트의 비밀번호 출력!</span>',
 cuts:[{who:'teach',nm:'🧑‍🏫 알고 선생님',say:'<b>HashMap&lt;사이트, 비밀번호&gt;</b>에 저장해두고 질문마다 <code>get</code>으로 꺼내면 끝!',why:'왜 <b>맵</b>을 미리 만들까? 질문이 여러 개인데, 매번 저장 목록 전체를 뒤지면 느려요. 사이트→비밀번호 맵을 한 번 만들어두면 <b>각 질문을 O(1)</b>에 즉시 답할 수 있어요. "미리 정리해두고 빠르게 조회"가 해시맵의 핵심!',viz:{t:'map',title:'📒 사전(맵) — 사이트로 비밀번호를 바로 찾기',pairs:[['wikipedia','hashing'],['namuwiki','spammer']],note:'미리 <b>사이트 → 비밀번호</b> 장부를 만들어두면 질문마다 즉시 답!'},cap:'전체 코드',code:'Map&lt;String,String&gt; 비밀번호장부 = new HashMap&lt;&gt;();\nfor (int i=0; i&lt;저장된쌍수; i++) {\n    토큰 = new StringTokenizer(입력.readLine());\n    비밀번호장부.put(토큰.nextToken(), 토큰.nextToken());   // 사이트→비밀번호\n}\nfor (int i=0; i&lt;질문수; i++)\n    출력.append(비밀번호장부.get(입력.readLine().trim())).append(\'\\n\');'}]},
2798:{title:'🃏 블랙잭',sub:'카드 3장 합이 M 이하 최댓값 — 2798',
 bg:'🎰 카드 N장 중 <b>서로 다른 3장</b>을 골라, 합이 한도 M을 넘지 않으면서 <b>최대</b>가 되게 해요(블랙잭처럼 M에 가깝게).<span class="goal">🎯 3장 합의 최댓값(M 이하) 출력!</span>',
 cuts:[{who:'teach',nm:'🧑‍🏫 알고 선생님',say:'가능한 <b>모든 3장 조합</b>을 3중 반복으로 다 더해 보고, M 이하 중 최댓값을 갱신해요.',why:'왜 <b>완전탐색</b>(다 해보기)으로 충분할까? N이 최대 100이라 3장 조합 수가 100³=백만 정도로 <b>넉넉히 빠르거든요</b>. 이렇게 경우의 수가 감당 가능하면, 머리 굴리지 말고 전부 시도하는 게 가장 확실해요.',viz:{t:'array',title:'📦 카드 배열 (예: 한도 21)',vals:[5,6,7,8,9],idx:true,note:'서로 다른 <b>3장</b>을 골라 합이 21 이하 최대! (6+7+8=21)'},cap:'전체 코드',code:'int 최댓값 = 0;\nfor (int i=0; i&lt;카드수; i++)\n  for (int j=i+1; j&lt;카드수; j++)\n    for (int k=j+1; k&lt;카드수; k++) {\n        int 세장합 = 카드숫자[i] + 카드숫자[j] + 카드숫자[k];\n        if (세장합 &lt;= 한도) 최댓값 = Math.max(최댓값, 세장합);\n    }\nSystem.out.println(최댓값);'}]},
2231:{title:'➗ 분해합',sub:'N의 가장 작은 생성자 찾기 — 2231',
 bg:'🧩 어떤 수 M과 <b>M의 각 자릿수 합</b>을 더한 값이 "M의 분해합"이에요(예: 245 → 245+2+4+5=256). 분해합이 N이 되는 <b>가장 작은 M</b>(생성자)을 찾아요.<span class="goal">🎯 가장 작은 생성자(없으면 0)!</span>',
 cuts:[{who:'teach',nm:'🧑‍🏫 알고 선생님',say:'1부터 N−1까지 후보 m을 하나씩 보며 m + 자릿수 합이 N이 되는 <b>첫 m</b>을 찾으면 끝!',why:'왜 <b>1부터 순서대로</b> 올라갈까? "가장 작은" 생성자를 찾아야 하니까요. 작은 수부터 확인하면 <b>처음 맞는 순간이 곧 최소</b>라 바로 멈출 수 있어요(반대로 큰 수부터면 끝까지 봐야 함).',cap:'전체 코드',code:'for (int 생성자후보=1; 생성자후보&lt;목표N; 생성자후보++) {\n    int 분해합 = 생성자후보, 남은수 = 생성자후보;\n    while (남은수 &gt; 0) { 분해합 += 남은수 % 10; 남은수 /= 10; }   // 각 자리 더하기\n    if (분해합 == 목표N) { System.out.println(생성자후보); return; }\n}\nSystem.out.println(0);   // 못 찾음'}]},
1018:{title:'♟️ 체스판 다시 칠하기',sub:'8×8 잘라 최소 수정 칸 — 1018',
 bg:'🏁 흑백으로 칠해진 N×M 보드에서 <b>8×8</b>을 잘라 올바른 체스판(인접 칸은 다른 색)으로 만들려 해요. 다시 칠할 칸이 <b>가장 적은</b> 경우는?<span class="goal">🎯 다시 칠할 칸 수의 최솟값!</span>',
 cuts:[{who:'teach',nm:'🧑‍🏫 알고 선생님',say:'가능한 <b>모든 8×8 위치</b>를 완전탐색! 각 위치에서 "W로 시작하는 체스판"과 다른 칸 수 cnt를 세요.',why:'왜 <b>64−cnt</b>도 같이 볼까? 체스판은 딱 두 종류 —W로 시작 / B로 시작— 뿐이에요. W시작과 다른 칸이 cnt개면, B시작과 다른 칸은 나머지 <b>64−cnt개</b>예요(정반대니까). 둘 중 <b>작은 값</b>이 그 위치의 최소 수정 수!',cap:'전체 코드',code:'int 최소칠할칸 = Integer.MAX_VALUE;\nfor (int 시작행=0; 시작행 &lt;= 세로-8; 시작행++)\n  for (int 시작열=0; 시작열 &lt;= 가로-8; 시작열++) {\n      int 다른칸수 = 0;\n      for (int i=0; i&lt;8; i++)\n        for (int j=0; j&lt;8; j++) {\n            char 기대색 = ((i+j) % 2 == 0) ? \'W\' : \'B\';\n            if (보드[시작행+i][시작열+j] != 기대색) 다른칸수++;\n        }\n      최소칠할칸 = Math.min(최소칠할칸, Math.min(다른칸수, 64 - 다른칸수));\n  }\nSystem.out.println(최소칠할칸);'}]},
2108:{title:'📊 통계학',sub:'평균·중앙값·최빈값·범위 — 2108',
 bg:'🧮 N개(홀수)의 정수로 네 가지 통계를 구해요 — <b>산술평균</b>(반올림), <b>중앙값</b>(가운데), <b>최빈값</b>(가장 많이 나온 값, 여럿이면 두 번째로 작은 것), <b>범위</b>(최대−최소).<span class="goal">🎯 네 통계값을 각각 출력!</span>',
 cuts:[{who:'teach',nm:'🧑‍🏫 알고 선생님',say:'입력받으며 <b>합</b>과 <b>등장 횟수</b>를 동시에 기록하고, <b>정렬</b> 후 가운데=중앙값, 양끝차=범위!',why:'왜 <b>정렬</b>이 필요? 중앙값은 "크기순 가운데 값"이라 정렬해야 위치(N/2)로 딱 집을 수 있어요. 왜 최빈값은 <b>등장 횟수 배열</b>로? 값 범위(−4000~4000)가 정해져 있어, +4000 옮겨 배열 칸으로 세면 O(N)에 빈도를 구하고 "두 번째로 작은 최빈값"도 앞에서부터 찾으면 돼요.',viz:{t:'array',title:'📦 정렬된 수배열 (예)',vals:[-2,1,2,3,8],idx:true,note:'정렬하면 <b>가운데(index N/2)</b>가 중앙값(2), 양끝 차이가 범위(8−(−2)=10)!'},cap:'핵심 계산',code:'Arrays.sort(수배열);                              // 중앙값·범위용\nint 평균 = (int) Math.round((double)합계 / 개수);\nint 중앙값 = 수배열[개수/2];\nint 최대등장 = 0;\nfor (int 횟수 : 등장횟수) 최대등장 = Math.max(최대등장, 횟수);\nint 최빈값 = 0; boolean 후보찾음 = false;\nfor (int i=0; i&lt;=8000; i++)\n    if (등장횟수[i] == 최대등장) {\n        if (!후보찾음) { 최빈값 = i-4000; 후보찾음 = true; }   // 첫 후보\n        else { 최빈값 = i-4000; break; }                     // 두 번째 후보\n    }\nint 범위 = 수배열[개수-1] - 수배열[0];'}]},
1074:{title:'🔡 Z',sub:'Z 모양 방문에서 (r,c)의 순서 — 1074',
 bg:'📐 2^N × 2^N 배열을 <b>Z 모양</b>으로 방문해요(4등분해 왼위→오위→왼아래→오아래, 각 사분면도 다시 같은 방식). r행 c열이 <b>몇 번째</b>로 방문될까요?<span class="goal">🎯 (r,c)의 방문 순서 번호!</span>',
 cuts:[{who:'teach',nm:'🧑‍🏫 알고 선생님',say:'<b>분할정복</b>! 판을 4등분해 (r,c)가 어느 사분면인지 보고, 앞 사분면들의 칸 수를 더한 뒤 그 안에서 재귀로 좁혀요.',why:'왜 <b>직접 세지 않고</b> 재귀로? N이 크면 칸이 수십억 개라 하나씩 세면 불가능해요. 하지만 "어느 사분면인지"만 알면 <b>앞 사분면들(각 절반²칸)은 통째로 건너뛰고</b>, 관심 있는 사분면만 파고들면 돼요. 매번 크기가 반씩 줄어 아주 빠르게(로그 시간) 답이 나와요.',cap:'전체 코드',code:'static long Z순서번호(int 판크기, int 행, int 열) {\n    if (판크기 == 1) return 0;\n    int 절반 = 판크기 / 2;\n    long 사분면칸수 = (long) 절반 * 절반;\n    if (행 &lt; 절반 && 열 &lt; 절반)  return Z순서번호(절반, 행, 열);                    // 좌상\n    if (행 &lt; 절반 && 열 &gt;= 절반) return 사분면칸수 + Z순서번호(절반, 행, 열-절반);      // 우상\n    if (행 &gt;= 절반 && 열 &lt; 절반) return 사분면칸수*2 + Z순서번호(절반, 행-절반, 열);    // 좌하\n    return 사분면칸수*3 + Z순서번호(절반, 행-절반, 열-절반);                           // 우하\n}'}]},
14500:{title:'🧱 테트로미노',sub:'4칸 도형으로 덮은 최대 합 — 14500',
 bg:'🎮 정사각형 4개를 이어 붙인 도형(테트로미노)을 회전·대칭 자유롭게 보드에 <b>한 번</b> 놓아요. 덮은 4칸 숫자 합이 <b>최대</b>가 되게!<span class="goal">🎯 덮은 칸 합의 최댓값!</span>',
 cuts:[{who:'teach',nm:'🧑‍🏫 알고 선생님',say:'모든 칸에서 시작해 <b>DFS로 인접 칸을 4개까지</b> 이어 붙이며 합의 최댓값을 구해요. 단, <b>ㅗ(T)자</b>만 예외 처리!',why:'왜 <b>T자만 따로</b> 처리할까? "한 칸에서 옆으로 쭉 이어 붙이는" 경로형 DFS로는 <b>가지가 갈라지는 T자</b>를 만들 수 없어요(한 줄로만 뻗으니까). 나머지 18가지는 DFS로 다 되지만, T자만은 "가운데 칸 + 4방향 중 3개"로 <b>별도로</b> 세줘야 빠짐이 없어요.',cap:'DFS + T자 별도',code:'for (int i=0; i&lt;세로; i++)\n  for (int j=0; j&lt;가로; j++) {\n      방문여부[i][j] = true;\n      연결4칸탐색(i, j, 1, 보드[i][j]);   // 길이 4 경로 DFS\n      방문여부[i][j] = false;\n      티자검사(i, j);                   // ㅗ자 별도\n  }\nstatic void 연결4칸탐색(int 행, int 열, int 고른칸수, int 지금합) {\n    if (고른칸수 == 4) { 최대합 = Math.max(최대합, 지금합); return; }\n    for (int 방향=0; 방향&lt;4; 방향++) {\n        int 다음행=행+행이동[방향], 다음열=열+열이동[방향];\n        if (다음행&gt;=0 && 다음행&lt;세로 && 다음열&gt;=0 && 다음열&lt;가로 && !방문여부[다음행][다음열]) {\n            방문여부[다음행][다음열] = true;\n            연결4칸탐색(다음행, 다음열, 고른칸수+1, 지금합+보드[다음행][다음열]);\n            방문여부[다음행][다음열] = false;   // 백트래킹\n        }\n    }\n}'}]},
5430:{title:'🔃 AC (배열 함수)',sub:'R(뒤집기)·D(앞 삭제)를 빠르게 — 5430',
 bg:'🧾 배열에 두 함수를 적용해요 — <b>R</b>은 순서를 뒤집고, <b>D</b>는 맨 앞을 버려요(빈 배열에 D면 에러). 명령 문자열을 앞에서부터 적용한 최종 배열은?<span class="goal">🎯 최종 배열 또는 error!</span>',
 cuts:[{who:'teach',nm:'🧑‍🏫 알고 선생님',say:'핵심은 <b>R에서 실제로 뒤집지 않기</b>! 대신 <b>방향 플래그</b>만 토글하고, D는 현재 방향의 앞쪽에서 빼요(덱 사용).',why:'왜 <b>진짜로 뒤집으면 안</b> 될까? R이 나올 때마다 배열을 통째로 뒤집으면 한 번에 O(N), R이 많으면 O(N²)로 <b>시간 초과</b>! 그런데 "뒤집힘 여부"만 기억하면, D는 그 방향에 따라 앞/뒤에서 빼면 되고 <b>뒤집기는 공짜(O(1))</b>가 돼요. 최종 출력 때만 방향대로 한 번 정리!',cap:'전체 코드',code:'boolean 뒤집힘 = false, 오류 = false;\nfor (char 명령 : 명령문자열.toCharArray()) {\n    if (명령 == \'R\') 뒤집힘 = !뒤집힘;                  // 방향만 토글 (O(1))\n    else {  // D\n        if (값덱.isEmpty()) { 오류 = true; break; }\n        if (뒤집힘) 값덱.pollLast();   // 뒤집힌 상태면 뒤에서\n        else 값덱.pollFirst();         // 아니면 앞에서\n    }\n}\n// 오류면 error, 아니면 방향대로 출력'}]},
16928:{title:'🐍 뱀과 사다리',sub:'1→100 최소 주사위 횟수 — 16928',
 bg:'🎲 1번 칸에서 출발해 100번 칸 도착! 주사위를 굴려 나온 만큼 이동하고, 도착 칸에 <b>사다리면 위로, 뱀이면 아래로</b> 순간이동해요. 100까지 <b>최소 몇 번</b> 굴릴까요?<span class="goal">🎯 최소 주사위 굴림 횟수!</span>',
 cuts:[{who:'teach',nm:'🧑‍🏫 알고 선생님',say:'칸을 <b>노드</b>로 보는 BFS! 한 번 굴림 = 한 칸 퍼짐이라, 100번에 <b>처음 닿은 순간의 횟수</b>가 최소예요. 사다리·뱀은 도착 즉시 점프!',why:'왜 <b>BFS</b>일까? 주사위 한 번은 어디로 가든 "1회"로 비용이 같아요. BFS는 "1번 굴려 닿는 칸 → 2번 굴려 닿는 칸 →…" 순으로 퍼지니, 100에 <b>처음 도달한 굴림 수가 곧 최소</b>! 사다리·뱀은 그냥 "그 칸에 도착하면 강제로 끝 칸으로 이동"하는 규칙으로 처리하면 돼요.',cap:'전체 코드',code:'int[] 순간이동표 = new int[101];   // 사다리·뱀: 시작칸→도착칸\n// (입력으로 순간이동표 채우기)\nint[] 최소굴림수 = new int[101];\nArrays.fill(최소굴림수, -1);\n방문예정큐.add(1); 최소굴림수[1] = 0;\nwhile (!방문예정큐.isEmpty()) {\n    int 현재칸 = 방문예정큐.poll();\n    for (int 주사위=1; 주사위&lt;=6; 주사위++) {\n        int 다음칸 = 현재칸 + 주사위;\n        if (다음칸 &gt; 100) continue;\n        if (순간이동표[다음칸] != 0) 다음칸 = 순간이동표[다음칸];   // 사다리/뱀\n        if (최소굴림수[다음칸] == -1) {\n            최소굴림수[다음칸] = 최소굴림수[현재칸] + 1;\n            if (다음칸 == 100) { System.out.println(최소굴림수[다음칸]); return; }\n            방문예정큐.add(다음칸);\n        }\n    }\n}'}]},
9001:{title:'🌊 스트림: 정수 합',sub:'mapToInt + sum — 9001',
 bg:'🌊 <b>스트림(Stream)</b>은 데이터를 컨베이어벨트에 흘려보내며 한 줄로 처리하는 방식! 첫 연습은 정수들을 모두 <b>더하기</b>예요.<span class="goal">🎯 모든 수의 합!</span>',
 cuts:[{who:'teach',nm:'🧑‍🏫 알고 선생님',say:'문자열을 잘라 <code>mapToInt</code>로 int 스트림을 만들고 <code>sum()</code>으로 합쳐요.',why:'왜 <b>mapToInt(IntStream)</b>? 일반 Stream&lt;Integer&gt;는 매번 int↔Integer 변환(오토박싱)이 생겨 낭비예요. <b>원시형 int 스트림</b>을 쓰면 그 낭비가 없고 sum()·average() 같은 편의 메서드도 바로 써서 깔끔해요.',cap:'전체 코드',code:'int 합계 = Arrays.stream(입력.readLine().split(" "))\n        .mapToInt(Integer::parseInt)   // 문자열 → int 스트림\n        .sum();\nSystem.out.println(합계);'}]},
9002:{title:'🌊 스트림: 짝수 개수',sub:'filter + count — 9002',
 bg:'🌊 조건에 맞는 것만 <b>거르고(filter)</b> <b>개수를 세요(count)</b>. 여기선 짝수만!<span class="goal">🎯 짝수의 개수!</span>',
 cuts:[{who:'teach',nm:'🧑‍🏫 알고 선생님',say:'<code>filter</code>로 짝수만 통과시키고 <code>count()</code>로 세요.',why:'왜 <b>filter/count</b>? "변환(map)"과 "거르기(filter)"를 헷갈리기 쉬운데, filter는 <b>조건이 참인 것만 남기는</b> 필터예요. count()의 결과가 <b>long</b>인 이유는 데이터가 아주 많아도 셀 수 있게 하기 위함!',cap:'전체 코드',code:'long 짝수개수 = Arrays.stream(입력.readLine().split(" "))\n         .mapToInt(Integer::parseInt)\n         .filter(수 -> 수 % 2 == 0)   // 짝수만 남김\n         .count();\nSystem.out.println(짝수개수);'}]},
9003:{title:'🌊 스트림: 최댓값',sub:'max (OptionalInt) — 9003',
 bg:'🌊 정수 중 <b>가장 큰 값</b>을 스트림으로 구해요.<span class="goal">🎯 최댓값!</span>',
 cuts:[{who:'teach',nm:'🧑‍🏫 알고 선생님',say:'<code>max()</code>로 최댓값을 구하고 <code>getAsInt()</code>로 꺼내요.',why:'왜 <b>OptionalInt</b>로 나올까? 스트림이 <b>비어 있을 수도</b> 있어서, "값이 없을 수도 있음"을 Optional로 감싸 알려줘요. 값이 확실히 있을 땐 getAsInt()로 꺼내면 돼요(min()도 똑같음).',cap:'전체 코드',code:'int 최댓값 = Arrays.stream(입력.readLine().split(" "))\n        .mapToInt(Integer::parseInt)\n        .max()          // OptionalInt\n        .getAsInt();\nSystem.out.println(최댓값);'}]},
9004:{title:'🌊 스트림: 평균',sub:'average (OptionalDouble) — 9004',
 bg:'🌊 정수들의 <b>평균</b>을 스트림 한 줄로 구해요.<span class="goal">🎯 평균 출력!</span>',
 cuts:[{who:'teach',nm:'🧑‍🏫 알고 선생님',say:'<code>average()</code> 한 방! 합과 개수를 직접 안 구해도 돼요.',why:'왜 <b>OptionalDouble</b>? 빈 스트림이면 평균이 정의되지 않아서 Optional로 감싸요. average()가 <b>합과 개수를 내부에서 알아서</b> 처리해주니, 우리가 따로 나눗셈을 짤 필요가 없어 실수도 줄어요.',cap:'전체 코드',code:'double 평균 = Arrays.stream(입력.readLine().split(" "))\n           .mapToInt(Integer::parseInt)\n           .average()        // OptionalDouble\n           .getAsDouble();\nSystem.out.println(평균);'}]},
9005:{title:'🌊 스트림: 각 수 제곱',sub:'map — 9005',
 bg:'🌊 각 수를 <b>제곱</b>해서 출력해요. 원소를 하나하나 <b>변환(map)</b>하는 연습!<span class="goal">🎯 각 수의 제곱을 공백으로!</span>',
 cuts:[{who:'teach',nm:'🧑‍🏫 알고 선생님',say:'<code>map</code>으로 각 원소를 제곱하고, 문자열로 바꿔 <code>joining</code>으로 이어 붙여요.',why:'왜 <b>map</b>? map은 각 원소를 <b>1:1로 변환</b>하는 연산이에요(제곱·대문자화 등). filter가 "거르기"라면 map은 "바꾸기". 출력하려면 int를 String으로 바꿔(mapToObj) 이어 붙여야 해요.',cap:'전체 코드',code:'String 결과 = Arrays.stream(입력.readLine().split(" "))\n              .mapToInt(Integer::parseInt)\n              .map(수 -> 수 * 수)            // 각 수 제곱\n              .mapToObj(String::valueOf)\n              .collect(Collectors.joining(" "));\nSystem.out.println(결과);'}]},
9006:{title:'🌊 스트림: 내림차순 정렬',sub:'sorted(reverseOrder) — 9006',
 bg:'🌊 수들을 <b>큰 것부터</b> 정렬해 출력해요.<span class="goal">🎯 내림차순 정렬!</span>',
 cuts:[{who:'teach',nm:'🧑‍🏫 알고 선생님',say:'<code>boxed()</code>로 Integer 스트림을 만든 뒤 <code>sorted(Comparator.reverseOrder())</code>!',why:'왜 <b>boxed()</b>가 필요? 원시형 IntStream엔 "역순 정렬자"가 없어요(오름차순 sorted만 있음). 그래서 <b>Stream&lt;Integer&gt;로 바꿔야</b> Comparator.reverseOrder()를 쓸 수 있어요. 오름차순이면 그냥 sorted()로 충분!',cap:'전체 코드',code:'String 결과 = Arrays.stream(입력.readLine().split(" "))\n              .map(Integer::parseInt)              // Stream&lt;Integer&gt;\n              .sorted(Comparator.reverseOrder())   // 내림차순\n              .map(String::valueOf)\n              .collect(Collectors.joining(" "));\nSystem.out.println(결과);'}]},
9007:{title:'🌊 스트림: 모두 양수?',sub:'allMatch — 9007',
 bg:'🌊 수가 <b>모두 양수</b>면 YES, 아니면 NO!<span class="goal">🎯 YES 또는 NO!</span>',
 cuts:[{who:'teach',nm:'🧑‍🏫 알고 선생님',say:'<code>allMatch(조건)</code> — 모두 조건을 만족하면 true!',why:'왜 <b>allMatch</b>? "전부", "하나라도", "하나도 아님"은 각각 allMatch·anyMatch·noneMatch예요. 게다가 이들은 결과가 정해지는 <b>순간 즉시 멈춰요</b>(short-circuit) — 양수가 아닌 게 하나라도 나오면 나머진 안 보고 false! 그래서 빠릅니다.',cap:'전체 코드',code:'boolean 모두양수 = Arrays.stream(입력.readLine().split(" "))\n               .mapToInt(Integer::parseInt)\n               .allMatch(수 -> 수 > 0);   // 모두 양수?\nSystem.out.println(모두양수 ? "YES" : "NO");'}]},
9008:{title:'🌊 스트림: 중복 제거 정렬',sub:'distinct + sorted — 9008',
 bg:'🌊 중복을 없애고 <b>오름차순</b>으로 출력해요.<span class="goal">🎯 중복 제거 후 정렬!</span>',
 cuts:[{who:'teach',nm:'🧑‍🏫 알고 선생님',say:'<code>distinct()</code>로 중복을 없애고 <code>sorted()</code>로 정렬 — 두 연산을 이어 붙이면 끝!',why:'왜 스트림이 좋을까? "중복 제거 + 정렬"처럼 여러 단계를 <b>파이프라인으로 자연스럽게 연결</b>할 수 있어서예요. distinct()가 equals 기준으로 중복을 걸러주니, 직접 Set·정렬 코드를 짤 필요 없이 한 줄로 표현돼요.',cap:'전체 코드',code:'String 결과 = Arrays.stream(입력.readLine().split(" "))\n              .mapToInt(Integer::parseInt)\n              .distinct()    // 중복 제거\n              .sorted()      // 오름차순\n              .mapToObj(String::valueOf)\n              .collect(Collectors.joining(" "));\nSystem.out.println(결과);'}]},
9009:{title:'🌊 스트림: 단어 잇기',sub:'Collectors.joining — 9009',
 bg:'🌊 단어들을 <b>콤마로 이어</b> 붙여요.<span class="goal">🎯 콤마로 연결된 문자열!</span>',
 cuts:[{who:'teach',nm:'🧑‍🏫 알고 선생님',say:'<code>Collectors.joining(",")</code>로 문자열 스트림을 하나로 합쳐요.',why:'왜 <b>joining</b>? 반복문으로 이어 붙이면 마지막 구분자 처리가 번거로워요(끝에 콤마가 붙는 실수!). joining은 <b>구분자·접두사·접미사</b>까지 한 번에 처리해줘서(예: joining(",","[","]")) 깔끔하고 안전해요.',cap:'전체 코드',code:'String 이어붙인단어 = Arrays.stream(입력.readLine().split(" "))\n              .collect(Collectors.joining(","));   // 콤마로 연결\nSystem.out.println(이어붙인단어);'}]},
9010:{title:'🌊 스트림: 단어 빈도수',sub:'groupingBy + counting — 9010',
 bg:'🌊 단어별 <b>등장 횟수</b>를 사전순으로 출력해요.<span class="goal">🎯 "단어 횟수" 사전순!</span>',
 cuts:[{who:'teach',nm:'🧑‍🏫 알고 선생님',say:'<code>groupingBy(단어, counting())</code>로 같은 단어끼리 묶어 개수를 세요. <b>TreeMap</b>으로 모으면 자동 사전순!',why:'왜 <b>groupingBy + counting</b>? "같은 값끼리 묶어 집계"는 빈도수 문제의 단골이에요. 직접 HashMap에 넣고 개수를 세는 코드를, 이 조합으로 <b>한 줄</b>에 표현할 수 있어요. TreeMap으로 모으면 키가 정렬돼 사전순 출력도 공짜!',cap:'전체 코드',code:'Map&lt;String, Long&gt; 단어별횟수 = Arrays.stream(입력.readLine().split(" "))\n    .collect(Collectors.groupingBy(단어 -> 단어, TreeMap::new, Collectors.counting()));\nStringBuilder 출력 = new StringBuilder();\n단어별횟수.forEach((단어, 횟수) -> 출력.append(단어).append(\' \').append(횟수).append(\'\\n\'));\nSystem.out.print(출력);'}]},
8001:{title:'📈 1회 매매 최대 수익',sub:'한 번 사서 한 번 팔기 — 8001 (투포인터)',
 bg:'💹 하루하루의 주가가 주어져요. <b>한 번 사서 나중에 한 번 팔 때</b>(매수일 &lt; 매도일) 얻는 <b>최대 수익</b>은? (손해뿐이면 0)<span class="goal">🎯 최대 차익!</span>',
 cuts:[{who:'teach',nm:'🧑‍🏫 알고 선생님',say:'왼쪽부터 훑으며 <b>지금까지의 최저가</b>를 기억하고, "오늘 팔면 얼마?"(오늘가−최저가)의 최댓값을 추적해요.',why:'왜 <b>최저가만 들고</b> 한 번 훑을까? 모든 (매수, 매도) 쌍을 다 비교하면 O(N²)로 느려요. 하지만 "오늘 최대 수익"은 <b>오늘 이전의 최저가</b>에만 달려 있어요. 그래서 최저가 하나만 갱신하며 지나가면 <b>O(N)</b>에 끝나요!',viz:{t:'array',title:'📦 주가 배열 — 왼쪽부터 하루씩',vals:[7,1,5,3,6,4],idx:true,note:'왼쪽부터 훑으며 <b>지금까지 최저가</b>를 기억 → 오늘가−최저가의 최댓값! (1에 사서 6에 팔면 5)'},cap:'전체 코드',code:'int 지금까지최저가 = 주가[0], 최대수익 = 0;\nfor (int i=1; i&lt;일수; i++) {\n    최대수익 = Math.max(최대수익, 주가[i] - 지금까지최저가);  // 오늘 팔 때 수익\n    지금까지최저가 = Math.min(지금까지최저가, 주가[i]);      // 최저가 갱신\n}\nSystem.out.println(최대수익);'}]},
8002:{title:'📉 주가 유지 시간',sub:'가격이 안 떨어진 시간 — 8002 (단조 스택)',
 bg:'🕒 매 시점의 주가가 주어져요. 각 시점에서 <b>가격이 떨어지지 않고 유지된 시간</b>(초)을 구해요. 끝까지 안 떨어지면 남은 시간!<span class="goal">🎯 각 시점의 유지 시간!</span>',
 cuts:[{who:'teach',nm:'🧑‍🏫 알고 선생님',say:'<b>단조 스택</b>에 시점 인덱스를 쌓아요. 현재 가격이 스택 맨 위보다 <b>낮아지면</b> pop하며 "지금 − 그때"를 유지 시간으로 기록!',why:'왜 <b>스택</b>일까? "가격이 처음으로 떨어지는 순간"을 각 시점마다 알아야 하는데, 매번 뒤를 훑으면 O(N²)예요. 스택에 "아직 안 떨어진 시점들"만 담아두면, 각 시점은 <b>한 번 push·한 번 pop</b>만 하므로 전체 O(N)! 이게 단조 스택의 힘이에요.',cap:'전체 코드',code:'Deque&lt;Integer&gt; 대기시점스택 = new ArrayDeque&lt;&gt;();   // 아직 안 떨어진 시점의 인덱스\nfor (int i=0; i&lt;일수; i++) {\n    while (!대기시점스택.isEmpty() && 주가[대기시점스택.peek()] > 주가[i]) {\n        int 떨어진시점 = 대기시점스택.pop();\n        유지시간[떨어진시점] = i - 떨어진시점;   // i에서 떨어짐\n    }\n    대기시점스택.push(i);\n}\nwhile (!대기시점스택.isEmpty()) {   // 끝까지 안 떨어진 시점\n    int 남은시점 = 대기시점스택.pop();\n    유지시간[남은시점] = 일수 - 1 - 남은시점;\n}'}]},
8003:{title:'🏆 수익률 Top-K',sub:'상위 K개 뽑기 — 8003 (우선순위큐)',
 bg:'🥇 N개 종목의 수익률이 주어져요. 수익률이 높은 <b>상위 K개</b>를 내림차순으로 출력해요.<span class="goal">🎯 Top-K 수익률!</span>',
 cuts:[{who:'teach',nm:'🧑‍🏫 알고 선생님',say:'모든 수익률을 <b>최대 힙</b>에 넣고 <b>K번 poll</b>하면 큰 순서대로 K개가 나와요!',why:'왜 <b>힙</b>? 전체를 정렬(O(N log N))해도 되지만, "상위 K개만" 필요할 땐 힙이 깔끔해요. 특히 K가 작으면 크기 K짜리 힙을 유지해 <b>메모리·시간을 아낄</b> 수도 있어요. "우선순위대로 꺼내기"가 필요하면 힙을 떠올리세요!',cap:'전체 코드',code:'PriorityQueue&lt;Integer&gt; 수익률최대힙 = new PriorityQueue&lt;&gt;(Collections.reverseOrder());\nfor (int i=0; i&lt;종목수; i++) 수익률최대힙.add(수익률[i]);\nStringBuilder 출력 = new StringBuilder();\nfor (int i=0; i&lt;뽑을개수K; i++) 출력.append(수익률최대힙.poll()).append(\' \');  // 큰 것부터\nSystem.out.println(출력.toString().trim());'}]},
8004:{title:'📊 실시간 중앙 주가',sub:'스트리밍 중앙값 — 8004 (두 힙)',
 bg:'📡 주가가 하루씩 들어올 때마다, <b>지금까지 들어온 값들의 중앙값</b>을 출력해요.<span class="goal">🎯 매 시점의 중앙값!</span>',
 cuts:[{who:'teach',nm:'🧑‍🏫 알고 선생님',say:'<b>아래 절반은 최대 힙, 위 절반은 최소 힙</b>에 나눠 담고 크기를 ±1로 맞춰요. 그럼 중앙값은 항상 아래 힙의 꼭대기!',why:'왜 <b>힙을 두 개</b>? 매번 전체를 정렬하면 값이 들어올 때마다 O(N log N)로 느려요. "가운데"만 알면 되니, 작은 값들과 큰 값들을 <b>두 힙으로 갈라</b> 경계(중앙값)만 관리하면 <b>삽입이 O(log N)</b>! 두 힙의 크기 균형이 곧 "가운데"를 가리키는 트릭이에요.',cap:'전체 코드',code:'PriorityQueue&lt;Integer&gt; 아래절반최대힙 = new PriorityQueue&lt;&gt;(Collections.reverseOrder());\nPriorityQueue&lt;Integer&gt; 위절반최소힙 = new PriorityQueue&lt;&gt;();\nfor (int i=0; i&lt;일수; i++) {\n    int 오늘주가 = 입력값;\n    if (아래절반최대힙.isEmpty() || 오늘주가 &lt;= 아래절반최대힙.peek()) 아래절반최대힙.add(오늘주가);\n    else 위절반최소힙.add(오늘주가);\n    if (아래절반최대힙.size() > 위절반최소힙.size()+1) 위절반최소힙.add(아래절반최대힙.poll());\n    else if (위절반최소힙.size() > 아래절반최대힙.size()) 아래절반최대힙.add(위절반최소힙.poll());\n    출력.append(아래절반최대힙.peek()).append(\'\\n\');   // 중앙값\n}'}]},
8005:{title:'💼 예산 내 최대 수익',sub:'0/1 배낭 완전탐색 — 8005',
 bg:'🛒 종목마다 가격과 기대수익이 있어요. <b>예산 B 이하</b>로 종목을 골라(각 최대 1개) 기대수익 합을 <b>최대</b>로!<span class="goal">🎯 예산 내 최대 기대수익!</span>',
 cuts:[{who:'teach',nm:'🧑‍🏫 알고 선생님',say:'N이 작으면 <b>모든 부분집합</b>(고른다/안 고른다)을 <b>비트마스크</b>로 다 만들어 보고, 예산 이내 중 최댓값을 취해요.',why:'왜 <b>비트마스크</b>로 다 해볼까? "고르거나 말거나"가 종목마다 2가지라 전체 경우가 2^N개예요. N이 작을 땐(≈20 이하) 이걸 <b>0~2^N−1 정수의 비트</b>로 깔끔하게 표현해 전부 시도할 수 있어요. i번째 비트가 1이면 "i번 종목 포함"! (N이 크면 DP가 필요해요.)',cap:'전체 코드',code:'int 최대수익 = 0;\nfor (int 조합=0; 조합 &lt; (1 &lt;&lt; 종목수); 조합++) {   // 모든 부분집합\n    int 가격합=0, 수익합=0;\n    for (int i=0; i&lt;종목수; i++)\n        if ((조합 & (1 &lt;&lt; i)) != 0) { 가격합 += 가격[i]; 수익합 += 기대수익[i]; }\n    if (가격합 &lt;= 예산) 최대수익 = Math.max(최대수익, 수익합);\n}\nSystem.out.println(최대수익);'}]},
8006:{title:'🧺 포트폴리오 조합',sub:'K개 조합 생성 — 8006 (백트래킹)',
 bg:'📋 종목 1~N 중 <b>정확히 K개</b>를 골라 만들 수 있는 모든 포트폴리오(조합)를 사전순으로 출력해요.<span class="goal">🎯 가능한 모든 K개 조합!</span>',
 cuts:[{who:'teach',nm:'🧑‍🏫 알고 선생님',say:'<b>백트래킹</b>! 시작 번호부터 하나 고르고, 다음은 <b>그 다음 번호부터</b> 골라 K개를 채우면 한 조합 완성.',why:'왜 다음을 <b>번호+1부터</b>? 조합은 순서가 없어요({1,2}=={2,1}). 항상 "이전에 고른 것보다 큰 번호"만 고르게 하면, 같은 조합을 순서만 바꿔 중복 생성하는 걸 <b>원천 차단</b>하고 사전순으로도 자동 정렬돼요.',cap:'전체 코드',code:'static void 조합만들기(int 시작번호, int 고른개수) {\n    if (고른개수 == 뽑을개수K) {\n        for (int 종목 : 고른종목) 출력.append(종목).append(\' \');\n        출력.append(\'\\n\'); return;\n    }\n    for (int 번호=시작번호; 번호&lt;=종목수; 번호++) {\n        고른종목[고른개수] = 번호;\n        조합만들기(번호+1, 고른개수+1);   // 다음은 번호+1부터\n    }\n}'}]},
8007:{title:'📈 연속 최대 손익',sub:'최대 연속 부분합 — 8007 (카데인)',
 bg:'💵 날마다의 손익(+이익/−손실)이 주어져요. <b>연속한 기간</b>의 손익 합이 <b>최대</b>가 되는 값은? (최소 하루 포함)<span class="goal">🎯 최대 연속 손익 합!</span>',
 cuts:[{who:'teach',nm:'🧑‍🏫 알고 선생님',say:'<b>카데인 알고리즘</b>! "여기서 끝나는 최대 합"을 —오늘부터 새로 시작 vs 어제까지에 오늘 더하기— 중 큰 쪽으로 갱신해요.',why:'왜 누적이 음수면 <b>버릴까</b>? 지금까지의 합이 마이너스라면, 그걸 뒤에 붙이는 건 <b>오히려 손해</b>예요. 차라리 오늘부터 새로 시작하는 게 나아요. 이 판단을 매 칸에서 하면 모든 구간을 다 볼 필요 없이 <b>O(N)</b>에 최대 연속합이 나와요!',cap:'전체 코드',code:'int 여기서끝나는최대 = 0, 전체최대 = Integer.MIN_VALUE;\nfor (int i=0; i&lt;일수; i++) {\n    int 오늘손익 = 손익[i];\n    여기서끝나는최대 = Math.max(오늘손익, 여기서끝나는최대 + 오늘손익);  // 새로 시작 vs 이어가기\n    전체최대 = Math.max(전체최대, 여기서끝나는최대);\n}\nSystem.out.println(전체최대);'}]},
8008:{title:'🎯 목표 금액 만들기',sub:'조합 합 = T 경우의 수 — 8008 (백트래킹)',
 bg:'🪙 금액 단위들을 (중복 사용 허용) 더해 <b>정확히 목표 금액 T</b>를 만드는 경우의 수는? (순서 다른 건 같은 것)<span class="goal">🎯 경우의 수!</span>',
 cuts:[{who:'teach',nm:'🧑‍🏫 알고 선생님',say:'각 단위에서 <b>더 쓰거나 / 다음 단위로 넘어가거나</b> 두 갈래로 재귀! 합이 T면 +1, 넘치거나 단위가 끝나면 멈춰요.',why:'왜 "넘어갈 땐 <b>다음 단위부터</b>"? 순서가 다른 걸 같게 보려면(1+2 = 2+1), 단위를 <b>정한 순서로만</b> 써야 해요. "현재 단위를 더 쓸지"는 제자리에서, "그만 쓸지"는 다음 단위로 넘어가며 재귀하면, 중복 없이 모든 <b>중복조합</b>을 정확히 셉니다.',cap:'전체 코드',code:'static void 경우세기(int 단위번호, int 현재합) {\n    if (현재합 == 목표금액) { 경우의수++; return; }\n    if (현재합 > 목표금액 || 단위번호 == 금액단위.length) return;\n    경우세기(단위번호, 현재합 + 금액단위[단위번호]);   // 현재 단위 더 쓰기\n    경우세기(단위번호 + 1, 현재합);                    // 다음 단위로\n}'}]},
8009:{title:'📉 N일 이동평균선',sub:'슬라이딩 윈도우 — 8009',
 bg:'📊 주가와 창 크기 K가 주어져요. <b>K일 이동평균</b>(직전 K일 평균)을 K일째부터 순서대로 구해요.<span class="goal">🎯 이동평균들!</span>',
 cuts:[{who:'teach',nm:'🧑‍🏫 알고 선생님',say:'<b>슬라이딩 윈도우</b>! 창이 한 칸 옮겨갈 때 <b>새로 들어온 값은 더하고, 빠지는 값은 빼요</b>. 매번 K개를 다시 안 더해도 돼요.',why:'왜 <b>빠지는 값만</b> 뺄까? 매 위치에서 K개를 새로 더하면 O(N·K)로 느려요. 그런데 창이 한 칸 이동하면 <b>딱 하나 들어오고 하나 빠질</b> 뿐이에요. 그 차이만 반영하면 합을 O(1)에 갱신 → 전체 <b>O(N)</b>! 연속 구간 합의 단골 기법이에요.',viz:{t:'array',title:'📦 주가 배열 — 창(K=3)이 오른쪽으로 미끄러짐',vals:[1,2,3,4,5],idx:true,note:'창 [1,2,3] → [2,3,4] → [3,4,5]. 옮길 때 <b>새 값 더하고 빠지는 값 빼기</b>만!'},cap:'전체 코드',code:'int 창안합계 = 0;\nfor (int i=0; i&lt;일수; i++) {\n    창안합계 += 주가[i];\n    if (i &gt;= 창크기K) 창안합계 -= 주가[i - 창크기K];   // 창 밖으로 빠지는 값\n    if (i &gt;= 창크기K - 1) 출력.append((double)창안합계 / 창크기K).append(\' \');\n}'}]},
8010:{title:'🧾 매매 일지 시뮬',sub:'평단가 + 실현손익 — 8010',
 bg:'💰 매수(BUY 단가 수량)·매도(SELL 단가 수량) 명령이 순서대로 와요. 매수 시 <b>평단가</b>를 갱신하고, 매도 시 <b>(매도가−평단가)×수량</b>을 실현손익에 더해요.<span class="goal">🎯 최종 실현 손익!</span>',
 cuts:[{who:'teach',nm:'🧑‍🏫 알고 선생님',say:'보유수량과 매입원가 합을 들고 다녀요. 평단가 = <b>원가합 ÷ 수량</b>(가중평균). 매도 때 그 평단가로 손익을 계산!',why:'왜 <b>가중평균</b>일까? 100원에 10주, 120원에 10주 샀다면 평균 매입가는 단순히 (100+120)/2가 아니라 <b>수량까지 반영</b>한 (100·10+120·10)/20 = 110원이에요. 그래서 "원가 합 ÷ 총 수량"으로 평단가를 구해야 실현손익이 정확해요.',cap:'전체 코드',code:'long 보유수량=0, 매입원가합=0, 실현손익=0;\nwhile (명령수-- &gt; 0) {\n    String 명령 = 토큰.nextToken();\n    long 단가 = Long.parseLong(토큰.nextToken()), 수량 = Long.parseLong(토큰.nextToken());\n    if (명령.equals("BUY")) {\n        보유수량 += 수량; 매입원가합 += 단가 * 수량;\n    } else {  // SELL\n        long 평단가 = 매입원가합 / 보유수량;\n        실현손익 += (단가 - 평단가) * 수량;\n        보유수량 -= 수량; 매입원가합 -= 평단가 * 수량;\n    }\n}\nSystem.out.println(실현손익);'}]},

    for(var l=0;l<L;l++){state[l]=[];dist[l]=[];for(var r=0;r<H;r++){state[l][r]=[];dist[l][r]=[];for(var c=0;c<W;c++){var v=layers[l][r][c];state[l][r][c]=v;dist[l][r][c]=v===1?0:null;if(v===1)front.push([l,r,c]);}}}
    B.st.textContent='';B.play.classList.remove('on');B.play.textContent='▶ 재생';simHL(root,['ctx']);renderDist();}
  function renderDist(){ for(var l=0;l<L;l++)for(var r=0;r<H;r++)for(var c=0;c<W;c++){var el=cells[l][r][c];el.className='sim-cell';el.style.background='';el.textContent='';var v=state[l][r][c];if(v===-1){el.classList.add('w');el.textContent='×';}else if(v===1){el.style.background='hsl(6 74% '+Math.max(38,58-dist[l][r][c]*2.4)+'%)';el.textContent=dist[l][r][c];}else el.classList.add('g');}
    B.d.textContent=day; B.q.textContent=front.length?front.length+'칸':'(빈큐)'; }
  function distStep(){ if(done)return; if(front.length===0){distDone();return;} simHL(root,['loop','poll','spread','set','day','add']); var nx=spreadOnce(); day++; front=nx; renderDist(); if(nx.length===0)distDone(); }
  function spreadOnce(){ var out=[]; for(var i=0;i<front.length;i++){ var p=front[i]; for(var j=0;j<dirs.length;j++){ var nl=p[0]+(cfg.dirs===6?dirs[j][0]:0), nr=p[1]+dirs[j][1], nc=p[2]+dirs[j][2]; if(nl>=0&&nl<L&&nr>=0&&nr<H&&nc>=0&&nc<W&&state[nl][nr][nc]===0){ state[nl][nr][nc]=1; dist[nl][nr][nc]=day+1; out.push([nl,nr,nc]); } } } return out; }
  function distDone(){ done=true;stop();B.play.classList.remove('on');B.play.textContent='▶ 재생';simHL(root,['ans']); var left=false,mx=0; for(var l=0;l<L;l++)for(var r=0;r<H;r++)for(var c=0;c<W;c++){if(state[l][r][c]===0)left=true;if(state[l][r][c]===1&&dist[l][r][c]>mx)mx=dist[l][r][c];} if(left){B.st.textContent='못 익은 칸 남음 → 정답 -1';B.st.style.color='#f85149';}else{B.st.textContent='모두 익음 → 정답 '+mx;B.st.style.color='#3fb950';} }

  function renderFlood(){ for(var r=0;r<H;r++)for(var c=0;c<W;c++){var el=cells[0][r][c];el.className='sim-cell';el.style.background='';el.textContent=cfg.chars?eff(0,r,c):'';var g=state[r][c];if(g>0){el.style.background=palette[(g-1)%palette.length];el.style.color='#0b0f15';}else{ if(cfg.chars){el.style.background='#233';}else if(layers[0][r][c]===cfg.target){el.classList.add('g');}else{el.classList.add('w');} }}

function seqSim(root,cfg){
  var B=simBtns(root), wrap=root.querySelector('.sim-grid');
  wrap.style.display='flex'; wrap.style.gap='6px'; wrap.style.minHeight='38px'; wrap.style.alignItems='center'; wrap.style.flexWrap='wrap'; wrap.style.justifyContent='center';
  var S=cfg.struct, ops=cfg.ops, arr, idx, timer, done, lastOut;
  function stop(){if(timer){clearInterval(timer);timer=null;}}
  function cmp(a,b){ if(S==='heapAbs'){var aa=Math.abs(a),ab=Math.abs(b);return aa!==ab?aa-ab:a-b;} return a-b; }
  function insertSorted(v){ var i=0; while(i<arr.length&&cmp(arr[i],v)<0)i++; arr.splice(i,0,v); return i; }
  function render(hi){ wrap.innerHTML=''; if(arr.length===0){var e=document.createElement('span');e.textContent='(비어 있음)';e.style.color='#6e7681';e.style.fontSize='.8rem';wrap.appendChild(e);}else{arr.forEach(function(v,i){var d=document.createElement('div');d.className='sim-cell';d.textContent=v;d.style.width='auto';d.style.minWidth='30px';d.style.padding='0 8px';d.style.background=i===hi?'#e3b341':'#1f6feb';d.style.color='#fff';wrap.appendChild(d);});}
    B.d.textContent=idx; B.q.textContent=lastOut||'—'; }
  function reset(){ stop();done=false;arr=[];idx=0;lastOut='';B.st.textContent='';B.play.classList.remove('on');B.play.textContent='▶ 재생';if(cfg.initKey)simHL(root,[cfg.initKey]);render(-1); }
  function doOp(op){ var t=op[0], v=op.length>1&&typeof op[1]==='number'?op[1]:null, o=null, hi=-1;
    if(cfg.keys&&cfg.keys[t])simHL(root,[cfg.keys[t]]);
    if(t==='push'||t==='pushb'){arr.push(v);hi=arr.length-1;}
    else if(t==='pushf'){arr.unshift(v);hi=0;}
    else if(t==='add'){hi=insertSorted(v);}
    else if(t==='pop'){o=arr.length?arr.pop():-1;}
    else if(t==='popfirst'){o=arr.length?arr.shift():-1;}
    else if(t==='poplast'){o=arr.length?arr.pop():-1;}
    else if(t==='popmin'){o=arr.length?arr.shift():0;}
    else if(t==='popmax'){o=arr.length?arr.pop():0;}
    else if(t==='top'){o=arr.length?arr[arr.length-1]:-1;hi=arr.length-1;}
    else if(t==='front'){o=arr.length?arr[0]:-1;hi=0;}
    else if(t==='back'){o=arr.length?arr[arr.length-1]:-1;hi=arr.length-1;}
    else if(t==='size'){o=arr.length;}
    else if(t==='empty'){o=arr.length?0:1;}
    var label=op[op.length-1]; if(typeof label!=='string')label=t+(v!=null?' '+v:'');

  function finish(){ done=true;stop();B.play.classList.remove('on');B.play.textContent='▶ 재생';if(cfg.ansKey)simHL(root,[cfg.ansKey]);B.st.textContent=cfg.result||'끝!';B.st.style.color='#3fb950'; }
  function play(){ if(done)reset(); if(timer){stop();B.play.classList.remove('on');B.play.textContent='▶ 재생';return;} B.play.classList.add('on');B.play.textContent='⏸ 정지';timer=setInterval(step,900); }
  B.play.addEventListener('click',play);
  B.step.addEventListener('click',function(){if(done)return;stop();B.play.classList.remove('on');B.play.textContent='▶ 재생';step();});
  B.reset.addEventListener('click',reset);
  reset();
}

    wsp.style.transform='rotate(0deg)'; cntEl.textContent='0'; B.st.textContent=''; act.textContent='▶ 재생/다음을 눌러 관람차를 돌려보세요!'; B.play.classList.remove('on'); B.play.textContent='▶ 재생'; simHL(root,['scan']); render(null,null); }

    var cur=queue.shift(); var added=[], chk=[];

    if(queue.length===0){ if(cfg.mode==='components'){ var s=nextComponentStart(); if(s===0){finish();return;} comp++; queue=[s]; visited[s]=true; color(s,'vis'); simHL(root,['find']); B.d.textContent=comp; renderQ(); return; } finish(); return; }
    simHL(root, cfg.mode==='components'?['find']:(mode==='dfs'?['visit','nb']:['loop','poll','nb']));

    color(cur,'cur'); setTimeout(function(){if(!done)color(cur,'vis');},400);
    adj[cur].forEach(function(nb){ if(!visited[nb]){ visited[nb]=true; if(cfg.count)count++; if(mode==='dfs')queue.push(nb); else queue.push(nb); } });
    B.d.textContent = cfg.count?count:(cfg.mode==='components'?comp:order.length);

  function finish(){ done=true;stop();B.play.classList.remove('on');B.play.textContent='▶ 재생';simHL(root,['ans']);
    if(cfg.count){B.st.textContent='감염 = '+count+'대 (1번 제외)';}

    B.st.style.color='#3fb950'; }

  if(dfsB){dfsB.addEventListener('click',function(){setMode('dfs');});bfsB.addEventListener('click',function(){setMode('bfs');});bfsB.classList.add('on');}
  function play(){ if(done)reset(); if(timer){stop();B.play.classList.remove('on');B.play.textContent='▶ 재생';return;} B.play.classList.add('on');B.play.textContent='⏸ 정지'; timer=setInterval(step,650); }

  B.reset.addEventListener('click',reset);
  reset();
}

function jumpSim(root,cfg){

// 비개발자 설명을 [요약 + 단계 + 참고]로 렌더
function renderBeginner(text) {
  if (!text) return '';
  let html = '<div class="beginner-title">🔰 비개발자도 이해하는 코드 설명</div>';
  text.split('\n').map(s => s.trim()).filter(Boolean).forEach(part => {
    if (/^\(/.test(part)) { html += `<div class="bg-note">${escHtml(part)}</div>`; return; }
    if (/[①②③④⑤]/.test(part)) {
      const steps = part.split(/(?=[①②③④⑤])/).map(s => s.replace(/^[①②③④⑤]\s*/, '').replace(/\s*→\s*$/, '').trim()).filter(Boolean);
      html += '<ol class="bg-steps">' + steps.map(s => `<li>${escHtml(s)}</li>`).join('') + '</ol>';
    } else {
      html += `<div class="bg-lead">${escHtml(part)}</div>`;
    }
  });
  return html;
}

function fmtCode(c) {

// 값마다 고유 색 (같은 값 = 같은 색)
function valHue(v) { let n = 0, s = String(v); for (const c of s) n = (n * 31 + c.charCodeAt(0)) >>> 0; return n % 360; }
function cellHtml(v, hi, nx) {
  const hue = valHue(v);
  const style = `background:hsl(${hue} 78% 93%);border-color:hsl(${hue} 55% 70%);color:hsl(${hue} 50% 28%)`;
  return `<span class="tr-cell${hi ? ' hi' : ''}${nx ? ' nx' : ''}" style="${style}">${nx ? '<span class="nx-crown">👑</span>' : ''}${escHtml(String(v))}</span>`;
}

function renderCmp(c) {
  return `<div class="cmp-row"><span class="cmp-chip" style="background:hsl(${valHue(c.a)} 78% 93%)">${escHtml(String(c.a))}</span>`
    + `<span class="cmp-vs">⚖️ 비교</span>`
    + `<span class="cmp-chip" style="background:hsl(${valHue(c.b)} 78% 93%)">${escHtml(String(c.b))}</span>`
    + (c.note ? `<span class="cmp-note">${escHtml(c.note)}</span>` : '') + '</div>';
}
// 한 단계 카드
function renderStep(s, t) {
  let h = `<div class="fstep"><div class="fs-op">${escHtml(s.op)}</div>`;
  if (s.code) h += `<div class="fs-code">${fmtCode(s.code)}</div>`;
  if (s.cmp)  h += renderCmp(s.cmp);
  h += '<div class="fs-boxes">';
  if (s.rows) {
    h += `<div class="gt-grid" style="grid-template-columns:repeat(${s.rows[0].length},1fr)">`;
    s.rows.forEach(row => { for (const ch of row) h += `<span class="gt-cell ${GC[ch] || 'gc-empty'}"></span>`; });
    h += '</div>';
  } else if (s.box) {
    const op = s.op || '';
    if (/(?:push|넣기|add|쌓기)|^I\s/.test(op))      h += '<span class="fs-dir in">⬇ 넣기</span>';
    else if (/(?:pop|빼기|제거|삭제)|^D\s/.test(op)) h += '<span class="fs-dir out">⬆ 꺼내기</span>';
    const st = DS[t.struct];
    const noIdx = st ? st.no(s.box) : -1;
    const inner = s.box.length === 0 ? '<span class="tr-empty">🗑 비어 있음</span>'
      : s.box.map((v, i) => cellHtml(v, s.hi === i, noIdx === i)).join('');
    if (st) {
      h += `<div class="ds ${st.cls}"><div class="ds-head">${st.icon} <b>${escHtml(st.name)}</b></div><div class="ds-body">${inner}</div>`;
      if (noIdx >= 0) h += `<div class="ds-next">👑 다음에 나갈 값: <b>${escHtml(String(s.box[noIdx]))}</b></div>`;
      h += '</div>';
    } else h += inner;
  }
  h += '</div>';
  if (s.out != null) h += `<div class="tr-out">출력 ${escHtml(String(s.out))}</div>`;
  if (s.note)        h += `<div class="tr-note">${escHtml(s.note)}</div>`;
  return h + '</div>';
}
function renderTraceBox(t) {
  if (!t) return '';
  let h = `<div class="trace-title">🎬 코드 동작 따라가기<span class="trace-in">입력: ${escHtml(t.input || '')}</span></div>`;
  if (t.legend) h += `<div class="trace-legend">📌 ${escHtml(t.legend)}</div>`;
  h += '<div class="flow-steps">';
  let lf = -1, lt = -1;
  if (LOOP_IDS.has(t.id)) t.steps.forEach((s, i) => { if (!/^(입력|출력|결과)/.test(s.op || '')) { if (lf < 0) lf = i; lt = i; } });
  t.steps.forEach((s, i) => {
    if (i === lf) h += `<div class="loop-frame"><div class="loop-head">🔁 ${escHtml(t.loopLabel || '반복')}</div>`;
    h += renderStep(s, t);
    if (i === lt) h += '<div class="loop-back">↺ 다음 차례로 다시 반복</div></div>';
  });
  return h + '</div>';
}

11050:[{q:'C(N,K)를 분자·분모를 K번 곱하는 반복문으로 구하는 코드를 작성해 보세요.',hint:'분자는 n,n-1,... K개, 분모는 1,2,...,K(=K!).',code:'long 분자 = 1, 분모 = 1;\nfor (int i = 0; i < 뽑을개수; i++) {\n    분자 *= (전체개수 - i);   // 분자\n    분모 *= (i + 1);         // 분모 = k!\n}\nlong 결과 = 분자 / 분모;',explain:'팩토리얼을 따로 구하지 않고 K번만 곱해 분자·분모를 만든 뒤 나눕니다.'}],
6064:[{q:'x에서 M씩 더하며 (k-y)%N==0 인 해 k를 찾는 반복문을 작성해 보세요. (lcm 초과 시 -1)',hint:'후보 k는 x, x+M, x+2M ... lcm 까지.',code:'long 정답해 = -1;\nfor (long 해번호 = 목표x; 해번호 <= 최소공배수; 해번호 += 주기M) {\n    if ((해번호 - 목표y) % 주기N == 0) { 정답해 = 해번호; break; }\n}',explain:'x조건(M주기)을 만족하는 값 중 y조건(N주기)도 맞는 첫 k가 답. lcm까지 없으면 -1.'}],
10866:[{q:'N개의 명령을 한 줄씩 읽어 반복 처리하는 while 루프 골격을 작성해 보세요.',hint:'n번 반복하며 명령어 토큰을 읽어 분기.',code:'while (명령수-- > 0) {\n    StringTokenizer 토큰 = new StringTokenizer(입력.readLine());\n    String 명령 = 토큰.nextToken();\n    // 명령에 따라 push_front / pop_back 등 처리\n}',explain:'명령 처리 문제의 공통 골격입니다. n번 돌며 각 줄의 명령을 분기합니다.'}],
11866:[{q:'큐가 빌 때까지 앞 K-1명을 뒤로 보내고 K번째를 제거하는 반복문을 작성해 보세요.',hint:'q.add(q.poll())로 회전, 그다음 q.poll()로 제거.',code:'while (!사람큐.isEmpty()) {\n    for (int i = 0; i < 셀개수K - 1; i++) 사람큐.add(사람큐.poll()); // 앞 K-1명 회전\n    출력.append(사람큐.poll());                              // K번째 제거\n    if (!사람큐.isEmpty()) 출력.append(", ");\n}',explain:'큐의 회전(앞→뒤)으로 원형을 흉내 내고, K번째를 꺼내 기록합니다.'}],
1966:[{q:'맨 앞보다 더 중요한 문서가 남아 있으면 뒤로 보내고 아니면 인쇄하는 반복문을 작성해 보세요.',hint:'최대 우선순위는 maxPQ.peek()로 비교.',code:'int 인쇄순번 = 0;\nwhile (!대기큐.isEmpty()) {\n    int[] 현재문서 = 대기큐.poll();\n    if (현재문서[0] == 최대중요도힙.peek()) {     // 가장 중요한 문서\n        최대중요도힙.poll(); 인쇄순번++;\n        if (현재문서[1] == 목표위치) { 정답 = 인쇄순번; break; }\n    } else {\n        대기큐.add(현재문서);                   // 뒤로 보냄\n    }\n}',explain:'현재 문서가 최고 우선순위면 인쇄(인쇄순번++), 아니면 큐 뒤로 보냅니다.'}],
1620:[{q:'N개의 이름을 두 HashMap(이름→번호, 번호→이름)에 저장하는 반복문을 작성해 보세요.',hint:'1번부터 순서대로 양방향 저장.',code:'for (int 번호 = 1; 번호 <= 포켓몬수; 번호++) {\n    String 이름 = 입력.readLine().trim();\n    이름으로번호찾기.put(이름, 번호);\n    번호로이름찾기.put(번호, 이름);\n}',explain:'양방향 조회를 위해 두 맵에 동시에 넣어 두는 것이 핵심입니다.'}],
1764:[{q:'둘째 명단을 순회하며 HashSet에 있는 이름만 결과에 모으는 반복문을 작성해 보세요.',hint:'heard.contains(name)이면 교집합.',code:'for (int i = 0; i < 보도못한수; i++) {\n    String 이름 = 입력.readLine().trim();\n    if (듣도못한사람.contains(이름)) 교집합명단.add(이름);\n}',explain:'첫 명단을 Set에 넣어두면 둘째 명단을 한 번만 훑어 교집합을 O(M)에 구합니다.'}],
17219:[{q:'M개의 질문 사이트를 순회하며 Map에서 비밀번호를 찾아 출력하는 반복문을 작성해 보세요.',hint:'map.get(사이트).',code:'for (int i = 0; i < 질문수; i++)\n    출력.append(비밀번호장부.get(입력.readLine().trim())).append("\\n");',explain:'사이트→비밀번호 맵을 미리 만들어 두면 각 질문을 O(1)에 답합니다.'}],
2798:[{q:'카드 N장 중 3장을 고르는 3중 반복문으로 M 이하 최대 합을 구하는 코드를 작성해 보세요.',hint:'i<j<k 로 중복 없이 조합.',code:'for (int i = 0; i < 카드수; i++)\n  for (int j = i+1; j < 카드수; j++)\n    for (int k = j+1; k < 카드수; k++) {\n        int 세장합 = 카드숫자[i] + 카드숫자[j] + 카드숫자[k];\n        if (세장합 <= 한도) 최댓값 = Math.max(최댓값, 세장합);\n    }',explain:'모든 3장 조합을 완전탐색하며 M 이하 중 최댓값을 갱신합니다.'}],
2231:[{q:'1부터 N-1까지 각 m의 분해합(m + 자릿수 합)을 구해 N과 같은지 확인하는 반복문을 작성해 보세요.',hint:'안쪽 while로 자릿수 합.',code:'for (int 생성자후보 = 1; 생성자후보 < 목표N; 생성자후보++) {\n    int 분해합 = 생성자후보, 남은수 = 생성자후보;\n    while (남은수 > 0) { 분해합 += 남은수 % 10; 남은수 /= 10; }\n    if (분해합 == 목표N) { System.out.println(생성자후보); return; }\n}\nSystem.out.println(0);',explain:'가장 작은 생성자를 찾으려 1부터 올라가며 처음 맞는 값을 출력합니다.'}],
1018:[{q:'체스판 다시 칠하기를 "끝까지" 구현해 보세요. (스캔 루프 + 칠할칸세기 함수 전체)',hint:'각 8×8 위치에서 W시작 기준 다른 칸 수 cnt를 세고, B시작은 64-cnt. 둘 중 작은 값.',code:'// ① 모든 8×8 시작 위치를 훑으며 최솟값 갱신\nint 최소칠할칸 = Integer.MAX_VALUE;\nfor (int 시작행 = 0; 시작행 <= 세로 - 8; 시작행++)\n  for (int 시작열 = 0; 시작열 <= 가로 - 8; 시작열++) {\n      int 다른칸수 = 칠할칸세기(시작행, 시작열);\n      최소칠할칸 = Math.min(최소칠할칸, Math.min(다른칸수, 64 - 다른칸수));   // B시작 = 64-cnt\n  }\n\n// ② (시작행,시작열)에서 시작하는 8×8이 \'W시작 체스판\'과 다른 칸 수\nstatic int 칠할칸세기(int 시작행, int 시작열) {\n    int 다른칸수 = 0;\n    for (int i = 0; i < 8; i++)\n        for (int j = 0; j < 8; j++) {\n            char 기대색 = ((i + j) % 2 == 0) ? \'W\' : \'B\';\n            if (보드[시작행+i][시작열+j] != 기대색) 다른칸수++;\n        }\n    return 다른칸수;\n}',explain:'바깥 루프가 자를 위치를 고르고, 칠할칸세기가 그 8×8을 정답 체스판과 비교합니다. W시작 비용이 cnt면 B시작 비용은 64-cnt예요.'}],
2606:[{q:'1번에서 BFS로 감염되는 컴퓨터 수를 세는 반복문을 작성해 보세요.',hint:'큐에 넣을 때 방문 표시 + count++.',code:'int 감염수 = 0;\nQueue<Integer> 방문예정큐 = new LinkedList<>();\n방문예정큐.add(1); 방문여부[1] = true;\nwhile (!방문예정큐.isEmpty()) {\n    int 현재컴퓨터 = 방문예정큐.poll();\n    for (int 이웃컴퓨터 : 인접리스트[현재컴퓨터])\n        if (!방문여부[이웃컴퓨터]) { 방문여부[이웃컴퓨터] = true; 감염수++; 방문예정큐.add(이웃컴퓨터); }\n}',explain:'1번에서 도달 가능한 노드 수를 BFS로 셉니다(1번 자신 제외).'}],
1012:[{q:'배추 무리(지렁이) 수 세기를 "끝까지" 구현해 보세요. (스캔 루프 + bfs 함수 전체)',hint:'배추(1)이고 미방문이면 bfs로 무리 전체를 방문 표시하고 worms++.',code:'// ① 메인: 격자를 훑으며 새 무리마다 +1\nint 지렁이수 = 0;\nfor (int i = 0; i < 밭세로; i++)\n  for (int j = 0; j < 밭가로; j++)\n    if (배추밭[i][j] == 1 && !방문여부[i][j]) { 무리방문(i, j); 지렁이수++; }\n\n// ② 한 무리를 통째로 묶는 격자 BFS\nstatic void 무리방문(int 시작행, int 시작열) {\n    int[] 행이동 = {1,-1,0,0}, 열이동 = {0,0,1,-1};\n    Queue<int[]> 탐색큐 = new LinkedList<>();\n    탐색큐.add(new int[]{시작행, 시작열}); 방문여부[시작행][시작열] = true;\n    while (!탐색큐.isEmpty()) {\n        int[] 현재칸 = 탐색큐.poll();\n        for (int 방향 = 0; 방향 < 4; 방향++) {\n            int 다음행 = 현재칸[0]+행이동[방향], 다음열 = 현재칸[1]+열이동[방향];\n            if (다음행>=0 && 다음열>=0 && 다음행<밭세로 && 다음열<밭가로 && 배추밭[다음행][다음열]==1 && !방문여부[다음행][다음열]) {\n                방문여부[다음행][다음열] = true;\n                탐색큐.add(new int[]{다음행, 다음열});\n            }\n        }\n    }\n}',explain:'바깥 루프가 무리의 "시작점"을 찾고, 무리방문이 그 무리를 통째로 방문 표시합니다. 둘이 합쳐져야 완성이에요.'}],
10026:[{q:'구역 수 세기를 "끝까지" 구현해 보세요. (스캔 루프 + dfs 함수 전체)',hint:'미방문 칸마다 dfs로 같은 색 구역을 방문 표시하고 regions++.',code:'// ① 메인: 격자를 훑으며 새 구역마다 +1\nint 구역수 = 0;\nfor (int i = 0; i < 그림크기; i++)\n  for (int j = 0; j < 그림크기; j++)\n    if (!방문여부[i][j]) { 구역묶기(i, j, 볼그림[i][j]); 구역수++; }\n\n// ② 같은 색 구역을 통째로 묶는 DFS\nstatic void 구역묶기(int 행, int 열, char 색) {\n    방문여부[행][열] = true;\n    int[] 행이동 = {1,-1,0,0}, 열이동 = {0,0,1,-1};\n    for (int 방향 = 0; 방향 < 4; 방향++) {\n        int 다음행 = 행+행이동[방향], 다음열 = 열+열이동[방향];\n        if (다음행>=0 && 다음열>=0 && 다음행<그림크기 && 다음열<그림크기 && !방문여부[다음행][다음열] && 볼그림[다음행][다음열]==색)\n            구역묶기(다음행, 다음열, 색);\n    }\n}',explain:'바깥 루프가 구역 시작을 세고, 구역묶기가 같은 색 구역을 통째로 묶습니다. 적록색약 모드는 R을 G로 바꾼 그림으로 같은 루프를 한 번 더 돌려요.'}],
11724:[{q:'연결요소 개수 세기를 "끝까지" 구현해 보세요. (스캔 루프 + bfs 함수 전체)',hint:'미방문 정점마다 bfs를 돌리고 +1. bfs는 큐로 도달 가능한 정점을 모두 방문 표시.',code:'// ① 메인: 모든 정점을 훑으며 새 그룹마다 +1\nint 덩어리수 = 0;\nfor (int i = 1; i <= 정점수; i++)\n    if (!방문여부[i]) { 그룹묶기(i); 덩어리수++; }\n\n// ② 연결요소 하나를 통째로 묶는 BFS\nstatic void 그룹묶기(int 시작정점) {\n    Queue<Integer> 탐색큐 = new LinkedList<>();\n    탐색큐.add(시작정점); 방문여부[시작정점] = true;\n    while (!탐색큐.isEmpty()) {\n        int 현재정점 = 탐색큐.poll();\n        for (int 다음정점 : 인접리스트[현재정점])\n            if (!방문여부[다음정점]) { 방문여부[다음정점] = true; 탐색큐.add(다음정점); }\n    }\n}',explain:'바깥 루프가 "새 그룹 시작"을 세고, 그룹묶기 한 번이 그 그룹 전체를 방문 표시합니다. 둘이 합쳐져야 완성이에요.'}],
1927:[{q:'N개의 입력을 반복하며 0이면 최솟값을 빼서 출력, 아니면 넣는 반복문을 작성해 보세요.',hint:'x==0이면 isEmpty?0:poll.',code:'while (연산수-- > 0) {\n    int 입력값 = Integer.parseInt(입력.readLine().trim());\n    if (입력값 == 0) 출력.append(최소힙.isEmpty() ? 0 : 최소힙.poll()).append("\\n");\n    else 최소힙.add(입력값);\n}',explain:'힙은 자동 정렬되므로, 0일 때 poll만 하면 최솟값이 나옵니다.'}],
7662:[{q:'k개의 명령(I n / D 1 / D -1)을 반복 처리하는 루프 골격을 작성해 보세요.',hint:'op가 I면 삽입, D면 n부호로 최대/최소.',code:'while (명령수-- > 0) {\n    StringTokenizer 토큰 = new StringTokenizer(입력.readLine());\n    String 명령 = 토큰.nextToken();\n    int 값 = Integer.parseInt(토큰.nextToken());\n    if (명령.equals("I")) 삽입(값);\n    else if (값 == 1) 최댓값삭제();\n    else 최솟값삭제();\n}',explain:'명령을 반복하며 삽입/최대삭제/최소삭제를 분기 처리합니다.'}],
2108:[{q:'N개의 수를 순회하며 합과 등장 횟수(count 배열)를 동시에 구하는 반복문을 작성해 보세요.',hint:'음수 인덱스 방지로 +4000 오프셋.',code:'int 합계 = 0;\nfor (int i = 0; i < 개수; i++) {\n    합계 += 수배열[i];\n    등장횟수[수배열[i] + 4000]++;   // 최빈값용\n}',explain:'한 번의 루프로 평균(합)과 최빈값(횟수)을 함께 준비합니다. 음수는 오프셋으로 처리.'}],
1074:[{q:'2^N×2^N에서 (r,c)의 방문 순서를 재귀로 구하는 함수를 작성해 보세요.',hint:'사분면 번호 × (반칸 넓이) + 재귀.',code:'static int Z순서번호(int 단계, int 행, int 열) {\n    if (단계 == 0) return 0;\n    int 절반 = 1 << (단계 - 1);\n    int 사분면번호 = (행 < 절반 ? 0 : 2) + (열 < 절반 ? 0 : 1);\n    return 사분면번호 * 절반 * 절반 + Z순서번호(단계 - 1, 행 % 절반, 열 % 절반);\n}',explain:'직접 다 세면 너무 크니, 사분면을 따져 앞 칸 수를 더하며 재귀로 좁힙니다.'}],
14500:[{q:'테트로미노를 "끝까지" 구현해 보세요. (스캔 루프 + DFS(깊이4) + ㅗ모양 별도처리)',hint:'대부분 모양은 길이 4 DFS로 만들어지지만, ㅗ(T)자만 DFS로 안 돼서 따로 처리합니다.',code:'// ① 모든 칸을 시작점으로 최대 합 갱신\nint 최대합 = 0;\nfor (int i = 0; i < 세로; i++)\n  for (int j = 0; j < 가로; j++) {\n      방문여부[i][j] = true;\n      연결4칸탐색(i, j, 1, 보드[i][j]);   // 길이 4까지 DFS\n      방문여부[i][j] = false;\n      티자검사(i, j);                    // ㅗ(T) 모양 별도\n  }\n\n// ② 한 칸에서 4칸까지 이어 붙이며 최댓값\nstatic void 연결4칸탐색(int 행, int 열, int 고른칸수, int 지금합) {\n    if (고른칸수 == 4) { 최대합 = Math.max(최대합, 지금합); return; }\n    int[] 행이동={1,-1,0,0}, 열이동={0,0,1,-1};\n    for (int 방향 = 0; 방향 < 4; 방향++) {\n        int 다음행=행+행이동[방향], 다음열=열+열이동[방향];\n        if (다음행>=0 && 다음열>=0 && 다음행<세로 && 다음열<가로 && !방문여부[다음행][다음열]) {\n            방문여부[다음행][다음열] = true;\n            연결4칸탐색(다음행, 다음열, 고른칸수+1, 지금합 + 보드[다음행][다음열]);\n            방문여부[다음행][다음열] = false;\n        }\n    }\n}\n\n// ③ DFS로 못 만드는 ㅗ/ㅏ/ㅜ/ㅓ(T자) 모양: 가운데 + 4방향 중 3개\nstatic void 티자검사(int 행, int 열) {\n    int[] 행이동={1,-1,0,0}, 열이동={0,0,1,-1};\n    for (int 뺄방향 = 0; 뺄방향 < 4; 뺄방향++) {\n        int 지금합 = 보드[행][열], 이웃수 = 0;\n        for (int k = 0; k < 4; k++) {\n            if (k == 뺄방향) continue;\n            int 다음행=행+행이동[k], 다음열=열+열이동[k];\n            if (다음행>=0 && 다음열>=0 && 다음행<세로 && 다음열<가로) { 지금합 += 보드[다음행][다음열]; 이웃수++; }\n        }\n        if (이웃수 == 3) 최대합 = Math.max(최대합, 지금합);\n    }\n}',explain:'테트로미노 19가지 중 ㅗ(T)자 빼고는 모두 "한 칸에서 인접 칸을 4개까지 잇는 DFS"로 만들어집니다. T자만 가운데 칸 기준 3방향으로 따로 처리하면 완성이에요.'}],
5430:[{q:'명령 문자열 p를 순회하며 R(방향 토글)·D(앞 제거)를 처리하는 반복문을 작성해 보세요.',hint:'R은 뒤집지 말고 방향만, D는 현재 방향의 앞에서 제거.',code:'boolean 뒤집힘 = false;\nfor (char 명령 : 명령문자열.toCharArray()) {\n    if (명령 == \'R\') 뒤집힘 = !뒤집힘;\n    else {  // D\n        if (값덱.isEmpty()) { 오류 = true; break; }\n        if (뒤집힘) 값덱.pollLast();\n        else 값덱.pollFirst();\n    }\n}',explain:'R마다 실제 뒤집으면 느려서 방향 플래그만 토글하고, D는 그 방향의 앞에서 제거합니다.'}],
16928:[{q:'현재 칸에서 주사위 1~6칸을 BFS로 확장하는 반복문을 작성해 보세요. (사다리/뱀은 순간이동표[]로 점프)',hint:'다음칸>100이면 무시, 순간이동표[다음칸]!=0이면 점프.',code:'for (int 주사위 = 1; 주사위 <= 6; 주사위++) {\n    int 다음칸 = 현재칸 + 주사위;\n    if (다음칸 > 100) continue;\n    if (순간이동표[다음칸] != 0) 다음칸 = 순간이동표[다음칸];   // 사다리·뱀\n    if (최소굴림수[다음칸] == -1) {\n        최소굴림수[다음칸] = 최소굴림수[현재칸] + 1;\n        방문예정큐.add(다음칸);\n    }\n}',explain:'한 칸을 6갈래로 확장하되, 도착 칸에 사다리·뱀이 있으면 그 끝으로 이동합니다.'}],
7576:[{q:'여러 익은 토마토에서 동시에 시작하는 BFS로 하루씩 익히는 반복문을 작성해 보세요.',hint:'안 익은 칸(0)에 날짜를 +1로 기록.',code:'while (!익음전파큐.isEmpty()) {\n    int[] 현재칸 = 익음전파큐.poll();\n    for (int 방향 = 0; 방향 < 4; 방향++) {\n        int 다음행 = 현재칸[0]+행이동[방향], 다음열 = 현재칸[1]+열이동[방향];\n        if (범위안(다음행, 다음열) && 상자[다음행][다음열] == 0) {\n            상자[다음행][다음열] = 상자[현재칸[0]][현재칸[1]] + 1;  // 날짜 누적\n            익음전파큐.add(new int[]{다음행, 다음열});\n        }\n    }\n}',explain:'처음 익은 토마토들을 모두 큐에 넣고 동시에 퍼뜨립니다. 칸 값이 곧 익은 날짜.'}],
7569:[{q:'3차원 토마토를 6방향으로 퍼뜨리는 BFS 확장 반복문을 작성해 보세요.',hint:'dx/dy/dz 6방향 배열.',code:'int[] 행이동={1,-1,0,0,0,0}, 열이동={0,0,1,-1,0,0}, 층이동={0,0,0,0,1,-1};\nfor (int 방향 = 0; 방향 < 6; 방향++) {\n    int 다음행=행+행이동[방향], 다음열=열+열이동[방향], 다음층=층+층이동[방향];\n    if (범위안(다음층,다음행,다음열) && 상자[다음층][다음행][다음열] == 0) {\n        상자[다음층][다음행][다음열] = 상자[층][행][열] + 1;\n        익음전파큐.add(new int[]{다음층, 다음행, 다음열});\n    }\n}',explain:'2D의 4방향에 위·아래(z±1)를 더해 6방향으로 확장하는 것만 다릅니다.'}]
};
function renderImpl(im, idx) {

  if (im.hint) h += `<button class="qa-btn" data-act="hint">💡 힌트</button>`;
  h += `<button class="qa-btn" data-act="reveal">✅ 모범 답안 보기</button>`;
  if (im.hint) h += `<div class="quiz-hint">${escHtml(im.hint)}</div>`;
  h += `<div class="quiz-answer"><pre><code class="language-java">${escHtml(im.code)}</code></pre>`;
  if (im.explain) h += `<div class="quiz-explain show" style="margin-top:11px"><b>💡 해설</b> ${escHtml(im.explain)}</div>`;

}

11279:[{q:'최대 힙 선언의 빈칸 ____ 은?',code:'PriorityQueue<Integer> 최대힙 =\n    new PriorityQueue<>(____);',options:['Collections.reverseOrder()','Comparator.naturalOrder()','(a,b) -> a - b','new ArrayList<>()'],answer:0,explain:'reverseOrder()를 주면 최댓값이 맨 위로 오는 최대 힙이 됩니다. 나머지는 최소 힙이거나 오류.'}],

10828:[{q:'pop 명령에서 빈 스택 처리 빈칸 ____ 은?',code:'case "pop":\n    출력.append(____).append(\'\\n\');\n    break;',options:['값스택.isEmpty() ? -1 : 값스택.pop()','값스택.pop()','값스택.peek()','값스택.size()'],answer:0,explain:'스택이 비었으면 -1, 아니면 pop. 빈 스택에 pop하면 예외가 나므로 isEmpty 체크가 필수입니다.'}],

  h += '<div class="quiz-opts" style="margin-top:12px">';
  q.options.forEach((o, oi) => h += `<button class="quiz-opt" data-oi="${oi}" data-correct="${q.answer}">${escHtml(o)}</button>`);
  return h + `</div><div class="quiz-explain"><b>💡 해설</b> ${escHtml(q.explain)}</div></div>`;
}

2231:[{q:'분해합의 전체 순서를 차례대로 클릭하세요.',steps:['자연수 N을 입력받는다','1부터 N-1까지 후보 m을 본다','m + (m의 각 자리 합)을 계산한다','그 값이 N과 같으면 m을 출력한다','끝까지 없으면 0을 출력한다'],codes:['int 목표N = 입력.nextInt();','for (int 생성자후보=1; 생성자후보<목표N; 생성자후보++)','int 분해합=생성자후보, 남은수=생성자후보; while(남은수>0){ 분해합+=남은수%10; 남은수/=10; }','if (분해합==목표N) { System.out.println(생성자후보); return; }','System.out.println(0);'],explain:'가장 작은 생성자를 찾으려 1부터 올라갑니다.'}],
1018:[{q:'체스판 다시 칠하기의 전체 순서를 차례대로 클릭하세요.',steps:['보드 크기와 색을 입력받는다','모든 8×8 시작 위치를 순회한다','각 위치에서 W시작 기준 다른 칸 수 cnt를 센다','min(cnt, 64-cnt)로 최솟값을 갱신한다','최솟값을 출력한다'],codes:['char[][] 보드 = read();','for (int 시작행=0;시작행<=세로-8;시작행++) for (int 시작열=0;시작열<=가로-8;시작열++)','int 다른칸수 = 칠할칸세기(시작행, 시작열);','최소칠할칸 = Math.min(최소칠할칸, Math.min(다른칸수, 64-다른칸수));','System.out.println(최소칠할칸);'],explain:'W시작 비용이 cnt면 B시작 비용은 64-cnt입니다.'}],
1260:[{q:'DFS와 BFS의 전체 순서를 차례대로 클릭하세요.',steps:['정점·간선·시작점을 입력받아 인접 리스트를 만든다','각 인접 리스트를 오름차순 정렬한다','DFS로 방문 순서를 구해 출력한다','방문 배열을 초기화한다','BFS로 방문 순서를 구해 출력한다'],codes:['인접리스트[정점A].add(정점B); 인접리스트[정점B].add(정점A);','for (int i=1;i<=정점수;i++) Collections.sort(인접리스트[i]);','깊이우선탐색(시작정점);','방문여부 = new boolean[정점수+1];','너비우선탐색(시작정점);'],explain:'작은 번호부터 방문해야 하므로 인접 리스트를 정렬합니다.'}],
2606:[{q:'바이러스의 전체 순서를 차례대로 클릭하세요.',steps:['컴퓨터 수와 연결 정보를 입력받아 그래프를 만든다','1번을 큐에 넣고 방문 표시한다','꺼내서 연결된 미방문 컴퓨터를 큐에 넣고 감염 수를 센다','큐가 빌 때까지 반복한다','감염된 컴퓨터 수를 출력한다'],codes:['인접리스트[컴퓨터A].add(컴퓨터B); 인접리스트[컴퓨터B].add(컴퓨터A);','방문예정큐.add(1); 방문여부[1]=true;','if (!방문여부[이웃컴퓨터]) { 방문여부[이웃컴퓨터]=true; 감염수++; 방문예정큐.add(이웃컴퓨터); }','while (!방문예정큐.isEmpty()) { int 현재컴퓨터=방문예정큐.poll(); ... }','System.out.println(감염수);'],explain:'1번에서 도달 가능한 노드 수(자신 제외)를 셉니다.'}],
1012:[{q:'유기농 배추의 전체 순서를 차례대로 클릭하세요.',steps:['밭 크기와 배추 좌표를 입력받는다','밭의 모든 칸을 순회한다','미방문 배추에서 BFS로 무리 전체를 방문 표시한다','새 무리마다 지렁이 수를 1 늘린다','지렁이 수를 출력한다'],codes:['배추밭[배추y][배추x] = 1;','for (int i...) for (int j...)','if (배추밭[i][j]==1 && !방문여부[i][j]) 무리방문(i,j);','지렁이수++;','System.out.println(지렁이수);'],explain:'붙어 있는 배추 무리 수가 곧 지렁이 수입니다.'}],
7569:[{q:'토마토(3D)의 전체 순서를 차례대로 클릭하세요.',steps:['높이·가로·세로와 상자 상태를 입력받는다','익은 토마토를 모두 큐에 넣는다','꺼내서 6방향(상하좌우+위아래)으로 익힌다','큐가 빌 때까지 반복한다','안 익은 칸이 있으면 -1, 아니면 최대 날짜를 출력한다'],codes:['read(상자);  // 층 x 세로 x 가로','if (상자[층][행][열]==1) 익음전파큐.add(new int[]{층,행,열});','상자[다음층][다음행][다음열]=상자[층][행][열]+1; 익음전파큐.add(new int[]{다음층,다음행,다음열});','while (!익음전파큐.isEmpty()) { ... }','정답 = 안익은칸있음 ? -1 : 마지막날짜;'],explain:'2D의 4방향에 위·아래를 더해 6방향으로 퍼뜨립니다.'}],
10026:[{q:'적록색약의 전체 순서를 차례대로 클릭하세요.',steps:['N과 N×N 그림을 입력받는다','원래 색 그대로 구역 수를 센다','R을 G로 바꾼 그림에서 구역 수를 다시 센다','일반인 구역 수와 적록색약 구역 수를 출력한다'],codes:['char[][] 그림 = read();','int 일반구역수 = 구역수세기(그림, false);','int 색약구역수 = 구역수세기(그림, true);   // R→G','System.out.println(일반구역수 + " " + 색약구역수);'],explain:'같은 함수를 색 변환 전/후로 두 번 돌립니다.'}],
11724:[{q:'연결 요소 개수의 전체 순서를 차례대로 클릭하세요.',steps:['정점 수와 간선을 입력받아 그래프를 만든다','모든 정점을 순회한다','미방문 정점에서 BFS/DFS로 한 그룹을 모두 방문한다','새 그룹이 시작될 때마다 개수를 늘린다','연결 요소 개수를 출력한다'],codes:['인접리스트[정점A].add(정점B); 인접리스트[정점B].add(정점A);','for (int i=1; i<=정점수; i++)','if (!방문여부[i]) 그룹묶기(i);','덩어리수++;','System.out.println(덩어리수);'],explain:'새 탐색이 시작될 때마다 연결 요소가 하나 늘어납니다.'}],
1927:[{q:'최소 힙의 전체 순서를 차례대로 클릭하세요.',steps:['연산 수 N을 입력받고 최소 힙을 준비한다','N번 반복하며 입력 x를 읽는다','x≠0이면 힙에 넣는다','x=0이면 최솟값을 꺼내 출력한다(비었으면 0)'],codes:['PriorityQueue<Integer> 최소힙 = new PriorityQueue<>();','int 입력값 = readInt();','if (입력값 != 0) 최소힙.add(입력값);','else 출력.append(최소힙.isEmpty()?0:최소힙.poll()).append(\'\\n\');'],explain:'힙은 자동 정렬되므로 0일 때 poll만 하면 최솟값이 나옵니다.'}],
11279:[{q:'최대 힙의 전체 순서를 차례대로 클릭하세요.',steps:['연산 수 N을 입력받고 최대 힙을 준비한다','N번 반복하며 입력 x를 읽는다','x≠0이면 힙에 넣는다','x=0이면 최댓값을 꺼내 출력한다(비었으면 0)'],codes:['PriorityQueue<Integer> 최대힙 = new PriorityQueue<>(Collections.reverseOrder());','int 입력값 = readInt();','if (입력값 != 0) 최대힙.add(입력값);','else 출력.append(최대힙.isEmpty()?0:최대힙.poll()).append(\'\\n\');'],explain:'reverseOrder로 만든 최대 힙은 최댓값이 맨 위에 옵니다.'}],
11286:[{q:'절댓값 힙의 전체 순서를 차례대로 클릭하세요.',steps:['연산 수 N을 입력받고 절댓값 비교 힙을 준비한다','N번 반복하며 입력 x를 읽는다','x≠0이면 힙에 넣는다','x=0이면 절댓값 최소를 꺼내 출력한다(비었으면 0)'],codes:['절댓값힙 = new PriorityQueue<>((a,b)-> |a|!=|b| ? |a|-|b| : a-b);','int 입력값 = readInt();','if (입력값 != 0) 절댓값힙.add(입력값);','else 출력.append(절댓값힙.isEmpty()?0:절댓값힙.poll()).append(\'\\n\');'],explain:'비교자만 다를 뿐 처리 흐름은 최소·최대 힙과 같습니다.'}],
7662:[{q:'이중 우선순위 큐의 전체 순서를 차례대로 클릭하세요.',steps:['명령 수 k를 입력받는다','I n 명령이면 삽입한다','D 1이면 최댓값, D -1이면 최솟값을 삭제한다','명령을 모두 처리한다','남았으면 최댓값·최솟값, 비었으면 EMPTY를 출력한다'],codes:['int 명령수 = readInt();','if (명령.equals("I")) 삽입(값);','else if (값==1) 최댓값삭제(); else 최솟값삭제();','while (명령수-- > 0) { ... }','print(비었음 ? "EMPTY" : 최댓값 + " " + 최솟값);'],explain:'최대 힙·최소 힙을 함께 운영해 양쪽 끝을 모두 다룹니다.'}],
2108:[{q:'통계학의 전체 순서를 차례대로 클릭하세요.',steps:['N과 N개의 정수를 입력받는다','합을 구해 산술평균(반올림)을 낸다','정렬해 중앙값을 찾는다','최빈값과 범위를 구한다','평균·중앙값·최빈값·범위를 출력한다'],codes:['int[] 수배열 = read();','int 평균 = Math.round((float)합계 / 개수);','Arrays.sort(수배열); int 중앙값 = 수배열[개수/2];','// 등장횟수[]로 최빈값, max-min 범위','print(평균, 중앙값, 최빈값, 범위);'],explain:'중앙값·최빈값을 위해 정렬과 빈도 계산이 필요합니다.'}],
1074:[{q:'Z의 전체 순서를 차례대로 클릭하세요.',steps:['N, r, c를 입력받는다','정사각형을 4등분한다','(r,c)가 속한 사분면을 찾는다','앞 사분면들의 칸 수를 더하고 그 사분면 안에서 재귀한다','한 칸이 될 때까지 반복해 순번을 출력한다'],codes:['int 단계N=.., 목표행=.., 목표열=..;','int 절반 = 1 << (단계N-1);','int 사분면번호 = (목표행<절반?0:2) + (목표열<절반?0:1);','return 사분면번호*절반*절반 + Z순서번호(단계N-1, 목표행%절반, 목표열%절반);','System.out.println(Z순서번호(단계N, 목표행, 목표열));'],explain:'직접 세면 너무 크니 사분면을 따져 재귀로 좁힙니다.'}],
14500:[{q:'테트로미노의 전체 순서를 차례대로 클릭하세요.',steps:['보드 크기와 숫자를 입력받는다','모든 칸을 시작점으로 삼는다','DFS로 4칸까지 이어 붙여 합의 최댓값을 갱신한다','ㅗ(T)자 모양은 따로 처리한다','최대 합을 출력한다'],codes:['int[][] 보드 = read();','for (int i...) for (int j...)','연결4칸탐색(i, j, 1, 보드[i][j]);   // 깊이 4','티자검사(i, j);            // ㅗ자','System.out.println(최대합);'],explain:'대부분 모양은 DFS로, ㅗ자만 별도로 처리합니다.'}],
5430:[{q:'AC의 전체 순서를 차례대로 클릭하세요.',steps:['명령 문자열 p·배열 크기·배열을 입력받는다','R은 방향만 토글한다','D는 현재 방향의 앞 원소를 제거한다(비었으면 error)','명령을 끝까지 적용한다','최종 배열 또는 error를 출력한다'],codes:['String 명령문자열 = ..; Deque<Integer> 값덱 = ..;','if (명령==\'R\') 뒤집힘 = !뒤집힘;','else { if (값덱.isEmpty()){오류=true;break;} pop(); }','for (char 명령 : 명령문자열.toCharArray()) { ... }','print(오류 ? "error" : build(값덱));'],explain:'R마다 실제 뒤집지 않고 방향 플래그만 바꿉니다.'}],
16928:[{q:'뱀과 사다리(BFS)의 전체 순서를 차례대로 클릭하세요.',steps:['사다리·뱀 정보를 순간이동표에 저장한다','1번 칸을 큐에 넣고 방문 표시한다','큐에서 칸을 꺼내 주사위 1~6칸 앞을 살핀다','사다리·뱀이 있으면 끝으로 이동, 미방문이면 큐에 넣고 횟수 +1','100번 칸에 도달하면 그 횟수를 출력한다'],codes:['순간이동표[시작칸] = 도착칸;','방문예정큐.add(1); 최소굴림수[1]=0;','for (int 주사위=1; 주사위<=6; 주사위++) { int 다음칸=현재칸+주사위; }','if (순간이동표[다음칸]!=0) 다음칸=순간이동표[다음칸];\nif (최소굴림수[다음칸]==-1) { 최소굴림수[다음칸]=최소굴림수[현재칸]+1; 방문예정큐.add(다음칸); }','if (다음칸==100) System.out.println(최소굴림수[다음칸]);'],explain:'칸을 노드로 보는 BFS로 처음 100에 닿은 횟수가 최소입니다.'}],
1697:[{q:'숨바꼭질(BFS)의 전체 진행 순서를 차례대로 클릭하세요.',steps:['시작 위치 N과 목표 K를 입력받는다','큐에 N을 넣고 방문 표시한다','큐에서 한 점을 꺼낸다(poll)','3방향(−1, +1, ×2) 중 미방문이면 큐에 넣고 거리 +1','목표 K에 처음 도달했을 때의 거리를 출력한다'],codes:['int 시작위치=입력.nextInt(), 목표위치=입력.nextInt();','방문예정큐.add(시작위치); 걸린시간[시작위치]=0;','int 현재위치 = 방문예정큐.poll();','for (int 다음위치 : new int[]{현재위치-1,현재위치+1,현재위치*2})\n  if (범위안(다음위치)&&걸린시간[다음위치]==-1) { 걸린시간[다음위치]=걸린시간[현재위치]+1; 방문예정큐.add(다음위치); }','if (현재위치==목표위치) { System.out.println(걸린시간[현재위치]); break; }'],explain:'모든 이동 비용이 1이라 처음 닿은 거리가 최소입니다.'}],
2667:[{q:'단지번호붙이기(DFS)의 전체 순서를 차례대로 클릭하세요.',steps:['N과 N×N 지도를 입력받는다','지도의 모든 칸을 순회한다','집(1)이고 미방문인 칸에서 DFS로 연결된 집을 세며 방문한다','DFS가 끝나면 단지 수를 1 늘린다','단지 수와 각 크기를 정렬해 출력한다'],codes:['지도[i] = 입력.readLine().toCharArray();','for (int i...) for (int j...)','if (지도[i][j]==\'1\' && !방문여부[i][j]) 단지크기목록.add(단지가구수세기(i,j));','단지수++;','Collections.sort(단지크기목록);'],explain:'새 단지 발견 시 DFS로 묶고 크기를 측정합니다.'}],
